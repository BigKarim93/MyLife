<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Objectifs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Kalam:wght@700&family=Work+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;--border:#2e3248;--border2:#3d4260;
  --text:#e8eaf6;--text2:#9198c0;--text3:#5a6090;
  --green:#4ade80;--red:#f87171;--red-l:rgba(248,113,113,.1);
  --teal:#2dd4bf;--teal-l:rgba(45,212,191,.12);
  --accent:#f2c14e;--radius:14px;--radius-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Work Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
h1,h2{font-family:'Kalam',cursive;}
input,button,select{font-family:inherit;}

/* TOPBAR */
.tb{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:50;}
.tb h1{font-size:1.15rem;color:var(--teal);flex:1;}
.btn{background:var(--surface2);border:1px solid var(--border2);color:var(--text);border-radius:var(--radius-sm);padding:7px 14px;font-size:.82rem;font-weight:600;cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:5px;text-decoration:none;white-space:nowrap;}
.btn:hover{border-color:var(--teal);color:var(--teal);}
.btn.prim{background:linear-gradient(135deg,var(--teal),#0ea5e9);border:none;color:#0f1117;font-weight:700;}

/* LAYOUT — colonnes côte à côte */
.page{padding:16px;display:flex;gap:14px;align-items:flex-start;flex-wrap:wrap;}
.obj-col{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);width:320px;flex-shrink:0;overflow:hidden;}
.obj-col-header{display:flex;align-items:center;gap:8px;padding:12px 14px;border-bottom:1px solid var(--border);background:var(--surface2);}
.obj-col-title{font-family:'Kalam',cursive;font-size:1.05rem;flex:1;color:var(--text);text-align:center;}
.col-btn{background:none;border:1px solid transparent;border-radius:6px;color:var(--text3);cursor:pointer;font-size:.78rem;padding:3px 7px;transition:.15s;}
.col-btn:hover{border-color:var(--border2);color:var(--text);}
.col-btn.red:hover{border-color:var(--red);color:var(--red);}
.obj-col-body{padding:12px 14px;}
.add-serie-btn{width:100%;background:transparent;border:1px dashed var(--border2);border-radius:var(--radius-sm);padding:8px;color:var(--text3);font-size:.82rem;cursor:pointer;transition:.15s;margin-top:8px;}
.add-serie-btn:hover{border-color:var(--teal);color:var(--teal);}
.add-col-btn{background:var(--surface);border:1px dashed var(--border2);border-radius:var(--radius);width:260px;flex-shrink:0;padding:30px 20px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;cursor:pointer;transition:.15s;color:var(--text3);font-size:.88rem;}
.add-col-btn:hover{border-color:var(--teal);color:var(--teal);}
.add-col-btn span{font-size:2rem;}

/* SÉRIES */
.obj-serie{margin-bottom:14px;border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;}
.obj-serie-header{display:flex;align-items:center;gap:6px;padding:8px 10px;background:var(--surface2);cursor:default;}
.obj-chevron{font-size:.7rem;color:var(--text3);cursor:pointer;padding:2px 6px;border-radius:4px;transition:.15s;flex-shrink:0;}
.obj-chevron:hover{background:var(--border);color:var(--text);}
.obj-serie-title{font-size:.88rem;font-weight:700;flex:1;text-align:center;}
.obj-serie-prog{font-size:.72rem;color:var(--text2);flex-shrink:0;}
.obj-serie-prog strong{color:var(--teal);}
.obj-pbar{background:var(--border);border-radius:999px;height:4px;width:60px;overflow:hidden;flex-shrink:0;}
.obj-pfill{height:100%;background:linear-gradient(90deg,var(--teal),#0ea5e9);border-radius:999px;transition:.4s;}
.obj-dots{display:grid;gap:6px;padding:10px;background:var(--bg);}
.obj-dots.collapsed{display:none;}
.obj-dot{width:36px;height:36px;border-radius:8px;border:1px solid var(--border2);background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700;color:var(--text3);cursor:pointer;transition:.15s;user-select:none;}
.obj-dot:hover{border-color:var(--teal);color:var(--teal);}
.obj-dot.done{background:var(--teal-l);border-color:var(--teal);color:var(--teal);font-size:.95rem;}

/* MODALS */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:300;padding:14px;}
.ov.op{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);padding:20px;width:100%;max-width:360px;}
.modal h3{margin-bottom:14px;font-size:1rem;color:var(--teal);}
.fld{margin-bottom:10px;display:flex;flex-direction:column;gap:4px;}
.fld label{font-size:.75rem;color:var(--text2);font-weight:600;}
.fld input{background:var(--bg);border:1px solid var(--border2);color:var(--text);border-radius:8px;padding:8px 10px;font-size:.88rem;width:100%;}
.fld input:focus{outline:none;border-color:var(--teal);}
.modal-act{display:flex;justify-content:flex-end;gap:8px;margin-top:14px;}
.modal-act .del{margin-right:auto;background:var(--red-l);border-color:var(--red);color:var(--red);}
</style>
</head>
<body>

<div class="tb">
  <h1>🎯 Objectifs</h1>
  <a href="index.html" class="btn">🏠 Accueil</a>
</div>

<div class="page" id="page">
  <div class="add-col-btn" id="add-col-btn">
    <span>＋</span>
    Nouvelle colonne
  </div>
</div>

<!-- MODAL COLONNE -->
<div class="ov" id="ov-col">
  <div class="modal">
    <h3 id="col-modal-title">Nouvelle colonne</h3>
    <div class="fld"><label>Titre</label><input type="text" id="col-inp-title" maxlength="40" placeholder="ex: Arabe, PPL, Dev..."></div>
    <div class="fld"><label>Couleur</label><div id="col-color-grid" style="display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;"></div></div>
    <div class="fld"><label>Cases par ligne</label><input type="number" id="col-inp-cols" min="2" max="10" value="5" style="width:80px;"></div>
    <div class="modal-act">
      <button class="btn del" id="col-del-btn" style="display:none;">🗑️ Supprimer</button>
      <button class="btn" onclick="closeModal('ov-col')">Annuler</button>
      <button class="btn prim" id="col-save-btn">Enregistrer</button>
    </div>
  </div>
</div>

<!-- MODAL SÉRIE -->
<div class="ov" id="ov-serie">
  <div class="modal">
    <h3 id="serie-modal-title">Nouvelle série</h3>
    <div class="fld"><label>Titre</label><input type="text" id="serie-inp-title" maxlength="60" placeholder="ex: T1 Grammaire, Météo..."></div>
    <div class="fld"><label>Nombre de cases</label><input type="number" id="serie-inp-count" min="1" max="300" value="26"></div>
    <div class="modal-act">
      <button class="btn del" id="serie-del-btn" style="display:none;">🗑️ Supprimer</button>
      <button class="btn" onclick="closeModal('ov-serie')">Annuler</button>
      <button class="btn prim" id="serie-save-btn">Enregistrer</button>
    </div>
  </div>
</div>

<div class="ov" id="ov-folder">
  <div class="modal">
    <h3 id="folder-modal-title" style="color:var(--teal)">Nouveau dossier</h3>
    <div class="fld"><label>Nom</label><input type="text" id="folder-inp-title" maxlength="40" placeholder="ex: Médine Tome 1, Phase 1..."></div>
    <div class="modal-act">
      <button class="btn del" id="folder-del-btn" style="display:none;">🗑️</button>
      <button class="btn" onclick="closeModal('ov-folder')">Annuler</button>
      <button class="btn prim" id="folder-save-btn">Enregistrer</button>
    </div>
  </div>
</div>
<script src="firebase-config.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
var OBJ_COLORS = ['#2dd4bf','#60a5fa','#a78bfa','#f472b6','#f87171','#fb923c','#fbbf24','#4ade80','#e879f9','#38bdf8','#f1efe4'];
var colSelColor = OBJ_COLORS[0];

function buildColorGrid(selColor) {
  var g = document.getElementById('col-color-grid');
  g.innerHTML = OBJ_COLORS.map(function(c) {
    return '<div style="width:26px;height:26px;border-radius:50%;background:'+c+';cursor:pointer;border:2px solid '+(c===selColor?'#fff':'transparent')+';transition:.15s;flex-shrink:0;" data-c="'+c+'"></div>';
  }).join('');
  g.querySelectorAll('[data-c]').forEach(function(dot) {
    dot.addEventListener('click', function() {
      colSelColor = dot.dataset.c;
      g.querySelectorAll('[data-c]').forEach(function(d) { d.style.borderColor = d.dataset.c===colSelColor?'#fff':'transparent'; });
    });
  });
}

firebase.initializeApp(window.FIREBASE_CONFIG);
var auth = firebase.auth();
var db = firebase.firestore();
var objDoc = null;

// STATE : colonnes = [{id, title, series:[{id, title, count, done:[], collapsed}]}]
var cols = [];
var saveTimer = null;
var editColId = null;
var editSerieId = null;
var editSerieColId = null;

// FIREBASE
auth.onAuthStateChanged(function(user) {
  if (user) {
    objDoc = db.collection('users').doc(user.uid).collection('modules').doc('objectifs');
    objDoc.get().then(function(snap) {
      if (snap.exists && snap.data().cols) cols = snap.data().cols;
      else loadLocal();
      render();
    }).catch(function() { loadLocal(); render(); });
  } else { loadLocal(); render(); }
});

function loadLocal() { try { var d = localStorage.getItem('mylife_obj_v1'); if (d) cols = JSON.parse(d); } catch(e) {} }
function saveData() {
  try { localStorage.setItem('mylife_obj_v1', JSON.stringify(cols)); } catch(e) {}
  if (!objDoc) return;
  clearTimeout(saveTimer);
  saveTimer = setTimeout(function() { objDoc.set({cols: cols}).catch(function(){}); }, 800);
}

// RENDER
function render() {
  var page = document.getElementById('page');
  var addBtn = document.getElementById('add-col-btn');
  // Supprimer les anciennes colonnes
  page.querySelectorAll('.obj-col').forEach(function(el) { el.remove(); });

  cols.forEach(function(col) {
    var colEl = document.createElement('div');
    colEl.className = 'obj-col';
    colEl.innerHTML =
      '<div class="obj-col-header" style="border-bottom:2px solid '+(col.color||'var(--teal)')+';">' +
        '<div class="obj-col-title" style="color:'+(col.color||'var(--teal)')+';">' + col.title + '</div>' +
        '<button class="col-btn" data-editcol="' + col.id + '" title="Modifier">✎</button>' +
      '</div>' +
      '<div class="obj-col-body" id="body-' + col.id + '"></div>';
    page.insertBefore(colEl, addBtn);

    // Séries
    var body = document.getElementById('body-' + col.id);
    var colColor = col.color || 'var(--teal)';
    var colsPerRow2 = col.cols || 5;

    function appendSerie(serie, container) {
      var done2 = serie.done ? serie.done.length : 0;
      var pct2 = serie.count ? Math.round(done2/serie.count*100) : 0;
      var dots2 = '';
      for (var j = 1; j <= serie.count; j++) {
        var ok2 = serie.done && serie.done.indexOf(j) >= 0;
        var dotStyle = ok2 ? 'background:'+colColor+'22;border-color:'+colColor+';color:'+colColor+';' : '';
        dots2 += '<div class="obj-dot'+(ok2?' done':'')+'" data-cid="'+col.id+'" data-sid="'+serie.id+'" data-n="'+j+'" style="'+dotStyle+'">'+(ok2?'✓':j)+'</div>';
      }
      var sEl = document.createElement('div');
      sEl.className = 'obj-serie'; sEl.draggable = true;
      sEl.dataset.dragserie = col.id+'|'+serie.id+(serie.folderId?'|'+serie.folderId:'');
      sEl.innerHTML =
        '<div class="obj-serie-header">'+
          '<div class="obj-chevron" data-chevron="'+col.id+'|'+serie.id+'">'+(serie.collapsed?'▶':'▼')+'</div>'+
          '<div class="obj-serie-title">'+serie.title+'</div>'+
          '<div class="obj-serie-prog"><strong>'+done2+'</strong>/'+serie.count+' '+pct2+'%</div>'+
          '<div class="obj-pbar"><div class="obj-pfill" style="width:'+pct2+'%;background:'+colColor+'"></div></div>'+
          '<button class="col-btn" data-editserie="'+col.id+'|'+serie.id+'" title="Modifier">✎</button>'+
        '</div>'+
        '<div class="obj-dots'+(serie.collapsed?' collapsed':'')+'" style="grid-template-columns:repeat('+colsPerRow2+',36px);">'+dots2+'</div>';
      container.appendChild(sEl);
    }

    // Dossiers
    (col.folders || []).forEach(function(folder) {
      var fEl = document.createElement('div');
      fEl.className = 'obj-folder'; fEl.draggable = true;
      fEl.dataset.dragfolder = col.id+'|'+folder.id;
      fEl.innerHTML =
        '<div class="obj-folder-header" style="background:'+colColor+'18;">'+
          '<span style="font-size:.9rem">📁</span>'+
          '<div class="obj-folder-title">'+folder.title+'</div>'+
          '<div class="obj-folder-chevron" data-foldertoggle="'+col.id+'|'+folder.id+'">'+(folder.collapsed?'▶':'▼')+'</div>'+
          '<button class="col-btn" data-editfolder="'+col.id+'|'+folder.id+'" title="Modifier">✎</button>'+
        '</div>'+
        '<div class="obj-folder-body'+(folder.collapsed?' collapsed':'')+'" id="fbody-'+folder.id+'"></div>';
      body.appendChild(fEl);
      var fb = fEl.querySelector('#fbody-'+folder.id);
      if (!folder.collapsed) {
        (col.series||[]).filter(function(s){return s.folderId===folder.id;}).forEach(function(s){appendSerie(s,fb);});
      }
    });

    // Séries sans dossier
    (col.series || []).filter(function(s){return !s.folderId;}).forEach(function(serie) {
      var done = serie.done ? serie.done.length : 0;
      var pct = serie.count ? Math.round(done / serie.count * 100) : 0;
      var dots = '';
      for (var i = 1; i <= serie.count; i++) {
        var ok = serie.done && serie.done.indexOf(i) >= 0;
        var dotColor = ok ? (col.color||'var(--teal)') : '';
dots += '<div class="obj-dot' + (ok ? ' done' : '') + '" data-cid="' + col.id + '" data-sid="' + serie.id + '" data-n="' + i + '" style="'+(ok?'background:'+dotColor+'22;border-color:'+dotColor+';color:'+dotColor+';':'')+'">'+  (ok ? '✓' : i) + '</div>';
      }
      var serieEl = document.createElement('div');
      serieEl.className = 'obj-serie';
      serieEl.innerHTML =
        '<div class="obj-serie-header">' +
          '<div class="obj-chevron" data-chevron="' + col.id + '|' + serie.id + '">' + (serie.collapsed ? '▶' : '▼') + '</div>' +
          '<div class="obj-serie-title">' + serie.title + '</div>' +
          '<div class="obj-serie-prog"><strong>' + done + '</strong>/' + serie.count + ' ' + pct + '%</div>' +
          '<div class="obj-pbar"><div class="obj-pfill" style="width:' + pct + '%;background:'+(col.color||'var(--teal)')+'"></div></div>' +
          '<button class="col-btn" data-editserie="' + col.id + '|' + serie.id + '" title="Modifier">✎</button>' +
        '</div>' +
        '<div class="obj-dots' + (serie.collapsed ? ' collapsed' : '') + '" style="grid-template-columns:repeat('+(col.cols||5)+',36px);">' + dots + '</div>';
      body.appendChild(serieEl);
    });

    // Init drag sur ce body
    initColDrag(body, col.id);

    // Bouton ajouter série
    var addSerieBtn = document.createElement('button');
    addSerieBtn.className = 'add-serie-btn';
    addSerieBtn.textContent = '＋ Ajouter une série';
    addSerieBtn.dataset.addseriecol = col.id;
    body.appendChild(addSerieBtn);
    var addFolderBtn = document.createElement('button');
    addFolderBtn.className = 'add-serie-btn';
    addFolderBtn.textContent = '📁 Ajouter un dossier';
    addFolderBtn.dataset.addfoldercol = col.id;
    body.appendChild(addFolderBtn);
  });

  // Events
  page.querySelectorAll('[data-editcol]').forEach(function(btn) {
    btn.addEventListener('click', function() { openColModal(btn.dataset.editcol); });
  });
  page.querySelectorAll('[data-chevron]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var parts = btn.dataset.chevron.split('|');
      var col2 = cols.find(function(c) { return c.id === parts[0]; });
      if (!col2) return;
      var serie = (col2.series || []).find(function(s) { return s.id === parts[1]; });
      if (serie) { serie.collapsed = !serie.collapsed; saveData(); render(); }
    });
  });
  page.querySelectorAll('[data-editserie]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var parts = btn.dataset.editserie.split('|');
      openSerieModal(parts[0], parts[1]);
    });
  });
  page.querySelectorAll('.obj-dot').forEach(function(dot) {
    dot.addEventListener('click', function() {
      var col2 = cols.find(function(c) { return c.id === dot.dataset.cid; });
      if (!col2) return;
      var serie = (col2.series || []).find(function(s) { return s.id === dot.dataset.sid; });
      if (!serie) return;
      if (!serie.done) serie.done = [];
      var n = parseInt(dot.dataset.n);
      var idx = serie.done.indexOf(n);
      if (idx >= 0) serie.done.splice(idx, 1); else serie.done.push(n);
      saveData(); render();
    });
  });
  page.querySelectorAll('[data-addseriecol]').forEach(function(btn) {
    btn.addEventListener('click', function() { openSerieModal(btn.dataset.addseriecol, null); });
  });
  page.querySelectorAll('[data-addfoldercol]').forEach(function(btn) {
    btn.addEventListener('click', function() { openFolderModal(btn.dataset.addfoldercol, null); });
  });
  page.querySelectorAll('[data-foldertoggle]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var p = btn.dataset.foldertoggle.split('|');
      var c2 = cols.find(function(x){return x.id===p[0];});
      var f = c2&&(c2.folders||[]).find(function(x){return x.id===p[1];});
      if(f){f.collapsed=!f.collapsed;saveData();render();}
    });
  });
  page.querySelectorAll('[data-editfolder]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var p = btn.dataset.editfolder.split('|');
      openFolderModal(p[0],p[1]);
    });
  });
}

// MODALS
function closeModal(id) { document.getElementById(id).classList.remove('op'); }
function openModal(id) { document.getElementById(id).classList.add('op'); }

// Colonne
function openColModal(id) {
  editColId = id || null;
  var col = id ? cols.find(function(c) { return c.id === id; }) : null;
  document.getElementById('col-modal-title').textContent = col ? 'Modifier la colonne' : 'Nouvelle colonne';
  document.getElementById('col-inp-title').value = col ? col.title : '';
  document.getElementById('col-inp-cols').value = col ? (col.cols || 5) : 5;
  colSelColor = col ? (col.color || OBJ_COLORS[cols.length % OBJ_COLORS.length]) : OBJ_COLORS[cols.length % OBJ_COLORS.length];
  buildColorGrid(colSelColor);
  document.getElementById('col-del-btn').style.display = col ? 'inline-flex' : 'none';
  openModal('ov-col');
  setTimeout(function() { document.getElementById('col-inp-title').focus(); }, 50);
}
document.getElementById('col-save-btn').addEventListener('click', function() {
  var title = document.getElementById('col-inp-title').value.trim();
  if (!title) return;
  var colsPerRow = parseInt(document.getElementById('col-inp-cols').value) || 5;
  if (editColId) {
    var col = cols.find(function(c) { return c.id === editColId; });
    if (col) { col.title = title; col.color = colSelColor; col.cols = colsPerRow; }
  } else {
    cols.push({ id: 'col_' + Date.now(), title: title, color: colSelColor, cols: colsPerRow, series: [] });
  }
  saveData(); closeModal('ov-col'); render();
});
document.getElementById('col-del-btn').addEventListener('click', function() {
  if (!confirm('Supprimer cette colonne et toutes ses séries ?')) return;
  cols = cols.filter(function(c) { return c.id !== editColId; });
  saveData(); closeModal('ov-col'); render();
});
document.getElementById('col-inp-title').addEventListener('keydown', function(e) { if (e.key === 'Enter') document.getElementById('col-save-btn').click(); });
document.getElementById('add-col-btn').addEventListener('click', function() { openColModal(null); });

// Série
function openSerieModal(colId, serieId) {
  editSerieColId = colId;
  editSerieId = serieId || null;
  var col = cols.find(function(c) { return c.id === colId; });
  var serie = serieId && col ? (col.series || []).find(function(s) { return s.id === serieId; }) : null;
  document.getElementById('serie-modal-title').textContent = serie ? 'Modifier la série' : 'Nouvelle série';
  document.getElementById('serie-inp-title').value=serie?serie.title:'';
  document.getElementById('serie-inp-count').value=serie?serie.count:26;
  document.getElementById('serie-del-btn').style.display=serie?'inline-flex':'none';
  var c2=cols.find(function(x){return x.id===colId;});
  var sel=document.getElementById('serie-inp-folder');
  sel.innerHTML='<option value="">— Aucun dossier —</option>';
  (c2&&c2.folders||[]).forEach(function(f){sel.innerHTML+='<option value="'+f.id+'"'+(serie&&serie.folderId===f.id?' selected':'')+'>📁 '+f.title+'</option>';});
  openModal('ov-serie');
  setTimeout(function() { document.getElementById('serie-inp-title').focus(); }, 50);
}
document.getElementById('serie-save-btn').addEventListener('click', function() {
  var title = document.getElementById('serie-inp-title').value.trim();
  var count = parseInt(document.getElementById('serie-inp-count').value) || 0;
  if (!title || count < 1) return;
  var col = cols.find(function(c) { return c.id === editSerieColId; });
  if (!col) return;
  if (!col.series) col.series = [];
  var fid=document.getElementById('serie-inp-folder').value||null;
  if(editSerieId){
    var s2=col.series.find(function(x){return x.id===editSerieId;});
    if(s2){s2.title=title;if(count<s2.count&&s2.done)s2.done=s2.done.filter(function(n){return n<=count;});s2.count=count;s2.folderId=fid;}
  }else{col.series.push({id:'ser_'+Date.now(),title:title,count:count,done:[],collapsed:false,folderId:fid});}
  saveData(); closeModal('ov-serie'); render();
});
document.getElementById('serie-del-btn').addEventListener('click', function() {
  if (!confirm('Supprimer cette série ?')) return;
  var col = cols.find(function(c) { return c.id === editSerieColId; });
  if (col) col.series = col.series.filter(function(s) { return s.id !== editSerieId; });
  saveData(); closeModal('ov-serie'); render();
});
document.getElementById('serie-inp-title').addEventListener('keydown', function(e) { if (e.key === 'Enter') document.getElementById('serie-save-btn').click(); });

// DRAG & DROP — géré au niveau colonne (event delegation)
var dragSrc=null; // {colId, serieId} ou {colId, folderId}

function initColDrag(body, colId) {
  // Dragstart sur les éléments draggables dans ce body
  body.addEventListener('dragstart', function(e) {
    var serie = e.target.closest('[data-dragserie]');
    var folder = e.target.closest('[data-dragfolder]');
    if (serie) {
      dragSrc = {type:'serie', colId:colId, serieId:serie.dataset.dragserie};
      serie.style.opacity = '.35';
    } else if (folder) {
      dragSrc = {type:'folder', colId:colId, folderId:folder.dataset.dragfolder};
      folder.style.opacity = '.35';
    }
  });

  body.addEventListener('dragend', function(e) {
    body.querySelectorAll('[data-dragserie],[data-dragfolder]').forEach(function(el){
      el.style.opacity = '';
    });
    body.querySelectorAll('.drag-over').forEach(function(el){
      el.classList.remove('drag-over');
      el.style.outline = '';
    });
    dragSrc = null;
  });

  body.addEventListener('dragover', function(e) {
    e.preventDefault();
    var serie = e.target.closest('[data-dragserie]');
    var folder = e.target.closest('[data-dragfolder]');
    var fbody = e.target.closest('.obj-folder-body');
    // Nettoyer les anciens highlights
    body.querySelectorAll('.drag-over').forEach(function(el){ el.classList.remove('drag-over'); el.style.outline=''; });
    if (serie && dragSrc && dragSrc.type==='serie' && serie.dataset.dragserie !== dragSrc.serieId) {
      serie.classList.add('drag-over');
    } else if (folder && dragSrc && dragSrc.type==='serie') {
      folder.style.outline = '2px dashed var(--teal)';
      folder.classList.add('drag-over');
    } else if (fbody && dragSrc && dragSrc.type==='serie') {
      fbody.style.outline = '2px dashed var(--teal)';
    } else if (folder && dragSrc && dragSrc.type==='folder' && folder.dataset.dragfolder !== dragSrc.folderId) {
      folder.classList.add('drag-over');
    }
  });

  body.addEventListener('dragleave', function(e) {
    if (!body.contains(e.relatedTarget)) {
      body.querySelectorAll('.drag-over').forEach(function(el){ el.classList.remove('drag-over'); el.style.outline=''; });
    }
  });

  body.addEventListener('drop', function(e) {
    e.preventDefault();
    if (!dragSrc || dragSrc.colId !== colId) return;

    var col = cols.find(function(c){ return c.id===colId; });
    if (!col) return;

    var targetSerie = e.target.closest('[data-dragserie]');
    var targetFolder = e.target.closest('[data-dragfolder]');
    var targetFbody = e.target.closest('.obj-folder-body');

    // Nettoyer
    body.querySelectorAll('.drag-over').forEach(function(el){ el.classList.remove('drag-over'); el.style.outline=''; });

    if (dragSrc.type === 'serie') {
      var serie = col.series.find(function(s){ return s.id===dragSrc.serieId; });
      if (!serie) return;

      if (targetFolder && targetFolder.dataset.dragfolder !== dragSrc.serieId) {
        // Drop sur un dossier → mettre la série dedans
        serie.folderId = targetFolder.dataset.dragfolder;
        saveData(); render();

      } else if (targetFbody && !targetFolder) {
        // Drop dans le body d'un dossier → mettre dedans
        var fid = targetFbody.id.replace('fbody-','');
        serie.folderId = fid;
        saveData(); render();

      } else if (targetSerie && targetSerie.dataset.dragserie !== dragSrc.serieId) {
        // Drop sur une autre série → réordonner + hériter du folderId
        var targetS = col.series.find(function(s){ return s.id===targetSerie.dataset.dragserie; });
        serie.folderId = targetS ? targetS.folderId : null;
        var si = col.series.findIndex(function(s){ return s.id===dragSrc.serieId; });
        var ti = col.series.findIndex(function(s){ return s.id===targetSerie.dataset.dragserie; });
        if (si>=0 && ti>=0) {
          var m = col.series.splice(si,1)[0];
          col.series.splice(ti,0,m);
          saveData(); render();
        }
      }

    } else if (dragSrc.type === 'folder' && targetFolder) {
      // Réordonner les dossiers
      if (!col.folders) return;
      var si = col.folders.findIndex(function(f){ return f.id===dragSrc.folderId; });
      var ti = col.folders.findIndex(function(f){ return f.id===targetFolder.dataset.dragfolder; });
      if (si>=0 && ti>=0 && si!==ti) {
        var m = col.folders.splice(si,1)[0];
        col.folders.splice(ti,0,m);
        saveData(); render();
      }
    }
    dragSrc = null;
  });
}

// MODAL DOSSIER
var editFolderColId=null,editFolderId=null;
function openFolderModal(colId,folderId){
  editFolderColId=colId;editFolderId=folderId||null;
  var c2=cols.find(function(x){return x.id===colId;});
  var f=folderId&&c2?(c2.folders||[]).find(function(x){return x.id===folderId;}):null;
  document.getElementById('folder-modal-title').textContent=f?'Modifier le dossier':'Nouveau dossier';
  document.getElementById('folder-inp-title').value=f?f.title:'';
  document.getElementById('folder-del-btn').style.display=f?'inline-flex':'none';
  openModal('ov-folder');
  setTimeout(function(){document.getElementById('folder-inp-title').focus();},50);
}

// Fermer modals sur clic extérieur
['ov-col','ov-serie','ov-folder'].forEach(function(id) {
  document.getElementById(id).addEventListener('click', function(e) {
    if (e.target === e.currentTarget) closeModal(id);
  });
});
document.getElementById('folder-save-btn').addEventListener('click',function(){
  var title=document.getElementById('folder-inp-title').value.trim();if(!title)return;
  var c2=cols.find(function(x){return x.id===editFolderColId;});if(!c2)return;
  if(!c2.folders)c2.folders=[];
  if(editFolderId){var f=c2.folders.find(function(x){return x.id===editFolderId;});if(f)f.title=title;}
  else c2.folders.push({id:'fld_'+Date.now(),title:title,collapsed:false});
  saveData();closeModal('ov-folder');render();
});
document.getElementById('folder-del-btn').addEventListener('click',function(){
  if(!confirm('Supprimer ce dossier ?'))return;
  var c2=cols.find(function(x){return x.id===editFolderColId;});
  if(c2){(c2.series||[]).forEach(function(s){if(s.folderId===editFolderId)delete s.folderId;});c2.folders=(c2.folders||[]).filter(function(f){return f.id!==editFolderId;});}
  saveData();closeModal('ov-folder');render();
});
document.getElementById('folder-inp-title').addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('folder-save-btn').click();});
</script>
