<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🃏 Flashcards Arabe</title>
<link href="https://fonts.googleapis.com/css2?family=Scheherazade+New:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f1117;--s:#1a1d27;--s2:#22263a;--bd:rgba(255,255,255,.08);--tx:#e8eaf6;--tx2:#9198c0;--tx3:#5a6080;--ac:#7c6af7;--gr:#4ade80;--rd:#f87171;--tl:#2dd4bf;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--tx);font-family:'Segoe UI',system-ui,sans-serif;height:100vh;display:flex;flex-direction:column;}
.tb{display:flex;align-items:center;gap:10px;padding:10px 18px;background:var(--s);border-bottom:1px solid var(--bd);flex-shrink:0;}
.tb h1{font-size:.95rem;font-weight:700;flex:1;}
.btn{background:var(--s2);border:1px solid var(--bd);color:var(--tx);border-radius:8px;padding:6px 13px;font-size:.8rem;cursor:pointer;font-family:inherit;transition:.15s;}
.btn:hover{border-color:var(--ac);}
.btn.prim{background:var(--ac);border-color:var(--ac);color:#fff;}
.btn.teal{background:var(--tl);border-color:var(--tl);color:#000;}
.btn.danger{background:rgba(248,113,113,.15);border-color:var(--rd);color:var(--rd);}
.layout{display:flex;flex:1;overflow:hidden;}
/* Sidebar */
.sb{width:210px;flex-shrink:0;background:var(--s);border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow-y:auto;}
.sb-ttl{padding:10px 14px;font-size:.7rem;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--bd);}
.ci{display:flex;align-items:center;gap:8px;padding:10px 14px;cursor:pointer;font-size:.83rem;border-bottom:1px solid rgba(255,255,255,.04);transition:.15s;}
.ci:hover{background:var(--s2);}
.ci.active{background:rgba(45,212,191,.1);color:var(--tl);border-right:2px solid var(--tl);}
.ci-badge{background:var(--tl);color:#000;border-radius:20px;padding:1px 7px;font-size:.65rem;font-weight:700;margin-left:auto;flex-shrink:0;}
.sb-add{padding:11px 14px;color:var(--tl);font-size:.8rem;cursor:pointer;text-align:center;border-top:1px solid var(--bd);margin-top:auto;}
.sb-add:hover{background:var(--s2);}
/* Content */
.cnt{flex:1;overflow-y:auto;padding:18px;}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;color:var(--tx3);text-align:center;}
/* Course header */
.ch{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.ch h2{font-size:.95rem;font-weight:700;flex:1;}
/* Grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:12px;}
/* Card */
.card{height:150px;cursor:pointer;perspective:700px;position:relative;}
.ci2{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:.45s;}
.card.flip .ci2{transform:rotateY(180deg);}
.face,.back{position:absolute;inset:0;backface-visibility:hidden;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px;gap:6px;background:var(--s);border:1px solid var(--bd);}
.back{transform:rotateY(180deg);}
.card.known .face,.card.known .back{border-color:rgba(74,222,128,.4);}
.card.unk .face,.card.unk .back{border-color:rgba(248,113,113,.4);}
.ar{font-family:'Scheherazade New',serif;font-size:2.2rem;font-weight:700;direction:rtl;text-align:center;line-height:1.5;color:var(--tx);}
.ar2{font-family:'Scheherazade New',serif;font-size:1.6rem;font-weight:700;direction:rtl;text-align:center;line-height:1.4;color:var(--tx);}
.tr{font-size:.78rem;color:var(--tx2);text-align:center;}
.hint{font-size:.62rem;color:var(--tx3);}
.edit-btn{position:absolute;top:5px;right:5px;z-index:3;opacity:0;background:var(--s2);border:1px solid var(--bd);color:var(--tx2);border-radius:5px;padding:2px 6px;font-size:.62rem;cursor:pointer;}
.card:hover .edit-btn{opacity:1;}
.rate{position:absolute;bottom:5px;left:0;right:0;display:flex;justify-content:center;gap:6px;z-index:3;opacity:0;}
.card.flip .rate{opacity:1;}
.rb{padding:3px 9px;border-radius:5px;font-size:.68rem;cursor:pointer;border:1px solid;background:transparent;}
.rb.ok{border-color:var(--gr);color:var(--gr);}
.rb.ko{border-color:var(--rd);color:var(--rd);}
/* Review */
.rv{display:none;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:18px;}
.rv.on{display:flex;}
.rvc{width:320px;height:200px;cursor:pointer;perspective:700px;}
.rvi{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:.45s;}
.rvc.flip .rvi{transform:rotateY(180deg);}
.rvf,.rvb{position:absolute;inset:0;backface-visibility:hidden;background:var(--s);border:1px solid var(--bd);border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:20px;}
.rvb{transform:rotateY(180deg);}
.rv-ar{font-family:'Scheherazade New',serif;font-size:2.8rem;font-weight:700;direction:rtl;text-align:center;line-height:1.5;}
.rv-tr{font-size:.9rem;color:var(--tx2);}
.rv-btns{display:flex;gap:10px;}
.rv-btn{padding:8px 22px;border-radius:8px;font-size:.82rem;cursor:pointer;border:1px solid;background:transparent;}
.rv-btn.ok{border-color:var(--gr);color:var(--gr);}
.rv-btn.ko{border-color:var(--rd);color:var(--rd);}
/* Modal */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:100;display:none;align-items:flex-end;justify-content:center;}
.ov.on{display:flex;}
.modal{background:var(--s);border-radius:20px 20px 0 0;padding:22px;width:100%;max-width:480px;border-top:1px solid var(--bd);}
.modal h3{font-size:.95rem;margin-bottom:14px;}
.fld{margin-bottom:10px;}
.fld label{display:block;font-size:.73rem;color:var(--tx2);margin-bottom:4px;}
.fld input{width:100%;background:var(--s2);border:1px solid var(--bd);color:var(--tx);border-radius:8px;padding:9px 12px;font-size:.9rem;font-family:inherit;outline:none;}
.fld textarea{width:100%;background:var(--s2);border:1px solid var(--bd);color:var(--tx);border-radius:8px;padding:10px 12px;font-family:'Scheherazade New',serif;font-size:2rem;direction:rtl;min-height:70px;resize:none;outline:none;}
.fld input:focus,.fld textarea:focus{border-color:var(--ac);}
.mact{display:flex;gap:8px;justify-content:flex-end;margin-top:14px;}
</style>
</head>
<body>
<div class="tb">
  <h1>🃏 Flashcards Arabe</h1>
  <button class="btn" id="btn-rv" style="display:none">▶ Réviser</button>
  <button class="btn" id="btn-gr" style="display:none">⊞ Grille</button>
  <a href="index.html" class="btn">🏠</a>
</div>
<div class="layout">
  <div class="sb">
    <div class="sb-ttl">Mes cours</div>
    <div id="sb-list"></div>
    <div class="sb-add" id="btn-new">＋ Nouveau cours</div>
  </div>
  <div class="cnt" id="cnt">
    <div class="empty" id="empty">
      <div style="font-size:2.5rem">📖</div>
      <div>Sélectionne un cours dans la sidebar</div>
    </div>
    <div id="gv" style="display:none">
      <div class="ch">
        <h2 id="ctitle"></h2>
        <span id="cstats" style="font-size:.78rem;color:var(--tx2)"></span>
        <button class="btn" id="btn-add-card">＋ Carte</button>
        <button class="btn danger" id="btn-del-course">🗑️ Cours</button>
      </div>
      <div class="grid" id="grid"></div>
    </div>
    <div class="rv" id="rv">
      <div style="font-size:.82rem;color:var(--tx2)" id="rv-prog"></div>
      <div class="rvc" id="rvc">
        <div class="rvi">
          <div class="rvf">
            <div class="hint">Arabe — cliquer pour voir</div>
            <div class="rv-ar" id="rv-ar"></div>
          </div>
          <div class="rvb">
            <div class="rv-ar" id="rv-ar2" style="font-size:2rem"></div>
            <div class="rv-tr" id="rv-tr"></div>
          </div>
        </div>
      </div>
      <div class="rv-btns" id="rv-btns" style="display:none">
        <button class="rv-btn ko" id="rv-ko">✗ À revoir</button>
        <button class="rv-btn ok" id="rv-ok">✓ Su</button>
      </div>
      <button class="btn" id="rv-back">← Grille</button>
    </div>
  </div>
</div>

<!-- Modal cours -->
<div class="ov" id="ov-c">
  <div class="modal">
    <h3 id="mc-title">📖 Nouveau cours</h3>
    <div class="fld"><label>Nom</label><input type="text" id="mc-name" placeholder="ex: Cours 3"></div>
    <div class="mact">
      <button class="btn" id="mc-cancel">Annuler</button>
      <button class="btn prim" id="mc-ok">Créer</button>
    </div>
  </div>
</div>

<!-- Modal carte -->
<div class="ov" id="ov-k">
  <div class="modal">
    <h3 id="mk-title">✏️ Carte</h3>
    <div class="fld"><label>Mot arabe</label><textarea id="mk-ar" placeholder="أَهْلًا"></textarea></div>
    <div class="fld"><label>Traduction</label><input type="text" id="mk-tr" placeholder="Bienvenue"></div>
    <div class="mact">
      <button class="btn danger" id="mk-del" style="margin-right:auto">🗑️</button>
      <button class="btn" id="mk-cancel">Annuler</button>
      <button class="btn prim" id="mk-ok">Enregistrer</button>
    </div>
  </div>
</div>

<script>
const STORE='mylife_fc_v3';
let D={},cur=null,ei=-1,isAdd=false,rvCards=[],rvIdx=0;

function ls_load(){try{var d=localStorage.getItem(STORE);if(d)D=JSON.parse(d);}catch(e){}}
function ls_save(){try{localStorage.setItem(STORE,JSON.stringify(D));}catch(e){}}

function ov_open(id){document.getElementById(id).classList.add('on');}
function ov_close(id){document.getElementById(id).classList.remove('on');}

// Données Cours 3 préchargées
var COURS3_CARDS=[
  {arabic:"شُعْبَةَ",translation:"Section / département",known:null},
  {arabic:"الْمُسْتَوَى الْأَوَّلُ",translation:"Le premier niveau",known:null},
  {arabic:"الْمَقْصَفُ",translation:"La cafétéria",known:null},
  {arabic:"عِمَارَةٌ",translation:"Bâtiment / immeuble",known:null},
  {arabic:"شَارِعٌ",translation:"Avenue / rue",known:null},
  {arabic:"قِطَارٌ",translation:"Train",known:null},
  {arabic:"أَمَرَ اللَّهُ",translation:"Allah a ordonné",known:null},
  {arabic:"وَلَمْ يَرَهُ أَحَدٌ",translation:"Personne ne l'a vu",known:null},
  {arabic:"وَهَاجَرَ",translation:"Et il émigra",known:null},
  {arabic:"وَصَاحِبُهُ",translation:"Et son compagnon",known:null},
  {arabic:"سَالِمَيْنِ",translation:"Sains et saufs",known:null},
  {arabic:"بِالْفَرَحِ وَالسُّرُورِ",translation:"Avec joie et bonheur",known:null},
  {arabic:"آخَى بَيْنَ كُلِّ",translation:"Il fraternisa entre tous",known:null},
  {arabic:"مُهَاجِرٍ وَأَنْصَارِي",translation:"Émigrant et Ansar",known:null},
  {arabic:"وَهُوَ أَوَّلُ مَسْجِدٍ",translation:"C'est la première mosquée",known:null},
  {arabic:"الْمَسْجِدَ النَّبَوِيَّ",translation:"La mosquée prophétique",known:null},
  {arabic:"عَشَرَ سَنَوَاتٍ",translation:"Dix années",known:null},
  {arabic:"وَيُجَاهِدُ الْكُفَّارَ",translation:"Il combat les mécréants",known:null},
  {arabic:"مَكَانٍ فِي الْعَالَمِ",translation:"Endroit dans le monde",known:null},
  {arabic:"صَلَّيْتُ تَحِيَّةَ الْمَسْجِدِ",translation:"J'ai prié la tahiyya de la mosquée",known:null},
  {arabic:"مُتَأَخِّرًا",translation:"En retard",known:null}
];

ls_load();

// Injecter Cours 3 si absent
if(!Object.values(D).some(function(c){return c.name.indexOf('Cours 3')>=0;})){
  D['fc_cours3']={name:'Cours 3 — الْهِجْرَةُ',cards:COURS3_CARDS};
  ls_save();
}

// Render sidebar
function renderSb(){
  var list=document.getElementById('sb-list');
  list.innerHTML='';
  Object.entries(D).forEach(function(e){
    var id=e[0],c=e[1];
    var el=document.createElement('div');
    el.className='ci'+(id===cur?' active':'');
    var known=c.cards.filter(function(x){return x.known;}).length;
    el.innerHTML='<span style="flex:1">'+c.name+'</span><span class="ci-badge">'+c.cards.length+'</span>';
    el.onclick=function(){selectCourse(id);};
    list.appendChild(el);
  });
}

function selectCourse(id){
  cur=id;
  showGrid();
  renderSb();
}

function showEmpty(){
  document.getElementById('empty').style.display='flex';
  document.getElementById('gv').style.display='none';
  document.getElementById('rv').classList.remove('on');
  document.getElementById('btn-rv').style.display='none';
  document.getElementById('btn-gr').style.display='none';
  cur=null;renderSb();
}

function showGrid(){
  if(!cur||!D[cur]){showEmpty();return;}
  var c=D[cur];
  document.getElementById('empty').style.display='none';
  document.getElementById('gv').style.display='block';
  document.getElementById('rv').classList.remove('on');
  document.getElementById('btn-rv').style.display='inline-block';
  document.getElementById('btn-gr').style.display='none';
  document.getElementById('ctitle').textContent=c.name;
  var known=c.cards.filter(function(x){return x.known;}).length;
  document.getElementById('cstats').textContent=c.cards.length+' cartes · ✓ '+known;
  var grid=document.getElementById('grid');
  grid.innerHTML='';
  c.cards.forEach(function(card,i){
    var el=document.createElement('div');
    el.className='card'+(card.known?' known':card.known===false?' unk':'');
    el.innerHTML=
      '<div class="ci2">'+
        '<div class="face"><div class="ar">'+card.arabic+'</div><div class="hint">cliquer ↓</div></div>'+
        '<div class="back"><div class="ar2">'+card.arabic+'</div><div class="tr">'+card.translation+'</div></div>'+
      '</div>'+
      '<button class="edit-btn" data-i="'+i+'">✎</button>'+
      '<div class="rate">'+
        '<button class="rb ko" data-i="'+i+'" data-v="0">✗</button>'+
        '<button class="rb ok" data-i="'+i+'" data-v="1">✓</button>'+
      '</div>';
    el.querySelector('.ci2').onclick=function(e){
      if(e.target.closest('.edit-btn')||e.target.closest('.rate'))return;
      el.classList.toggle('flip');
    };
    el.querySelector('.edit-btn').onclick=function(e){
      e.stopPropagation();
      openCard(parseInt(e.target.dataset.i),false);
    };
    el.querySelectorAll('.rb').forEach(function(b){
      b.onclick=function(e){
        e.stopPropagation();
        c.cards[parseInt(b.dataset.i)].known=b.dataset.v==='1';
        ls_save();showGrid();
      };
    });
    grid.appendChild(el);
  });
}

function showReview(){
  if(!cur||!D[cur])return;
  var c=D[cur];
  rvCards=c.cards.slice().sort(function(a,b){
    if(a.known&&!b.known)return 1;
    if(!a.known&&b.known)return -1;
    return Math.random()-.5;
  });
  rvIdx=0;
  document.getElementById('gv').style.display='none';
  document.getElementById('rv').classList.add('on');
  document.getElementById('btn-rv').style.display='none';
  document.getElementById('btn-gr').style.display='inline-block';
  renderRv();
}

function renderRv(){
  if(rvIdx>=rvCards.length){
    document.getElementById('rv-ar').textContent='🎉';
    document.getElementById('rv-ar2').textContent='🎉';
    document.getElementById('rv-tr').textContent='Terminé !';
    document.getElementById('rv-btns').style.display='none';
    document.getElementById('rv-prog').textContent=rvCards.length+'/'+rvCards.length;
    return;
  }
  var card=rvCards[rvIdx];
  document.getElementById('rv-ar').textContent=card.arabic;
  document.getElementById('rv-ar2').textContent=card.arabic;
  document.getElementById('rv-tr').textContent=card.translation;
  document.getElementById('rv-prog').textContent=(rvIdx+1)+'/'+rvCards.length;
  document.getElementById('rv-btns').style.display='none';
  document.getElementById('rvc').classList.remove('flip');
}

document.getElementById('rvc').onclick=function(){
  this.classList.add('flip');
  document.getElementById('rv-btns').style.display='flex';
};
document.getElementById('rv-ok').onclick=function(){
  var o=D[cur].cards.find(function(c){return c.arabic===rvCards[rvIdx].arabic;});
  if(o)o.known=true;ls_save();rvIdx++;renderRv();
};
document.getElementById('rv-ko').onclick=function(){
  var o=D[cur].cards.find(function(c){return c.arabic===rvCards[rvIdx].arabic;});
  if(o)o.known=false;ls_save();rvIdx++;renderRv();
};
document.getElementById('rv-back').onclick=function(){showGrid();};
document.getElementById('btn-rv').onclick=showReview;
document.getElementById('btn-gr').onclick=function(){showGrid();};

// Edit/add card
function openCard(i,add){
  ei=i;isAdd=add;
  document.getElementById('mk-title').textContent=add?'➕ Nouvelle carte':'✏️ Modifier la carte';
  document.getElementById('mk-del').style.display=add?'none':'inline-block';
  var card=add?{arabic:'',translation:''}:D[cur].cards[i];
  document.getElementById('mk-ar').value=card.arabic;
  document.getElementById('mk-tr').value=card.translation;
  ov_open('ov-k');
  setTimeout(function(){document.getElementById('mk-ar').focus();},100);
}
document.getElementById('mk-ok').onclick=function(){
  var ar=document.getElementById('mk-ar').value.trim();
  var tr=document.getElementById('mk-tr').value.trim();
  if(!ar)return;
  if(isAdd){D[cur].cards.push({arabic:ar,translation:tr,known:null});}
  else{D[cur].cards[ei].arabic=ar;D[cur].cards[ei].translation=tr;}
  ls_save();ov_close('ov-k');showGrid();
};
document.getElementById('mk-del').onclick=function(){
  if(!confirm('Supprimer cette carte ?'))return;
  D[cur].cards.splice(ei,1);
  ls_save();ov_close('ov-k');showGrid();
};
document.getElementById('mk-cancel').onclick=function(){ov_close('ov-k');};
document.getElementById('btn-add-card').onclick=function(){openCard(-1,true);};

// Nouveau cours
document.getElementById('btn-new').onclick=function(){
  document.getElementById('mc-name').value='';
  document.getElementById('mc-title').textContent='📖 Nouveau cours';
  ov_open('ov-c');
  setTimeout(function(){document.getElementById('mc-name').focus();},100);
};
document.getElementById('mc-ok').onclick=function(){
  var name=document.getElementById('mc-name').value.trim();
  if(!name)return;
  var id='fc_'+Date.now();
  D[id]={name:name,cards:[]};
  ls_save();ov_close('ov-c');renderSb();selectCourse(id);
};
document.getElementById('mc-cancel').onclick=function(){ov_close('ov-c');};
document.getElementById('mc-name').onkeydown=function(e){if(e.key==='Enter')document.getElementById('mc-ok').click();};
document.getElementById('mk-ar').onkeydown=function(e){if(e.key==='Enter'&&e.ctrlKey)document.getElementById('mk-ok').click();};

// Supprimer cours
document.getElementById('btn-del-course').onclick=function(){
  if(!confirm('Supprimer ce cours ?'))return;
  delete D[cur];ls_save();cur=null;renderSb();
  var ids=Object.keys(D);
  if(ids.length)selectCourse(ids[0]);else showEmpty();
};

// Fermer modals
['ov-c','ov-k'].forEach(function(id){
  document.getElementById(id).onclick=function(e){if(e.target.id===id)ov_close(id);};
});

// Init
renderSb();
var ids=Object.keys(D);
if(ids.length)selectCourse(ids[0]);else showEmpty();
</script>
</body>
</html>
