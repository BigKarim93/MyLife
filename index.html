<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyLife</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Kalam:wght@700&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#16261e;--bg2:#1f3a2c;--bg3:#274a37;
  --line:rgba(238,241,234,.09);--line-strong:rgba(238,241,234,.18);
  --chalk:#f1efe4;--chalk-dim:#aebcb1;--accent:#f2c14e;
  --radius:12px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Work Sans',system-ui,sans-serif;background:var(--bg);color:var(--chalk);min-height:100vh;
  background-image:radial-gradient(ellipse at 20% 0%,rgba(255,255,255,.04),transparent 60%),
    radial-gradient(ellipse at 90% 100%,rgba(255,255,255,.03),transparent 60%);}

/* TOPBAR */
.topbar{
  position:sticky;top:0;z-index:50;
  background:linear-gradient(180deg,var(--bg2),rgba(31,58,44,.92));
  border-bottom:2px solid var(--line-strong);
  padding:10px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;
  backdrop-filter:blur(4px);
}
.topbar h1{font-family:'Kalam',cursive;font-size:1.5rem;color:var(--accent);margin:0;}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.user-email{font-size:.8rem;color:var(--chalk-dim);}

.btn{background:var(--bg3);border:1px solid var(--line);color:var(--chalk);padding:8px 14px;border-radius:8px;font-size:.88rem;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s;display:inline-flex;align-items:center;gap:6px;}
.btn:hover{border-color:var(--accent);}
.btn.primary{background:var(--accent);color:#21321f;border-color:var(--accent);}
.btn.active{background:var(--accent);color:#21321f;border-color:var(--accent);}
.btn.danger{background:#5a2b2b;border-color:#7a3a3a;}

/* AUTH */
.auth-wrap{display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 60px);padding:20px;}
.auth-card{background:var(--bg2);border:1px solid var(--line-strong);border-radius:var(--radius);padding:28px;width:100%;max-width:380px;}
.auth-card h2{font-family:'Kalam',cursive;color:var(--accent);margin-bottom:6px;}
.auth-card .sub{color:var(--chalk-dim);font-size:.85rem;margin-bottom:18px;}
.google-btn{justify-content:center;gap:10px;background:#fff;color:#3c4043;border-color:#dadce0;padding:12px 16px;font-size:.95rem;width:100%;margin-bottom:14px;}
.google-btn:hover{box-shadow:0 1px 4px rgba(0,0,0,.25);border-color:#dadce0;}
.auth-divider{display:flex;align-items:center;gap:10px;color:var(--chalk-dim);font-size:.8rem;margin-bottom:14px;}
.auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--line);}
.field{margin-bottom:10px;display:flex;flex-direction:column;gap:4px;}
.field label{font-size:.78rem;color:var(--chalk-dim);font-weight:600;}
.field input{background:var(--bg);border:1px solid var(--line);color:var(--chalk);border-radius:6px;padding:9px 12px;font-size:.9rem;font-family:inherit;}
.auth-error{color:#ffb3b3;background:rgba(255,80,80,.1);border:1px solid rgba(255,80,80,.3);border-radius:6px;padding:8px 10px;font-size:.82rem;margin-bottom:10px;display:none;}
.auth-switch{margin-top:12px;text-align:center;font-size:.85rem;color:var(--chalk-dim);}
.auth-switch a{color:var(--accent);text-decoration:none;cursor:pointer;font-weight:600;}

/* HUB FREEFORM */
main{padding:16px;min-height:calc(100vh - 60px);}
.hub-toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.hub-toolbar h2{font-family:'Kalam',cursive;font-size:1.2rem;flex:1;}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:14px;
}

/* TILE */
.tile{
  background:var(--bg2);border:1px solid var(--line-strong);border-radius:var(--radius);
  padding:20px;text-decoration:none;color:var(--chalk);
  display:flex;flex-direction:column;gap:8px;min-height:120px;
  position:relative;transition:.15s;cursor:pointer;
}
.tile:hover{border-color:var(--accent);transform:translateY(-2px);}
.tile .icon{font-size:2rem;line-height:1;}
.tile h3{font-family:'Kalam',cursive;font-size:1.1rem;margin:0;}
.tile p{font-size:.8rem;color:var(--chalk-dim);margin:0;}
.tile .badge{position:absolute;top:8px;right:8px;font-size:.65rem;background:var(--bg3);border:1px solid var(--line);border-radius:4px;padding:2px 6px;color:var(--chalk-dim);}
.tile.disabled{opacity:.4;pointer-events:none;}

/* EDIT MODE */
.tile .tile-del{
  position:absolute;top:-8px;right:-8px;width:22px;height:22px;border-radius:50%;
  background:#c0392b;color:#fff;border:2px solid var(--bg);
  font-size:12px;display:none;align-items:center;justify-content:center;
  cursor:pointer;z-index:5;line-height:1;
}
body.edit-mode .tile .tile-del{display:flex;}
body.edit-mode .tile{cursor:grab;}
body.edit-mode .tile:hover{border-color:var(--accent);}
.tile.drag-over{border-color:var(--accent);background:rgba(242,193,78,.08);}
.tile.dragging{opacity:.5;}

/* ADD TILE */
.tile-add{
  background:transparent;border:2px dashed var(--line);border-radius:var(--radius);
  padding:20px;min-height:120px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:8px;cursor:pointer;
  color:var(--chalk-dim);font-size:.9rem;font-weight:600;transition:.15s;
}
.tile-add:hover{border-color:var(--accent);color:var(--accent);}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(10,16,12,.7);display:none;align-items:center;justify-content:center;z-index:100;padding:16px;}
.overlay.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--line-strong);border-radius:var(--radius);padding:20px;width:100%;max-width:400px;max-height:90vh;overflow:auto;}
.modal h3{font-family:'Kalam',cursive;color:var(--accent);margin-bottom:12px;}
.emoji-grid{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:4px;}
.emoji-opt{background:var(--bg3);border:1px solid var(--line);border-radius:6px;padding:4px 6px;font-size:1.3rem;cursor:pointer;}
.emoji-opt:hover{border-color:var(--accent);}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:14px;}

.hidden{display:none;}
.loading-screen{position:fixed;inset:0;background:var(--bg);z-index:500;display:flex;align-items:center;justify-content:center;}
.loading-screen.hidden{display:none;}
.loading-box{text-align:center;color:var(--chalk-dim);}
.loading-box p{margin-top:14px;font-size:.9rem;}
.spinner{width:34px;height:34px;border-radius:50%;border:3px solid var(--line-strong);border-top-color:var(--accent);margin:0 auto;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
footer{text-align:center;color:var(--chalk-dim);font-size:.75rem;padding:16px;}
</style>
</head>
<body>

<div class="loading-screen" id="loading-screen">
  <div class="loading-box"><div class="spinner"></div><p id="loading-text">Connexion à MyLife…</p></div>
</div>

<div class="topbar">
  <h1>🏠 MyLife</h1>
  <div class="topbar-right hidden" id="topbar-right">
    <span class="user-email" id="user-email"></span>
    <button class="btn" id="btn-logout">Déconnexion</button>
  </div>
</div>

<!-- AUTH -->
<div class="auth-wrap hidden" id="auth-wrap">
  <div class="auth-card">
    <h2>MyLife</h2>
    <p class="sub">Connecte-toi pour accéder à tes modules.</p>
    <div class="auth-error" id="auth-error"></div>
    <button class="btn google-btn" id="auth-google">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.5H42V20.4H24v7.2h11.3C33.7 32 29.3 35 24 35c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 8 3l5.1-5.1C33.6 5.3 29.1 3.5 24 3.5 12.7 3.5 3.5 12.7 3.5 24S12.7 44.5 24 44.5 44.5 35.3 44.5 24c0-1.2-.1-2.4-.3-3.5z"/><path fill="#FF3D00" d="M6.3 14.7l5.9 4.3C13.7 15.6 18.5 12.5 24 12.5c3.1 0 5.8 1.1 8 3l5.1-5.1C33.6 7.3 29.1 5.5 24 5.5 16.2 5.5 9.5 9.9 6.3 14.7z"/><path fill="#4CAF50" d="M24 44.5c5.1 0 9.6-1.7 12.8-4.7l-5.9-5c-1.6 1.2-3.7 1.9-6.9 1.9-5.3 0-9.7-3-11.4-7.2l-5.9 4.6C9.4 39.9 16.2 44.5 24 44.5z"/><path fill="#1976D2" d="M43.6 20.5H42V20.4H24v7.2h11.3c-.8 2.3-2.3 4.2-4.3 5.6l5.9 5C40.9 35 44.5 30.1 44.5 24c0-1.2-.1-2.4-.3-3.5z"/></svg>
      Continuer avec Google
    </button>
    <div class="auth-divider"><span>ou</span></div>
    <div class="field"><label>Email</label><input type="email" id="auth-email" autocomplete="email"></div>
    <div class="field"><label>Mot de passe</label><input type="password" id="auth-password" autocomplete="current-password"></div>
    <button class="btn primary" style="width:100%;justify-content:center;" id="auth-submit">Se connecter</button>
    <div class="auth-switch"><span id="auth-sw-txt">Pas encore de compte ?</span> <a id="auth-sw-link">Créer un compte</a></div>
  </div>
</div>

<!-- HUB -->
<main class="hidden" id="hub">
  <div class="hub-toolbar">
    <h2>Mes modules</h2>
    <button class="btn" id="btn-edit">✏️ Modifier</button>
  </div>
  <div class="grid" id="grid"></div>
</main>

<!-- MODAL: ajouter/modifier une tuile -->
<div class="overlay" id="tile-overlay">
  <div class="modal">
    <h3 id="tile-modal-title">Ajouter un module</h3>
    <div class="field"><label>Emoji</label>
      <div class="emoji-grid">
        <button type="button" class="emoji-opt" onclick="setTileEmoji('📋')">📋</button>
        <button type="button" class="emoji-opt" onclick="setTileEmoji('📖')">📖</button>
        <button type="button" class="emoji-opt" onclick="setTileEmoji('✈️')">✈️</button>
        <button type="button" class="emoji-opt" onclick="setTileEmoji('🏋️')">🏋️</button>
        <button type="button" class="emoji-opt" onclick="setTileEmoji('🎵')">🎵</button>
        <button type="button" class="emoji-opt" onclick="setTileEmoji('🏥')">🏥</button>
        <button type="button" class="emoji-opt" onclick="setTileEmoji('💊')">💊</button>
        <button type="button" class="emoji-opt" onclick="setTileEmoji('🎮')">🎮</button>
        <button type="button" class="emoji-opt" onclick="setTileEmoji('📷')">📷</button>
        <button type="button" class="emoji-opt" onclick="setTileEmoji('🌍')">🌍</button>
        <button type="button" class="emoji-opt" onclick="setTileEmoji('🧠')">🧠</button>
        <button type="button" class="emoji-opt" onclick="setTileEmoji('⭐')">⭐</button>
      </div>
      <input type="text" id="tile-emoji" maxlength="4" style="width:60px;font-size:1.3rem;text-align:center;margin-top:6px;">
    </div>
    <div class="field"><label>Nom</label><input type="text" id="tile-name" maxlength="30" placeholder="Mon module"></div>
    <div class="field"><label>Description (optionnel)</label><input type="text" id="tile-desc" maxlength="60" placeholder="Courte description…"></div>
    <div class="field"><label>Lien (fichier .html ou URL)</label><input type="text" id="tile-url" placeholder="planning.html ou https://…"></div>
    <div class="field"><label>Couleur de fond</label>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button type="button" class="btn" style="background:#16261e;" onclick="setTileColor('#16261e')">Défaut</button>
        <button type="button" class="btn" style="background:#1a2744;" onclick="setTileColor('#1a2744')">Bleu nuit</button>
        <button type="button" class="btn" style="background:#2a1a44;" onclick="setTileColor('#2a1a44')">Violet</button>
        <button type="button" class="btn" style="background:#442a1a;" onclick="setTileColor('#442a1a')">Brique</button>
        <button type="button" class="btn" style="background:#1a3a2a;" onclick="setTileColor('#1a3a2a')">Forêt</button>
        <input type="color" id="tile-color" style="width:36px;height:36px;border-radius:6px;border:1px solid var(--line);background:var(--bg);cursor:pointer;padding:2px;">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn danger hidden" id="tile-delete">Supprimer</button>
      <button class="btn" id="tile-cancel">Annuler</button>
      <button class="btn primary" id="tile-save">Enregistrer</button>
    </div>
  </div>
</div>

<!-- Firebase -->
<script src="firebase-config.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
// ─── DEFAULT TILES ───
const DEFAULT_TILES = [
  {id:'t1', icon:'📋', name:'Mon Planning', desc:'Emploi du temps, semaine A/B, sommeil.', url:'planning.html', color:'#16261e'},
  {id:'t2', icon:'📖', name:'Arabe — Médine', desc:'Leçons, vocabulaire, exercices et examens.', url:'arabe.html', color:'#16261e'},
  {id:'t3', icon:'🧠', name:'QCM Arabe', desc:'463 mots — entraîne-toi au vocabulaire !', url:'qcm-arabe.html', color:'#16261e'},
  {id:'t4', icon:'✈️', name:'PPL — Aviation', desc:'Bientôt disponible.', url:'', color:'#16261e', disabled:true},
];

// ─── STATE ───
let tiles = JSON.parse(localStorage.getItem('mylife_tiles') || 'null') || DEFAULT_TILES.map(t=>({...t}));
let editMode = false;
let editingTileId = null;
let dragSrcIdx = null;
let hubDocRef = null, saveTimer = null;

// ─── FIREBASE ───
firebase.initializeApp(window.FIREBASE_CONFIG);
const auth = firebase.auth(), db = firebase.firestore();
try{db.enablePersistence({synchronizeTabs:true}).catch(()=>{});}catch(e){}

auth.onAuthStateChanged(async user=>{
  if(!user){
    document.getElementById('loading-screen').classList.add('hidden');
    document.getElementById('auth-wrap').classList.remove('hidden');
    return;
  }
  document.getElementById('user-email').textContent = user.email || user.displayName || '';
  document.getElementById('topbar-right').classList.remove('hidden');
  hubDocRef = db.collection('users').doc(user.uid).collection('modules').doc('hub');
  document.getElementById('loading-text').textContent = 'Chargement…';
  try{
    const snap = await hubDocRef.get();
    if(snap.exists && snap.data().tiles){
      tiles = snap.data().tiles;
    } else {
      await hubDocRef.set({tiles});
    }
    try{localStorage.setItem('mylife_tiles', JSON.stringify(tiles));}catch(e){}
  }catch(e){
    const local = localStorage.getItem('mylife_tiles');
    if(local) tiles = JSON.parse(local);
  }
  document.getElementById('loading-screen').classList.add('hidden');
  document.getElementById('auth-wrap').classList.add('hidden');
  document.getElementById('hub').classList.remove('hidden');
  renderGrid();
});

function saveTiles(){
  try{localStorage.setItem('mylife_tiles', JSON.stringify(tiles));}catch(e){}
  if(!hubDocRef) return;
  clearTimeout(saveTimer);
  saveTimer = setTimeout(()=> hubDocRef.set({tiles}).catch(()=>{}), 800);
}

// ─── AUTH ───
let authMode = 'login';
document.getElementById('auth-google').addEventListener('click', async()=>{
  clearErr();
  try{ await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
  catch(e){ showErr(e); }
});
document.getElementById('auth-submit').addEventListener('click', async()=>{
  clearErr();
  const email = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  if(!email||!password){ showErr({message:'Remplis email et mot de passe.'}); return; }
  try{
    if(authMode==='signup') await auth.createUserWithEmailAndPassword(email,password);
    else await auth.signInWithEmailAndPassword(email,password);
  }catch(e){ showErr(e); }
});
document.getElementById('auth-sw-link').addEventListener('click',()=>{
  authMode = authMode==='login'?'signup':'login';
  document.getElementById('auth-submit').textContent = authMode==='login'?'Se connecter':"S'inscrire";
  document.getElementById('auth-sw-txt').textContent = authMode==='login'?'Pas encore de compte ?':'Déjà un compte ?';
  document.getElementById('auth-sw-link').textContent = authMode==='login'?'Créer un compte':'Se connecter';
});
document.getElementById('btn-logout').addEventListener('click',()=> auth.signOut());
function showErr(e){ const el=document.getElementById('auth-error'); el.textContent=e.message||e; el.style.display='block'; }
function clearErr(){ document.getElementById('auth-error').style.display='none'; }

// ─── GRID ───
function renderGrid(){
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  tiles.forEach((tile, idx)=>{
    const el = document.createElement(tile.url&&!tile.disabled ? 'a' : 'div');
    el.className = 'tile'+(tile.disabled?' disabled':'');
    if(tile.url&&!tile.disabled&&!editMode) el.href = tile.url;
    if(tile.color) el.style.background = tile.color;

    el.innerHTML = `
      <button class="tile-del" title="Supprimer">✕</button>
      <div class="icon">${tile.icon||'📦'}</div>
      <h3>${escHtml(tile.name)}</h3>
      ${tile.desc?`<p>${escHtml(tile.desc)}</p>`:''}
    `;
    el.querySelector('.tile-del').addEventListener('click', e=>{ e.preventDefault(); e.stopPropagation(); removeTile(tile.id); });

    if(editMode){
      el.addEventListener('click', e=>{ e.preventDefault(); openTileModal(tile); });
      // drag-and-drop to reorder
      el.draggable = true;
      el.addEventListener('dragstart', ()=>{ dragSrcIdx=idx; el.classList.add('dragging'); });
      el.addEventListener('dragend', ()=>{ el.classList.remove('dragging'); document.querySelectorAll('.tile').forEach(t=>t.classList.remove('drag-over')); });
      el.addEventListener('dragover', e=>{ e.preventDefault(); el.classList.add('drag-over'); });
      el.addEventListener('dragleave', ()=>el.classList.remove('drag-over'));
      el.addEventListener('drop', e=>{ e.preventDefault(); if(dragSrcIdx!==null&&dragSrcIdx!==idx){ const t=tiles.splice(dragSrcIdx,1)[0]; tiles.splice(idx,0,t); saveTiles(); renderGrid(); } });
    }
    grid.appendChild(el);
  });

  // Add tile button
  const addBtn = document.createElement('div');
  addBtn.className = 'tile-add';
  addBtn.innerHTML = '<span style="font-size:1.8rem;">＋</span><span>Ajouter un module</span>';
  addBtn.addEventListener('click', ()=> openTileModal(null));
  grid.appendChild(addBtn);
}

// ─── EDIT MODE ───
document.getElementById('btn-edit').addEventListener('click',()=>{
  editMode = !editMode;
  document.getElementById('btn-edit').classList.toggle('active', editMode);
  document.body.classList.toggle('edit-mode', editMode);
  renderGrid();
});

// ─── TILE MODAL ───
const tileOverlay = document.getElementById('tile-overlay');
function openTileModal(tile){
  editingTileId = tile ? tile.id : null;
  document.getElementById('tile-modal-title').textContent = tile ? 'Modifier le module' : 'Ajouter un module';
  document.getElementById('tile-emoji').value = tile ? (tile.icon||'') : '';
  document.getElementById('tile-name').value = tile ? tile.name : '';
  document.getElementById('tile-desc').value = tile ? (tile.desc||'') : '';
  document.getElementById('tile-url').value = tile ? (tile.url||'') : '';
  document.getElementById('tile-color').value = tile ? (tile.color||'#16261e') : '#16261e';
  document.getElementById('tile-delete').classList.toggle('hidden', !tile);
  tileOverlay.classList.add('open');
}
function closeTileModal(){ tileOverlay.classList.remove('open'); editingTileId=null; }
document.getElementById('tile-cancel').addEventListener('click', closeTileModal);
function setTileEmoji(e){ document.getElementById('tile-emoji').value = e; }
function setTileColor(c){ document.getElementById('tile-color').value = c; }

document.getElementById('tile-save').addEventListener('click',()=>{
  const name = document.getElementById('tile-name').value.trim();
  if(!name){ alert('Nom requis.'); return; }
  const data = {
    id: editingTileId || 't'+Date.now(),
    icon: document.getElementById('tile-emoji').value.trim() || '📦',
    name,
    desc: document.getElementById('tile-desc').value.trim(),
    url: document.getElementById('tile-url').value.trim(),
    color: document.getElementById('tile-color').value,
    disabled: !document.getElementById('tile-url').value.trim()
  };
  if(editingTileId){
    const idx = tiles.findIndex(t=>t.id===editingTileId);
    if(idx>-1) tiles[idx]=data;
  } else {
    tiles.push(data);
  }
  saveTiles();
  closeTileModal();
  renderGrid();
});
document.getElementById('tile-delete').addEventListener('click',()=>{
  if(!editingTileId) return;
  if(!confirm('Supprimer ce module ?')) return;
  tiles = tiles.filter(t=>t.id!==editingTileId);
  saveTiles();
  closeTileModal();
  renderGrid();
});

function removeTile(id){
  if(!confirm('Supprimer ce module ?')) return;
  tiles = tiles.filter(t=>t.id!==id);
  saveTiles();
  renderGrid();
}

function escHtml(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
</script>
</body>
</html>
