<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MyLife</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Kalam:wght@700&family=Work+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#16261e;--bg2:#1f3a2c;--bg3:#274a37;--line:rgba(238,241,234,.09);--line2:rgba(238,241,234,.18);--chalk:#f1efe4;--dim:#aebcb1;--accent:#f2c14e;--green:#4ade80;--gl:rgba(74,222,128,.13);--red:#f87171;--r:12px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Work Sans',sans-serif;background:var(--bg);color:var(--chalk);min-height:100vh;}
h1,h2,h3{font-family:'Kalam',cursive;}
input,button,select{font-family:inherit;}
.btn{background:var(--bg3);border:1px solid var(--line);color:var(--chalk);padding:6px 12px;border-radius:8px;font-size:.82rem;font-weight:600;cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;}
.btn:hover{border-color:var(--accent);}
.btn.prim{background:var(--accent);color:#21321f;border-color:var(--accent);}
.btn.sm{padding:4px 8px;font-size:.72rem;}
.btn.act{background:var(--accent);color:#21321f;}
.btn.dn{background:#5a2b2b;border-color:#7a3a3a;}

/* TOPBAR */
.tb{position:sticky;top:0;z-index:50;background:linear-gradient(var(--bg2),rgba(31,58,44,.95));border-bottom:2px solid var(--line2);padding:10px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;backdrop-filter:blur(4px);}
.tb h1{font-size:1.3rem;color:var(--accent);}
.tb-r{margin-left:auto;display:flex;align-items:center;gap:8px;}

/* AUTH */
.auth-wrap{display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 62px);padding:20px;}
.auth-box{background:var(--bg2);border:1px solid var(--line2);border-radius:var(--r);padding:26px;width:100%;max-width:360px;}
.auth-box h2{color:var(--accent);margin-bottom:5px;}
.auth-sub{color:var(--dim);font-size:.83rem;margin-bottom:16px;}
.g-btn{justify-content:center;gap:10px;background:#fff;color:#3c4043;border-color:#dadce0;padding:11px;font-size:.9rem;width:100%;margin-bottom:12px;}
.divider{display:flex;align-items:center;gap:8px;color:var(--dim);font-size:.78rem;margin-bottom:12px;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--line);}
.fld{margin-bottom:9px;display:flex;flex-direction:column;gap:3px;}
.fld label{font-size:.75rem;color:var(--dim);font-weight:600;}
.fld input,.fld select{background:var(--bg);border:1px solid var(--line);color:var(--chalk);border-radius:6px;padding:8px 10px;font-size:.88rem;width:100%;}
.auth-err{color:#ffb3b3;background:rgba(255,80,80,.1);border:1px solid rgba(255,80,80,.3);border-radius:6px;padding:7px;font-size:.8rem;margin-bottom:8px;display:none;}
.auth-sw{margin-top:10px;text-align:center;font-size:.82rem;color:var(--dim);}
.auth-sw a{color:var(--accent);cursor:pointer;font-weight:600;}

/* PAGE */
.page{display:flex;gap:12px;padding:12px;align-items:flex-start;}

/* MODULES */
.mod-col{width:190px;flex-shrink:0;display:flex;flex-direction:column;gap:7px;}
.mod-col-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px;}
.mod-col-hdr h2{font-size:.9rem;}
.mtile{background:var(--bg2);border:1px solid var(--line2);border-radius:9px;padding:10px;color:var(--chalk);display:flex;align-items:center;gap:8px;position:relative;transition:.15s;cursor:pointer;}
.mtile:hover{border-color:var(--accent);}
.mico{font-size:1.3rem;line-height:1;flex-shrink:0;}
.minfo h3{font-size:.83rem;font-family:'Kalam',cursive;}
.minfo p{font-size:.65rem;color:var(--dim);}
.mdel{position:absolute;top:-6px;right:-6px;width:17px;height:17px;border-radius:50%;background:#c0392b;color:#fff;border:2px solid var(--bg);font-size:9px;display:none;align-items:center;justify-content:center;cursor:pointer;z-index:5;}
.mtile.drag-over{border-color:var(--accent);}
.mtile.dragging{opacity:.4;}
.mtile.dis{opacity:.4;}
.add-mod{background:transparent;border:2px dashed var(--line);border-radius:9px;padding:9px;display:flex;align-items:center;justify-content:center;gap:5px;cursor:pointer;color:var(--dim);font-size:.8rem;font-weight:600;transition:.15s;width:100%;}
.add-mod:hover{border-color:var(--accent);color:var(--accent);}

/* GRID — copié de test3.html */
.grid-col{flex:1;min-width:0;}
.grid-wrap{position:relative;}
.ghost-layer{display:none;position:absolute;top:0;left:0;right:0;bottom:0;grid-template-columns:repeat(4,1fr);grid-auto-rows:200px;gap:10px;z-index:100;pointer-events:none;}
.ghost-layer.active{display:grid;pointer-events:all;}
.gcell{border-radius:var(--r);border:2px solid rgba(242,193,78,.5);background:rgba(242,193,78,.15);cursor:crosshair;transition:.1s;}
.gcell:hover{background:rgba(242,193,78,.45);border-color:var(--accent);}
.wgrid{display:grid;grid-template-columns:repeat(4,1fr);grid-auto-rows:200px;gap:10px;}
.wcell{position:relative;z-index:1;}
.wcell.picked{outline:3px solid var(--accent);outline-offset:3px;z-index:2;}
.wh-move,.wh-size{display:none;background:rgba(242,193,78,.2);border:1px solid rgba(242,193,78,.5);border-radius:5px;padding:3px 7px;cursor:pointer;font-size:.7rem;color:var(--accent);font-weight:700;user-select:none;}
body.gedit .wh-move, body.gedit .wh-size{display:inline-flex;align-items:center;}

/* WIDGET */
.widget{background:var(--bg2);border:1px solid var(--line2);border-radius:var(--r);display:flex;flex-direction:column;height:100%;overflow:hidden;}
.whdr{padding:9px 12px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:7px;flex-shrink:0;}
.whdr h2{font-size:.88rem;flex:1;}
.wbody{padding:10px 12px;overflow-y:auto;flex:1;min-height:0;}

/* TASKS */
.tadd{display:flex;gap:6px;margin-bottom:7px;}
.tadd input{flex:1;background:var(--bg);border:1px solid var(--line);color:var(--chalk);border-radius:6px;padding:6px 9px;font-size:.8rem;}
.tlist{display:flex;flex-direction:column;gap:4px;max-height:140px;overflow-y:auto;}
.titem{display:flex;align-items:center;gap:7px;padding:6px 9px;background:var(--bg3);border:1px solid var(--line);border-radius:7px;}
.titem:hover{border-color:var(--line2);}
.tck{width:16px;height:16px;border-radius:4px;border:2px solid var(--line);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:transparent;}
.tck.on{background:var(--green);border-color:var(--green);}
.tck.on::after{content:'✓';font-size:.65rem;color:#0f1117;font-weight:700;}
.ttxt{flex:1;font-size:.78rem;}
.ttxt.sk{text-decoration:line-through;color:var(--dim);}
.tdl{font-size:.68rem;color:var(--dim);cursor:pointer;opacity:0;padding:2px 4px;border-radius:4px;border:1px solid transparent;}
.titem:hover .tdl{opacity:1;}
.tdl:hover{border-color:var(--red);color:var(--red);}
.empty{text-align:center;padding:12px;color:var(--dim);font-size:.78rem;}

/* EMOJI PICKER */
.epf{position:relative;}
.epr{display:flex;gap:5px;align-items:center;}
.epinp{width:46px;font-size:1.2rem;text-align:center;background:var(--bg);border:1px solid var(--line);color:var(--chalk);border-radius:6px;padding:4px;}
.eptog{background:var(--bg3);border:1px solid var(--line);color:var(--dim);border-radius:6px;padding:4px 9px;cursor:pointer;font-size:.75rem;}
.epdd{display:none;position:absolute;left:0;top:calc(100% + 4px);background:var(--bg2);border:1px solid var(--line2);border-radius:9px;padding:10px;z-index:200;width:290px;max-height:200px;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,.45);}
.epdd.op{display:block;}
.ecatlbl{font-size:.62rem;color:var(--dim);font-weight:700;text-transform:uppercase;margin:5px 0 3px;}
.ecatlbl:first-child{margin-top:0;}
.epg{display:flex;flex-wrap:wrap;gap:2px;margin-bottom:3px;}
.ep{font-size:1.2rem;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:5px;}
.ep:hover{background:var(--bg3);}

/* MODALS */
.ov{position:fixed;inset:0;background:rgba(10,16,12,.7);display:none;align-items:center;justify-content:center;z-index:300;padding:14px;}
.ov.op{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--line2);border-radius:var(--r);padding:18px;width:100%;max-width:340px;max-height:90vh;overflow:auto;}
.modal h3{color:var(--accent);margin-bottom:10px;}
.modal-act{display:flex;justify-content:flex-end;gap:7px;margin-top:10px;}
.pills{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;}
.pill{background:var(--bg3);border:1px solid var(--line);color:var(--dim);border-radius:6px;padding:4px 10px;font-size:.75rem;font-weight:700;cursor:pointer;transition:.15s;}
.pill.on{background:var(--accent);color:#21321f;border-color:var(--accent);}
.pill:hover:not(.on){border-color:var(--accent);color:var(--chalk);}
.clbl{font-size:.72rem;color:var(--dim);margin-bottom:4px;font-weight:600;}

/* THEME */
.tgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px;}
.tbtn{border-radius:10px;padding:10px;cursor:pointer;display:flex;align-items:center;gap:8px;font-family:inherit;border:2px solid;}
.tdots{display:flex;gap:3px;}
.tdot{width:12px;height:12px;border-radius:50%;}

/* UTIL */
.hi{display:none!important;}
.ls{position:fixed;inset:0;background:var(--bg);z-index:500;display:flex;align-items:center;justify-content:center;}
.ls.hi{display:none;}
.lbox{text-align:center;color:var(--dim);}
.lbox p{margin-top:10px;font-size:.88rem;}
.spin{width:30px;height:30px;border-radius:50%;border:3px solid var(--line2);border-top-color:var(--accent);margin:0 auto;animation:sp .8s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}
@media(max-width:700px){.page{flex-direction:column;}.mod-col{width:100%;}.wgrid{grid-template-columns:repeat(2,1fr);}}
</style>
</head>
<body>

<div class="ls" id="ls"><div class="lbox"><div class="spin"></div><p>Connexion…</p></div></div>

<div class="tb">
  <h1>🏠 MyLife</h1>
  <div class="tb-r hi" id="tbr">
    <span id="uem" style="font-size:.78rem;color:var(--dim);"></span>
    <button class="btn" id="btn-gedit">✏️ Disposition</button>
    <button class="btn" id="btn-theme">🎨 Thème</button>
    <button class="btn" id="btn-logout">Déconnexion</button>
  </div>
</div>

<div class="auth-wrap hi" id="auth-wrap">
  <div class="auth-box">
    <h2>MyLife</h2><p class="auth-sub">Connecte-toi pour accéder à tes modules.</p>
    <div class="auth-err" id="aerr"></div>
    <button class="btn g-btn" id="btn-gg">
      <svg width="17" height="17" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.5H42V20.4H24v7.2h11.3C33.7 32 29.3 35 24 35c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 8 3l5.1-5.1C33.6 5.3 29.1 3.5 24 3.5 12.7 3.5 3.5 12.7 3.5 24S12.7 44.5 24 44.5 44.5 35.3 44.5 24c0-1.2-.1-2.4-.3-3.5z"/><path fill="#FF3D00" d="M6.3 14.7l5.9 4.3C13.7 15.6 18.5 12.5 24 12.5c3.1 0 5.8 1.1 8 3l5.1-5.1C33.6 7.3 29.1 5.5 24 5.5 16.2 5.5 9.5 9.9 6.3 14.7z"/><path fill="#4CAF50" d="M24 44.5c5.1 0 9.6-1.7 12.8-4.7l-5.9-5c-1.6 1.2-3.7 1.9-6.9 1.9-5.3 0-9.7-3-11.4-7.2l-5.9 4.6C9.4 39.9 16.2 44.5 24 44.5z"/><path fill="#1976D2" d="M43.6 20.5H42V20.4H24v7.2h11.3c-.8 2.3-2.3 4.2-4.3 5.6l5.9 5C40.9 35 44.5 30.1 44.5 24c0-1.2-.1-2.4-.3-3.5z"/></svg>
      Continuer avec Google
    </button>
    <div class="divider"><span>ou</span></div>
    <div class="fld"><label>Email</label><input type="email" id="aem" autocomplete="email"></div>
    <div class="fld"><label>Mot de passe</label><input type="password" id="apw" autocomplete="current-password"></div>
    <button class="btn prim" style="width:100%;justify-content:center;" id="asub">Se connecter</button>
    <div class="auth-sw"><span id="aswtxt">Pas encore de compte ?</span> <a id="aswlnk">Créer un compte</a></div>
  </div>
</div>

<div class="page hi" id="page">
  <!-- Modules -->
  <div class="mod-col">
    <div class="mod-col-hdr"><h2>Modules</h2><button class="btn sm" id="btn-medit">✏️</button></div>
    <div id="mlist"></div>
    <button class="add-mod" id="btn-addm">＋ Ajouter</button>
  </div>

  <!-- Grid — identique à test3.html -->
  <div class="grid-col">
    <div class="grid-wrap">
      <div class="ghost-layer" id="ghost-layer"></div>
      <div class="wgrid" id="wgrid">

        <div class="wcell" id="wc-t1" style="grid-column:1/span 2;grid-row:1/span 2;">
          <div class="widget">
            <div class="whdr"><span>✅</span><h2>Tâches 1</h2><button class="wh-move" id="wmv-t1">✥</button><button class="wh-size" id="wsz-t1">⊞</button></div>
            <div class="wbody">
              <div class="tadd"><input type="text" id="inp-t1" placeholder="Ajouter une tâche…"><button class="btn prim" id="add-t1">+</button></div>
              <div class="tlist" id="list-t1"></div>
            </div>
          </div>
        </div>

        <div class="wcell" id="wc-t2" style="grid-column:3/span 2;grid-row:1/span 2;">
          <div class="widget">
            <div class="whdr"><span>✅</span><h2>Tâches 2</h2><button class="wh-move" id="wmv-t2">✥</button><button class="wh-size" id="wsz-t2">⊞</button></div>
            <div class="wbody">
              <div class="tadd"><input type="text" id="inp-t2" placeholder="Ajouter une tâche…"><button class="btn prim" id="add-t2">+</button></div>
              <div class="tlist" id="list-t2"></div>
            </div>
          </div>
        </div>

        <div class="wcell" id="wc-t3" style="grid-column:1/span 2;grid-row:3/span 2;">
          <div class="widget">
            <div class="whdr"><span>✅</span><h2>Tâches 3</h2><button class="wh-move" id="wmv-t3">✥</button><button class="wh-size" id="wsz-t3">⊞</button></div>
            <div class="wbody">
              <div class="tadd"><input type="text" id="inp-t3" placeholder="Ajouter une tâche…"><button class="btn prim" id="add-t3">+</button></div>
              <div class="tlist" id="list-t3"></div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>

<!-- MODALS -->
<div class="ov" id="ov-mod">
  <div class="modal">
    <h3 id="modtitle">Ajouter</h3>
    <div class="fld"><label>Emoji</label>
      <div class="epf"><div class="epr"><input type="text" id="moji" class="epinp" maxlength="4" placeholder="📦"><button type="button" class="eptog" id="etogg">Choisir ▾</button></div><div class="epdd" id="epdd"></div></div>
    </div>
    <div class="fld"><label>Nom</label><input type="text" id="mname" maxlength="30"></div>
    <div class="fld"><label>Description</label><input type="text" id="mdesc" maxlength="60"></div>
    <div class="fld"><label>Lien (.html)</label><input type="text" id="murl" placeholder="planning.html"></div>
    <div class="modal-act"><button class="btn dn" id="mdel" style="display:none;">Supprimer</button><button class="btn" id="mcancel">Annuler</button><button class="btn prim" id="msave">Enregistrer</button></div>
  </div>
</div>

<div class="ov" id="ov-size">
  <div class="modal" style="max-width:300px;">
    <h3>⊞ Taille</h3>
    <div class="clbl">Largeur</div>
    <div class="pills" id="sw-pills"><button class="pill" data-w="1">1</button><button class="pill" data-w="2">2</button><button class="pill" data-w="3">3</button><button class="pill" data-w="4">4</button></div>
    <div class="clbl">Hauteur</div>
    <div class="pills" id="sh-pills"><button class="pill" data-h="1">Petite</button><button class="pill" data-h="2">Moyenne</button><button class="pill" data-h="3">Grande</button><button class="pill" data-h="4">Très grande</button></div>
    <div class="modal-act"><button class="btn prim" id="szdone">Fermer</button></div>
  </div>
</div>

<div class="ov" id="ov-theme">
  <div class="modal" style="max-width:500px;"><h3>🎨 Thème</h3><div class="tgrid" id="tgrid"></div><div class="modal-act"><button class="btn prim" id="thclose">Fermer</button></div></div>
</div>

<script src="firebase-config.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
const WIDGETS=['t1','t2','t3'];
const LAYOUT_DEFAULT={t1:{c:1,r:1,w:2,h:2},t2:{c:3,r:1,w:2,h:2},t3:{c:1,r:3,w:2,h:2}};
const EMOJI_CATS={'Études':['📋','📖','📚','📝','✏️','📊','🧠','💡','🔬','🎓','💻'],'Sport':['💪','🏋️','⚽','🏀','🎾','🏊','🚴','🤸','🧘','🏃','⚖️'],'Voyage':['✈️','🌍','🗺️','🏖️','⛰️','🎵','🎮','🎬','📷','🚗','🏕️'],'Maison':['🏠','🍕','🍎','☕','🛒','💰','📱','🔑','🌱','🐶','🌸'],'Symboles':['⭐','🌟','🔥','✅','❌','⚡','🎯','🏆','💎','🎉','🔵','🟡','🟢']};
const THEMES=[{id:'foret',n:'🌿 Forêt',bg:'#16261e',bg2:'#1f3a2c',bg3:'#274a37',ac:'#f2c14e',tl:'#2dd4bf',gr:'#4ade80',rd:'#f87171',bl:'#60a5fa',ch:'#f1efe4'},{id:'ocean',n:'🌊 Océan',bg:'#0d1f2d',bg2:'#122534',bg3:'#193040',ac:'#22d3ee',tl:'#06b6d4',gr:'#34d399',rd:'#f87171',bl:'#38bdf8',ch:'#e0f4ff'},{id:'violet',n:'🌙 Nuit violette',bg:'#1a1228',bg2:'#221535',bg3:'#2d1d48',ac:'#c084fc',tl:'#e879f9',gr:'#a78bfa',rd:'#f472b6',bl:'#818cf8',ch:'#ede9fe'},{id:'ember',n:'🔥 Ember',bg:'#1c1208',bg2:'#271a0c',bg3:'#332212',ac:'#fb923c',tl:'#fbbf24',gr:'#84cc16',rd:'#ef4444',bl:'#f97316',ch:'#fff7ed'},{id:'ardoise',n:'🤍 Ardoise',bg:'#1a1f2e',bg2:'#222840',bg3:'#2a3050',ac:'#e2e8f0',tl:'#94a3b8',gr:'#64748b',rd:'#f87171',bl:'#93c5fd',ch:'#f8fafc'},{id:'sakura',n:'🌸 Sakura',bg:'#1f1218',bg2:'#2a1a22',bg3:'#38222e',ac:'#f9a8d4',tl:'#fb7185',gr:'#86efac',rd:'#fca5a5',bl:'#f0abfc',ch:'#fdf2f8'},{id:'electro',n:'⚡ Électrique',bg:'#080808',bg2:'#111111',bg3:'#1a1a1a',ac:'#facc15',tl:'#3b82f6',gr:'#22c55e',rd:'#ef4444',bl:'#60a5fa',ch:'#f9fafb'},{id:'desert',n:'🏜️ Désert',bg:'#1e1610',bg2:'#271e14',bg3:'#332819',ac:'#d97706',tl:'#b45309',gr:'#84cc16',rd:'#ef4444',bl:'#f59e0b',ch:'#fef3c7'},{id:'autumn',n:'🍂 Automne',bg:'#1c1008',bg2:'#271608',bg3:'#361e0a',ac:'#f97316',tl:'#dc2626',gr:'#fbbf24',rd:'#ef4444',bl:'#fb923c',ch:'#fff7ed'},{id:'arctic',n:'🧊 Arctique',bg:'#0f1923',bg2:'#172433',bg3:'#1e3045',ac:'#bfdbfe',tl:'#7dd3fc',gr:'#a5f3fc',rd:'#fca5a5',bl:'#93c5fd',ch:'#f0f9ff'},{id:'tropic',n:'🌺 Tropique',bg:'#0a1f12',bg2:'#0f2918',bg3:'#173520',ac:'#f0abfc',tl:'#4ade80',gr:'#86efac',rd:'#f9a8d4',bl:'#a78bfa',ch:'#f0fdf4'},{id:'minuit',n:'🖤 Minuit',bg:'#000000',bg2:'#111111',bg3:'#1c1c1c',ac:'#ffffff',tl:'#a3a3a3',gr:'#737373',rd:'#ef4444',bl:'#6b7280',ch:'#f5f5f5'},{id:'neon',n:'🟣 Néon',bg:'#0a0010',bg2:'#10001a',bg3:'#18002a',ac:'#d946ef',tl:'#a855f7',gr:'#34d399',rd:'#f43f5e',bl:'#818cf8',ch:'#fdf4ff'},{id:'ble',n:'🌾 Blé',bg:'#1e1a10',bg2:'#272212',bg3:'#332d18',ac:'#fde68a',tl:'#d97706',gr:'#a3e635',rd:'#ef4444',bl:'#fcd34d',ch:'#fffbeb'}];

const $=id=>document.getElementById(id);
const esc=s=>String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const pad=n=>String(n).padStart(2,'0');
const dK=d=>d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());

/* STATE */
let mods=null,modEdit=false,modEditId=null,modDragIdx=null,hubDoc=null,modT=null;
let tData={tasks:[],cats:[]},tDoc=null,tT=null;
let wLayout=JSON.parse(JSON.stringify(LAYOUT_DEFAULT)),layDoc=null,layT=null;
let gedit=false,selW=null,sizingId=null,curTheme='foret';
let tTab='todo',tFilt='',tPrio='🔴';

/* FIREBASE */
firebase.initializeApp(window.FIREBASE_CONFIG);
const auth=firebase.auth(),db=firebase.firestore();
try{db.enablePersistence({synchronizeTabs:true}).catch(()=>{});}catch(e){}

auth.onAuthStateChanged(async user=>{
  if(!user){$('ls').classList.add('hi');$('auth-wrap').classList.remove('hi');return;}
  $('uem').textContent=user.displayName||user.email||'';
  $('tbr').classList.remove('hi');
  hubDoc=db.collection('users').doc(user.uid).collection('modules').doc('hub');
  tDoc=db.collection('users').doc(user.uid).collection('modules').doc('tasks');
  layDoc=db.collection('users').doc(user.uid).collection('modules').doc('dashboard-layout');
  try{
    const[h,t,l]=await Promise.all([hubDoc.get(),tDoc.get(),layDoc.get()]);
    mods=(h.exists&&h.data().modules)?h.data().modules:[
      {id:'m1',icon:'📋',name:'Mon Planning',desc:'Emploi du temps.',url:'planning.html'},
      {id:'m2',icon:'📖',name:'Arabe Médine',desc:'Leçons & examens.',url:'arabe.html'},
      {id:'m3',icon:'🧠',name:'QCM Arabe',desc:'Vocabulaire.',url:'qcm-arabe.html'},
      {id:'m4',icon:'✈️',name:'PPL Aviation',desc:'Bientôt.',url:'',disabled:true}
    ];
    if(t.exists){tData=Object.assign({tasks:[],cats:[]},t.data());const n7=new Date();n7.setDate(n7.getDate()-7);tData.tasks=tData.tasks.filter(x=>!x.done||(x.doneAt&&new Date(x.doneAt)>n7));}
    if(l.exists){const ld=l.data();wLayout=Object.assign(JSON.parse(JSON.stringify(LAYOUT_DEFAULT)),ld);if(ld.theme)applyTheme(ld.theme);}
    if(!h.exists)hubDoc.set({modules:mods}).catch(()=>{});
  }catch(e){mods=[{id:'m1',icon:'📋',name:'Mon Planning',desc:'',url:'planning.html'}];}
  $('ls').classList.add('hi');
  $('auth-wrap').classList.add('hi');
  $('page').classList.remove('hi');
  applyLayout();
  renderMods();
  renderTasks();
  wireHandles();
});

/* AUTH */
let authMode='login';
$('btn-gg').addEventListener('click',async()=>{clearAE();try{await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());}catch(e){showAE(e.message);}});
$('asub').addEventListener('click',async()=>{clearAE();const em=$('aem').value.trim(),pw=$('apw').value;if(!em||!pw){showAE('Remplis email et mot de passe.');return;}try{if(authMode==='signup')await auth.createUserWithEmailAndPassword(em,pw);else await auth.signInWithEmailAndPassword(em,pw);}catch(e){showAE(e.message);}});
$('aswlnk').addEventListener('click',()=>{authMode=authMode==='login'?'signup':'login';$('asub').textContent=authMode==='login'?'Se connecter':"S'inscrire";$('aswtxt').textContent=authMode==='login'?'Pas encore de compte ?':'Déjà un compte ?';$('aswlnk').textContent=authMode==='login'?'Créer un compte':'Se connecter';});
$('btn-logout').addEventListener('click',()=>auth.signOut());
function showAE(m){const e=$('aerr');e.textContent=m;e.style.display='block';}
function clearAE(){$('aerr').style.display='none';}

/* GRID — exact logic from test3.html */
function applyLayout(){
  const maxR=Math.max(...WIDGETS.map(id=>wLayout[id]?wLayout[id].r+wLayout[id].h-1:4),4);
  $('wgrid').style.gridTemplateRows='repeat('+maxR+',200px)';
  WIDGETS.forEach(id=>{
    const p=wLayout[id];const cell=$('wc-'+id);
    if(!cell||!p)return;
    cell.style.gridColumn=p.c+'/span '+p.w;
    cell.style.gridRow=p.r+'/span '+p.h;
  });
}
function saveLayout(){if(!layDoc)return;clearTimeout(layT);layT=setTimeout(()=>layDoc.set(wLayout).catch(()=>{}),600);}

function buildGhosts(){
  const layer=$('ghost-layer');layer.innerHTML='';
  const maxR=Math.max(...WIDGETS.map(id=>wLayout[id]?wLayout[id].r+wLayout[id].h-1:4),4);
  layer.style.gridTemplateRows='repeat('+maxR+',200px)';
  layer.style.height=(maxR*200+(maxR-1)*10)+'px';
  for(let r=1;r<=maxR;r++) for(let c=1;c<=4;c++){
    const gc=document.createElement('div');gc.className='gcell';
    gc.style.gridColumn=c;gc.style.gridRow=r;
    gc.addEventListener('click',()=>{
      if(!selW)return;
      wLayout[selW].c=c;wLayout[selW].r=r;
      hideGhosts();selW=null;
      WIDGETS.forEach(i=>$('wc-'+i).classList.remove('picked'));
      applyLayout();saveLayout();
    });
    layer.appendChild(gc);
  }
}
function showGhosts(){buildGhosts();$('ghost-layer').classList.add('active');}
function hideGhosts(){$('ghost-layer').classList.remove('active');}

$('btn-gedit').addEventListener('click',()=>{
  gedit=!gedit;$('btn-gedit').classList.toggle('act',gedit);document.body.classList.toggle('gedit',gedit);
  if(!gedit){selW=null;hideGhosts();WIDGETS.forEach(i=>$('wc-'+i).classList.remove('picked'));}
});

function wireHandles(){
  WIDGETS.forEach(id=>{
    const mv=$('wmv-'+id),sz=$('wsz-'+id);
    if(!mv||!sz)return;
    mv.onclick=e=>{
      e.stopPropagation();
      if(selW===id){selW=null;hideGhosts();WIDGETS.forEach(i=>$('wc-'+i).classList.remove('picked'));}
      else{selW=id;WIDGETS.forEach(i=>$('wc-'+i).classList.remove('picked'));$('wc-'+id).classList.add('picked');showGhosts();}
    };
    sz.onclick=e=>{
      e.stopPropagation();
      sizingId=id;const p=wLayout[id]||{w:2,h:2};
      document.querySelectorAll('#sw-pills .pill').forEach(b=>b.classList.toggle('on',Number(b.dataset.w)===p.w));
      document.querySelectorAll('#sh-pills .pill').forEach(b=>b.classList.toggle('on',Number(b.dataset.h)===p.h));
      $('ov-size').classList.add('op');
    };
  });
}
$('sw-pills').addEventListener('click',e=>{const b=e.target.closest('.pill[data-w]');if(!b||!sizingId)return;wLayout[sizingId].w=Number(b.dataset.w);document.querySelectorAll('#sw-pills .pill').forEach(x=>x.classList.toggle('on',x===b));applyLayout();saveLayout();});
$('sh-pills').addEventListener('click',e=>{const b=e.target.closest('.pill[data-h]');if(!b||!sizingId)return;wLayout[sizingId].h=Number(b.dataset.h);document.querySelectorAll('#sh-pills .pill').forEach(x=>x.classList.toggle('on',x===b));applyLayout();saveLayout();});
$('szdone').addEventListener('click',()=>$('ov-size').classList.remove('op'));
document.addEventListener('click',e=>{if(!selW)return;if(e.target.closest('.wcell')||e.target.closest('#ghost-layer')||e.target.closest('.ov'))return;selW=null;hideGhosts();WIDGETS.forEach(i=>$('wc-'+i).classList.remove('picked'));});

/* MODULES */
function renderMods(){
  const list=$('mlist');list.innerHTML='';
  mods.forEach((m,idx)=>{
    const el=document.createElement('div');el.className='mtile'+(m.disabled?' dis':'');
    el.innerHTML=`<button class="mdel">✕</button><div class="mico">${m.icon||'📦'}</div><div class="minfo"><h3>${esc(m.name)}</h3>${m.desc?`<p>${esc(m.desc)}</p>`:''}</div>`;
    el.querySelector('.mdel').addEventListener('click',e=>{e.stopPropagation();removeMod(m.id);});
    if(modEdit){
      el.querySelector('.mdel').style.display='flex';
      el.addEventListener('click',ev=>{ev.preventDefault();openMod(m);});
      el.draggable=true;
      el.addEventListener('dragstart',()=>{modDragIdx=idx;el.classList.add('dragging');});
      el.addEventListener('dragend',()=>{el.classList.remove('dragging');list.querySelectorAll('.mtile').forEach(t=>t.classList.remove('drag-over'));});
      el.addEventListener('dragover',e=>{e.preventDefault();el.classList.add('drag-over');});
      el.addEventListener('dragleave',()=>el.classList.remove('drag-over'));
      el.addEventListener('drop',e=>{e.preventDefault();if(modDragIdx!==null&&modDragIdx!==idx){const mv=mods.splice(modDragIdx,1)[0];mods.splice(idx,0,mv);saveMods();renderMods();}});
    } else {
      if(m.url&&!m.disabled)el.addEventListener('click',()=>location.href=m.url);
      else el.addEventListener('click',()=>openMod(m));
    }
    list.appendChild(el);
  });
}
function saveMods(){if(!hubDoc)return;clearTimeout(modT);modT=setTimeout(()=>hubDoc.set({modules:mods}).catch(()=>{}),600);}
$('btn-medit').addEventListener('click',()=>{modEdit=!modEdit;$('btn-medit').classList.toggle('act',modEdit);renderMods();});
$('btn-addm').addEventListener('click',()=>openMod(null));
function openMod(m){modEditId=m?m.id:null;$('modtitle').textContent=m?'Modifier':'Ajouter';$('moji').value=m?(m.icon||''):'';$('mname').value=m?m.name:'';$('mdesc').value=m?(m.desc||''):'';$('murl').value=m?(m.url||''):'';$('mdel').style.display=m?'inline-flex':'none';$('ov-mod').classList.add('op');}
$('mcancel').addEventListener('click',()=>$('ov-mod').classList.remove('op'));
$('msave').addEventListener('click',()=>{const name=$('mname').value.trim();if(!name){alert('Nom requis');return;}const data={id:modEditId||'m'+Date.now(),icon:$('moji').value.trim()||'📦',name,desc:$('mdesc').value.trim(),url:$('murl').value.trim(),disabled:!$('murl').value.trim()};if(modEditId){const i=mods.findIndex(m=>m.id===modEditId);if(i>-1)mods[i]=data;}else mods.push(data);saveMods();$('ov-mod').classList.remove('op');renderMods();});
$('mdel').addEventListener('click',()=>{if(!modEditId||!confirm('Supprimer ?'))return;mods=mods.filter(m=>m.id!==modEditId);saveMods();$('ov-mod').classList.remove('op');renderMods();});
function removeMod(id){if(!confirm('Supprimer ?'))return;mods=mods.filter(m=>m.id!==id);saveMods();renderMods();}
(function(){const dd=$('epdd');Object.entries(EMOJI_CATS).forEach(([cat,emojis])=>{const lbl=document.createElement('div');lbl.className='ecatlbl';lbl.textContent=cat;dd.appendChild(lbl);const g=document.createElement('div');g.className='epg';emojis.forEach(e=>{const ep=document.createElement('div');ep.className='ep';ep.textContent=e;ep.addEventListener('click',()=>{$('moji').value=e;dd.classList.remove('op');});g.appendChild(ep);});dd.appendChild(g);});})();
$('etogg').addEventListener('click',e=>{e.stopPropagation();$('epdd').classList.toggle('op');});
document.addEventListener('click',e=>{if(!e.target.closest('.epf'))$('epdd').classList.remove('op');});

/* TASKS — partagées entre les 3 widgets */
function saveTasks(){if(!tDoc)return;clearTimeout(tT);tT=setTimeout(()=>tDoc.set(tData).catch(()=>{}),600);}
function renderTasks(){
  WIDGETS.forEach(id=>{
    const list=$('list-'+id);if(!list)return;
    const tasks=(tData.tasks||[]).filter(t=>!t.done);
    if(!tasks.length){list.innerHTML='<div class="empty">Aucune tâche 🎉</div>';return;}
    list.innerHTML=tasks.map(t=>`<div class="titem"><div class="tck${t.done?' on':''}" data-ck="${t.id}"></div><div class="ttxt${t.done?' sk':''}">${esc(t.text)}</div><div class="tdl" data-dl="${t.id}">✕</div></div>`).join('');
  });
}
WIDGETS.forEach(id=>{
  const addBtn=$('add-'+id),inp=$('inp-'+id),list=$('list-'+id);
  if(!addBtn||!inp||!list)return;
  addBtn.addEventListener('click',()=>{const text=inp.value.trim();if(!text)return;tData.tasks.push({id:'t'+Date.now(),text,done:false,createdAt:new Date().toISOString()});inp.value='';saveTasks();renderTasks();});
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')addBtn.click();});
  list.addEventListener('click',e=>{
    const ck=e.target.closest('[data-ck]');if(ck){const t=tData.tasks.find(x=>x.id===ck.dataset.ck);if(t){t.done=!t.done;t.doneAt=t.done?new Date().toISOString():null;saveTasks();renderTasks();}return;}
    const dl=e.target.closest('[data-dl]');if(dl){tData.tasks=tData.tasks.filter(x=>x.id!==dl.dataset.dl);saveTasks();renderTasks();}
  });
});

/* THEMES */
function applyTheme(id){const t=THEMES.find(x=>x.id===id)||THEMES[0];const r=document.documentElement.style;r.setProperty('--bg',t.bg);r.setProperty('--bg2',t.bg2);r.setProperty('--bg3',t.bg3);r.setProperty('--accent',t.ac);r.setProperty('--chalk',t.ch);r.setProperty('--dim',t.ch+'99');r.setProperty('--line',t.ch+'17');r.setProperty('--line2',t.ch+'2e');curTheme=id;try{localStorage.setItem('mlt',id);}catch(e){}}
function buildThemeGrid(){const g=$('tgrid');g.innerHTML='';THEMES.forEach(t=>{const b=document.createElement('button');b.className='tbtn';b.style.cssText=`background:${t.bg2};border-color:${curTheme===t.id?t.ac:'transparent'};`;b.innerHTML=`<div class="tdots"><div class="tdot" style="background:${t.ac}"></div><div class="tdot" style="background:${t.tl}"></div><div class="tdot" style="background:${t.gr}"></div></div><div style="font-size:.82rem;font-weight:700;color:${t.ch}">${t.n}</div>${curTheme===t.id?`<div style="margin-left:auto;color:${t.ac};font-size:.8rem;">✓</div>`:''}`;b.addEventListener('click',()=>{applyTheme(t.id);if(layDoc)layDoc.set(Object.assign({},wLayout,{theme:t.id})).catch(()=>{});buildThemeGrid();});g.appendChild(b);});}
$('btn-theme').addEventListener('click',()=>{buildThemeGrid();$('ov-theme').classList.add('op');});
$('thclose').addEventListener('click',()=>$('ov-theme').classList.remove('op'));
(()=>{try{const s=localStorage.getItem('mlt');if(s)applyTheme(s);}catch(e){}})();
</script>
