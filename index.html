<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MyLife</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Kalam:wght@700&family=Work+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#16261e;--bg2:#1f3a2c;--bg3:#274a37;
  --line:rgba(238,241,234,.09);--line2:rgba(238,241,234,.18);
  --chalk:#f1efe4;--dim:#aebcb1;--accent:#f2c14e;
  --green:#4ade80;--gl:rgba(74,222,128,.13);
  --blue:#60a5fa;--red:#f87171;--rl:rgba(248,113,113,.13);
  --teal:#2dd4bf;--tl:rgba(45,212,191,.12);
  --r:12px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Work Sans',sans-serif;background:var(--bg);color:var(--chalk);min-height:100vh;}
h1,h2,h3{font-family:'Kalam',cursive;}
input,button,select{font-family:inherit;}
.btn{background:var(--bg3);border:1px solid var(--line);color:var(--chalk);padding:6px 12px;border-radius:8px;font-size:.82rem;font-weight:600;cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;}
.btn:hover{border-color:var(--accent);}
.btn.prim{background:var(--accent);color:#21321f;border-color:var(--accent);}
.btn.sm{padding:4px 8px;font-size:.72rem;}
.btn.dn{background:#5a2b2b;border-color:#7a3a3a;}

/* TOPBAR */
.tb{position:sticky;top:0;z-index:50;background:linear-gradient(var(--bg2),rgba(31,58,44,.95));
  border-bottom:2px solid var(--line2);padding:10px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;backdrop-filter:blur(4px);}
.tb h1{font-size:1.3rem;color:var(--accent);}
.tb-r{margin-left:auto;display:flex;align-items:center;gap:8px;}

/* AUTH */
.auth-wrap{display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 62px);padding:20px;}
.auth-box{background:var(--bg2);border:1px solid var(--line2);border-radius:var(--r);padding:26px;width:100%;max-width:360px;}
.auth-box h2{color:var(--accent);margin-bottom:5px;}
.auth-sub{color:var(--dim);font-size:.83rem;margin-bottom:16px;}
.g-btn{justify-content:center;gap:10px;background:#fff;color:#3c4043;border-color:#dadce0;padding:11px;font-size:.9rem;width:100%;margin-bottom:12px;}
.divider{display:flex;align-items:center;gap:8px;color:var(--dim);font-size:.78rem;margin-bottom:12px;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--line);}
.fld{margin-bottom:9px;display:flex;flex-direction:column;gap:3px;}
.fld label{font-size:.75rem;color:var(--dim);font-weight:600;}
.fld input,.fld select{background:var(--bg);border:1px solid var(--line);color:var(--chalk);border-radius:6px;padding:8px 10px;font-size:.88rem;width:100%;}
.auth-err{color:#ffb3b3;background:rgba(255,80,80,.1);border:1px solid rgba(255,80,80,.3);border-radius:6px;padding:7px;font-size:.8rem;margin-bottom:8px;display:none;}
.auth-sw{margin-top:10px;text-align:center;font-size:.82rem;color:var(--dim);}
.auth-sw a{color:var(--accent);cursor:pointer;font-weight:600;}

/* PAGE */
.page{display:flex;gap:12px;padding:12px;align-items:flex-start;}

/* MODULES */
.mod-col{width:190px;flex-shrink:0;display:flex;flex-direction:column;gap:7px;}
.mod-col-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px;}
.mod-col-hdr h2{font-size:.9rem;}
.mtile{background:var(--bg2);border:1px solid var(--line2);border-radius:9px;padding:10px;color:var(--chalk);display:flex;align-items:center;gap:8px;position:relative;transition:.15s;cursor:pointer;}
.mtile:hover{border-color:var(--accent);}
.mico{font-size:1.3rem;line-height:1;flex-shrink:0;}
.minfo h3{font-size:.83rem;font-family:'Kalam',cursive;}
.minfo p{font-size:.65rem;color:var(--dim);}
.mdel{position:absolute;top:-6px;right:-6px;width:17px;height:17px;border-radius:50%;background:#c0392b;color:#fff;border:2px solid var(--bg);font-size:9px;display:none;align-items:center;justify-content:center;cursor:pointer;z-index:5;}
.mtile.drag-over{border-color:var(--accent);}
.mtile.dragging{opacity:.4;}
.mtile.dis{opacity:.4;}
.add-mod{background:transparent;border:2px dashed var(--line);border-radius:9px;padding:9px;display:flex;align-items:center;justify-content:center;gap:5px;cursor:pointer;color:var(--dim);font-size:.8rem;font-weight:600;transition:.15s;width:100%;}
.add-mod:hover{border-color:var(--accent);color:var(--accent);}

/* === GRID (copied from grid_test.html) === */
.grid-col{flex:1;min-width:0;}
.grid-wrap{position:relative;}
.ghost-layer{
  display:none;position:absolute;top:0;left:0;right:0;bottom:0;
  grid-template-columns:repeat(4,1fr);grid-auto-rows:160px;gap:10px;
  z-index:100;pointer-events:none;
}
.ghost-layer.active{display:grid;pointer-events:all;}
.gcell{border-radius:var(--r);border:2px solid rgba(242,193,78,.5);background:rgba(242,193,78,.15);cursor:crosshair;transition:.1s;}
.gcell:hover{background:rgba(242,193,78,.45);border-color:var(--accent);}
.wgrid{display:grid;grid-template-columns:repeat(4,1fr);grid-auto-rows:160px;gap:10px;}
.wcell{position:relative;z-index:1;min-width:0;min-height:0;}
.wcell.picked{outline:3px solid var(--accent);outline-offset:3px;z-index:2;}
.wh-move,.wh-size{display:none;background:rgba(242,193,78,.2);border:1px solid rgba(242,193,78,.5);border-radius:5px;padding:3px 7px;cursor:pointer;font-size:.7rem;color:var(--accent);font-weight:700;user-select:none;}
body.gedit .wh-move,body.gedit .wh-size{display:inline-flex;align-items:center;}

/* WIDGET */
.widget{background:var(--bg2);border:1px solid var(--line2);border-radius:var(--r);display:flex;flex-direction:column;height:100%;overflow:hidden;}
.whdr{padding:9px 12px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:7px;flex-shrink:0;}
.whdr h2{font-size:.88rem;flex:1;}
.wbody{padding:10px 12px;overflow-y:auto;flex:1;min-height:0;}

/* TASKS */
.ttabs{display:flex;gap:6px;margin-bottom:8px;border-bottom:1px solid var(--line);padding-bottom:7px;}
.ttab{background:none;border:none;color:var(--dim);font-size:.75rem;font-weight:700;cursor:pointer;padding:3px 6px;border-radius:5px;transition:.15s;}
.ttab.on{background:var(--accent);color:#21321f;}
.tadd{display:flex;gap:6px;margin-bottom:7px;}
.tadd input{flex:1;background:var(--bg);border:1px solid var(--line);color:var(--chalk);border-radius:6px;padding:6px 9px;font-size:.8rem;}
.topt{display:flex;gap:6px;margin-bottom:7px;flex-wrap:wrap;align-items:center;}
.tpsel{display:flex;gap:4px;}
.tpbtn{font-size:.85rem;cursor:pointer;opacity:.35;transition:.15s;background:none;border:none;padding:0;}
.tpbtn.on{opacity:1;transform:scale(1.2);}
.tcat-sel{background:var(--bg);border:1px solid var(--line);color:var(--chalk);border-radius:5px;padding:4px 7px;font-size:.72rem;}
.tcats{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:7px;}
.tcpill{font-size:.65rem;padding:2px 7px;border-radius:12px;border:1px solid var(--line);color:var(--dim);cursor:pointer;background:var(--bg3);transition:.15s;}
.tcpill.on{border-color:var(--accent);color:var(--accent);}
.tlist{display:flex;flex-direction:column;gap:4px;max-height:220px;overflow-y:auto;}
.titem{display:flex;align-items:center;gap:7px;padding:7px 9px;background:var(--bg3);border:1px solid var(--line);border-radius:7px;cursor:grab;}
.titem:hover{border-color:var(--line2);}
.titem.done-item{opacity:.5;}
.tck{width:16px;height:16px;border-radius:4px;border:2px solid var(--line);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:transparent;}
.tck.on{background:var(--green);border-color:var(--green);}
.tck.on::after{content:'✓';font-size:.65rem;color:#0f1117;font-weight:700;}
.ttxt{flex:1;font-size:.78rem;line-height:1.3;}
.ttxt.sk{text-decoration:line-through;color:var(--dim);}
.tpr{font-size:.9rem;flex-shrink:0;cursor:pointer;line-height:1;}
.tdl{font-size:.68rem;color:var(--dim);cursor:pointer;opacity:0;transition:.15s;padding:2px 4px;border-radius:4px;border:1px solid transparent;}
.titem:hover .tdl{opacity:1;}
.tdl:hover{border-color:var(--red);color:var(--red);}
.tbadge{font-size:.6rem;padding:1px 5px;border-radius:8px;border:1px solid var(--line);color:var(--dim);flex-shrink:0;}
.empty{text-align:center;padding:20px;color:var(--dim);font-size:.78rem;}

/* SPORT */
.wbar{height:7px;background:var(--line);border-radius:4px;overflow:hidden;margin:4px 0 8px;}
.wbf{height:100%;background:linear-gradient(90deg,var(--green),var(--teal));border-radius:4px;transition:width .6s;}
.msrow{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:8px;}
.ms{font-size:.6rem;padding:2px 5px;border-radius:10px;border:1px solid var(--line);color:var(--dim);}
.ms.dn{background:var(--gl);border-color:var(--green);color:var(--green);font-weight:700;}
.ms.nx{background:var(--tl);border-color:var(--teal);color:var(--teal);font-weight:700;}
.smhdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.smname{font-family:'Kalam',cursive;font-size:.85rem;color:var(--accent);}
.smcnt{font-size:.68rem;color:var(--dim);}
.swks{display:flex;flex-direction:column;gap:3px;margin-bottom:8px;}
.swrow{display:flex;align-items:center;gap:5px;}
.swlbl{width:28px;font-size:.62rem;color:var(--dim);flex-shrink:0;}
.sdots{display:flex;gap:3px;}
.sdot{width:15px;height:15px;border-radius:50%;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:.52rem;}
.sdot.dn{background:var(--gl);border-color:var(--green);color:var(--green);}
.sdot.mi{background:var(--rl);border-color:var(--red);color:var(--red);}
.sdot.fu{background:var(--bg3);}
.sstats{display:flex;gap:6px;padding-top:8px;border-top:1px solid var(--line);}
.sstat{flex:1;text-align:center;background:var(--bg3);border:1px solid var(--line);border-radius:6px;padding:5px 3px;}
.ssv{font-family:'Kalam',cursive;font-size:.95rem;font-weight:700;}
.ssl{font-size:.58rem;color:var(--dim);margin-top:1px;}

/* EMOJI PICKER */
.epf{position:relative;}
.epr{display:flex;gap:5px;align-items:center;}
.epinp{width:46px;font-size:1.2rem;text-align:center;background:var(--bg);border:1px solid var(--line);color:var(--chalk);border-radius:6px;padding:4px;}
.eptog{background:var(--bg3);border:1px solid var(--line);color:var(--dim);border-radius:6px;padding:4px 9px;cursor:pointer;font-size:.75rem;}
.epdd{display:none;position:absolute;left:0;top:calc(100% + 4px);background:var(--bg2);border:1px solid var(--line2);border-radius:9px;padding:10px;z-index:200;width:290px;max-height:200px;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,.45);}
.epdd.op{display:block;}
.ecatlbl{font-size:.62rem;color:var(--dim);font-weight:700;text-transform:uppercase;margin:5px 0 3px;}
.ecatlbl:first-child{margin-top:0;}
.epg{display:flex;flex-wrap:wrap;gap:2px;margin-bottom:3px;}
.ep{font-size:1.2rem;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:5px;}
.ep:hover{background:var(--bg3);}

/* PILLS */
.pills{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;}
.pill{background:var(--bg3);border:1px solid var(--line);color:var(--dim);border-radius:6px;padding:4px 10px;font-size:.75rem;font-weight:700;cursor:pointer;transition:.15s;}
.pill.on{background:var(--accent);color:#21321f;border-color:var(--accent);}
.pill:hover:not(.on){border-color:var(--accent);color:var(--chalk);}

/* MODALS */
.ov{position:fixed;inset:0;background:rgba(10,16,12,.7);display:none;align-items:center;justify-content:center;z-index:300;padding:14px;}
.ov.op{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--line2);border-radius:var(--r);padding:18px;width:100%;max-width:340px;max-height:90vh;overflow:auto;}
.modal h3{color:var(--accent);margin-bottom:10px;}
.modal-act{display:flex;justify-content:flex-end;gap:7px;margin-top:10px;}

/* THEME */
.tgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px;}
.tbtn{border-radius:10px;padding:10px;cursor:pointer;display:flex;align-items:center;gap:8px;font-family:inherit;transition:.15s;border:2px solid;}
.tdots{display:flex;gap:3px;}
.tdot{width:12px;height:12px;border-radius:50%;}

/* UTIL */
.hi{display:none!important;}
.ls{position:fixed;inset:0;background:var(--bg);z-index:500;display:flex;align-items:center;justify-content:center;}
.ls.hi{display:none;}
.lbox{text-align:center;color:var(--dim);}
.lbox p{margin-top:10px;font-size:.88rem;}
.spin{width:30px;height:30px;border-radius:50%;border:3px solid var(--line2);border-top-color:var(--accent);margin:0 auto;animation:sp .8s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}
@media(max-width:700px){.page{flex-direction:column;}.mod-col{width:100%;}.wgrid{grid-template-columns:repeat(2,1fr);}}
</style>
</head>
<body>

<div class="ls" id="ls"><div class="lbox"><div class="spin"></div><p>Connexion…</p></div></div>

<div class="tb">
  <h1>🏠 MyLife</h1>
  <div class="tb-r hi" id="tbr">
    <span id="uem" style="font-size:.78rem;color:var(--dim);"></span>
    <button class="btn" id="btn-gedit">✏️ Disposition</button>
    <button class="btn" id="btn-theme">🎨 Thème</button>
    <button class="btn" id="btn-logout">Déconnexion</button>
  </div>
</div>

<div class="auth-wrap hi" id="auth-wrap">
  <div class="auth-box">
    <h2>MyLife</h2><p class="auth-sub">Connecte-toi pour accéder à tes modules.</p>
    <div class="auth-err" id="aerr"></div>
    <button class="btn g-btn" id="btn-gg">
      <svg width="17" height="17" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.5H42V20.4H24v7.2h11.3C33.7 32 29.3 35 24 35c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 8 3l5.1-5.1C33.6 5.3 29.1 3.5 24 3.5 12.7 3.5 3.5 12.7 3.5 24S12.7 44.5 24 44.5 44.5 35.3 44.5 24c0-1.2-.1-2.4-.3-3.5z"/><path fill="#FF3D00" d="M6.3 14.7l5.9 4.3C13.7 15.6 18.5 12.5 24 12.5c3.1 0 5.8 1.1 8 3l5.1-5.1C33.6 7.3 29.1 5.5 24 5.5 16.2 5.5 9.5 9.9 6.3 14.7z"/><path fill="#4CAF50" d="M24 44.5c5.1 0 9.6-1.7 12.8-4.7l-5.9-5c-1.6 1.2-3.7 1.9-6.9 1.9-5.3 0-9.7-3-11.4-7.2l-5.9 4.6C9.4 39.9 16.2 44.5 24 44.5z"/><path fill="#1976D2" d="M43.6 20.5H42V20.4H24v7.2h11.3c-.8 2.3-2.3 4.2-4.3 5.6l5.9 5C40.9 35 44.5 30.1 44.5 24c0-1.2-.1-2.4-.3-3.5z"/></svg>
      Continuer avec Google
    </button>
    <div class="divider"><span>ou</span></div>
    <div class="fld"><label>Email</label><input type="email" id="aem" autocomplete="email"></div>
    <div class="fld"><label>Mot de passe</label><input type="password" id="apw" autocomplete="current-password"></div>
    <button class="btn prim" style="width:100%;justify-content:center;" id="asub">Se connecter</button>
    <div class="auth-sw"><span id="aswtxt">Pas encore de compte ?</span> <a id="aswlnk">Créer un compte</a></div>
  </div>
</div>

<div class="page hi" id="page">
  <div class="mod-col">
    <div class="mod-col-hdr"><h2>Modules</h2><button class="btn sm" id="btn-medit">✏️</button></div>
    <div id="mlist"></div>
    <button class="add-mod" id="btn-addm">＋ Ajouter</button>
  </div>
  <div class="grid-col">
    <div class="grid-wrap">
      <div class="ghost-layer" id="ghost-layer"></div>
      <div class="wgrid" id="wgrid">

        <!-- TACHES -->
        <div class="wcell" id="wc-tasks" style="grid-column:1/span 2;grid-row:1/span 3;">
          <div class="widget">
            <div class="whdr">
              <span>✅</span><h2>Tâches</h2>
              <button class="wh-move" id="wmv-tasks">✥</button>
              <button class="wh-size" id="wsz-tasks">⊞</button>
            </div>
            <div class="wbody">
              <div class="ttabs">
                <button class="ttab on" id="ttab-todo">À faire</button>
                <button class="ttab" id="ttab-done">Effectuées</button>
                <button class="ttab" id="ttab-cats">Catégories</button>
              </div>
              <div id="tab-todo">
                <div class="tadd"><input type="text" id="tinp" placeholder="Nouvelle tâche…" maxlength="80"><button class="btn prim" id="tadd-btn">+</button></div>
                <div class="topt">
                  <div class="tpsel">
                    <button class="tpbtn on" data-p="🔴">🔴</button>
                    <button class="tpbtn" data-p="🟡">🟡</button>
                    <button class="tpbtn" data-p="🟢">🟢</button>
                  </div>
                  <select class="tcat-sel" id="tcatsel"><option value="">Aucune catégorie</option></select>
                </div>
                <div class="tcats" id="tcatfilt"></div>
                <div class="tlist" id="tlist"></div>
              </div>
              <div id="tab-done" class="hi"><div style="font-size:.68rem;color:var(--dim);margin-bottom:6px;">Supprimées après 7 jours.</div><div class="tlist" id="tdlist"></div></div>
              <div id="tab-cats" class="hi">
                <div class="tadd"><input type="text" id="catinp" placeholder="Nouvelle catégorie…" maxlength="30"><button class="btn prim" id="catadd">+</button></div>
                <div class="tlist" id="tclist"></div>
              </div>
            </div>
          </div>
        </div>

        <!-- SPORT -->
        <div class="wcell" id="wc-sport" style="grid-column:3/span 2;grid-row:1/span 3;">
          <div class="widget">
            <div class="whdr">
              <span>💪</span><h2>Sport</h2>
              <button class="wh-move" id="wmv-sport">✥</button>
              <button class="wh-size" id="wsz-sport">⊞</button>
            </div>
            <div class="wbody">
              <button class="btn sm" id="wbtn-weigh" style="margin-bottom:8px;">⚖️ Peser</button>
              <div id="spbody"></div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>

<!-- MODALS -->
<div class="ov" id="ov-mod">
  <div class="modal">
    <h3 id="modtitle">Ajouter</h3>
    <div class="fld"><label>Emoji</label>
      <div class="epf"><div class="epr"><input type="text" id="moji" class="epinp" maxlength="4" placeholder="📦"><button type="button" class="eptog" id="etogg">Choisir ▾</button></div><div class="epdd" id="epdd"></div></div>
    </div>
    <div class="fld"><label>Nom</label><input type="text" id="mname" maxlength="30"></div>
    <div class="fld"><label>Description</label><input type="text" id="mdesc" maxlength="60"></div>
    <div class="fld"><label>Lien (.html)</label><input type="text" id="murl" placeholder="planning.html"></div>
    <div class="modal-act">
      <button class="btn dn" id="mdel" style="display:none;">Supprimer</button>
      <button class="btn" id="mcancel">Annuler</button>
      <button class="btn prim" id="msave">Enregistrer</button>
    </div>
  </div>
</div>
<div class="ov" id="ov-weigh">
  <div class="modal" style="max-width:300px;">
    <h3>⚖️ Peser</h3>
    <div class="fld"><label>Poids (kg)</label><input type="number" id="wval" step="0.1" min="40" max="200" placeholder="96.8" style="font-size:1.1rem;"></div>
    <div class="fld"><label>Date</label><input type="date" id="wdat"></div>
    <div class="modal-act"><button class="btn" id="wcancel">Annuler</button><button class="btn prim" id="wsave">Enregistrer</button></div>
  </div>
</div>
<div class="ov" id="ov-size">
  <div class="modal" style="max-width:300px;">
    <h3>⊞ Taille</h3>
    <div class="fld"><label>Largeur (colonnes)</label>
      <div class="pills" id="sw-pills">
        <button class="pill" data-w="1">1</button><button class="pill" data-w="2">2</button>
        <button class="pill" data-w="3">3</button><button class="pill" data-w="4">4</button>
      </div>
    </div>
    <div class="fld"><label>Hauteur</label>
      <div class="pills" id="sh-pills">
        <button class="pill" data-h="1">Petite</button><button class="pill" data-h="2">Moyenne</button>
        <button class="pill" data-h="3">Grande</button><button class="pill" data-h="4">Très grande</button>

/* ── SPORT ── */
function isSportEv(ev){return SPORT_KW.includes((ev.title||'').toLowerCase().trim());}
function computeSessions(){
  if(!planState)return[];
  const evs=(planState.events||[]).filter(isSportEv),exc=planState.exceptions||[];
  const today=new Date();today.setHours(23,59,59,999);
  const a=planState.weekAnchor||{monday:dK(monOf(new Date())),letter:'A'};
  const ad=new Date(a.monday+'T00:00:00'),sd=new Date(SPORT_FROM+'T00:00:00');
  const sessions=[];
  for(let w=-60;w<=0;w++){
    const mon=monOf(addD(ad,w*7));if(mon<sd)continue;
    const dw=Math.round((mon-ad)/604800000),p=((dw%2)+2)%2;
    const letter=p===0?a.letter:(a.letter==='A'?'B':'A');
    for(let d=0;d<7;d++){
      const dt=addD(mon,d),k=dK(dt);if(dt>today)continue;
      evs.forEach(ev=>{
        if(ev.day!==d)return;if(ev.onlyDate&&ev.onlyDate!==k)return;if(!ev.onlyDate&&ev.week&&ev.week!==letter)return;if(exc.includes(ev.id+'@'+k))return;
        const e2=new Date(dt);const[eh,em]=ev.end.split(':').map(Number);e2.setHours(eh,em);
        if(e2<=today)sessions.push({date:k});
      });
    }
  }
  const seen=new Set();return sessions.filter(s=>{if(seen.has(s.date))return false;seen.add(s.date);return true;});
}
function getMon(ds){return dK(monOf(new Date(ds+'T12:00:00')));}
function renderSport(){
  const sessions=computeSessions(),now=new Date();
  const weights=spData.weights||[],goal=spData.goal||SPORT_GOAL,startW=spData.startWeight||SPORT_START_W;
  const lastW=weights.length>0?weights[weights.length-1].w:startW;
  const pct=Math.max(0,Math.min(100,(startW-lastW)/(startW-goal)*100));
  let html=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;"><span style="font-size:.75rem;color:var(--dim);">${weights.length?`<strong style="color:var(--chalk)">${lastW}kg</strong>`:'Aucune pesée'}</span><div class="wbar" style="flex:1"><div class="wbf" style="width:${pct}%"></div></div><span style="font-size:.65rem;color:var(--accent);">${goal}kg</span></div>`;
  const ms=[];for(let m=Math.floor((startW-1)/SPORT_MS)*SPORT_MS;m>=goal;m-=SPORT_MS)ms.push(Math.round(m*10)/10);
  html+='<div class="msrow">'+ms.map(m=>{const done=lastW<=m;const isNext=!done&&ms.findIndex(x=>lastW>x)===ms.indexOf(m);return`<div class="ms${done?' dn':isNext?' nx':''}">${m}${done?'✓':''}</div>`;}).join('')+'</div>';
  const wkMap={};sessions.forEach(s=>{const mk=getMon(s.date);if(!wkMap[mk])wkMap[mk]=[];wkMap[mk].push(s.date);});
  const sd2=new Date(SPORT_FROM+'T00:00:00');sd2.setDate(1);
  const months=[];const cur2=new Date(sd2);while(cur2<=now){months.push(new Date(cur2));cur2.setMonth(cur2.getMonth()+1);}
  months.slice(-2).forEach(md=>{
    const y=md.getFullYear(),mo=md.getMonth();
    const first=new Date(y,mo,1),last=new Date(y,mo+1,0);
    const mTotal=sessions.filter(s=>s.date>=dK(first)&&s.date<=dK(last)).length;
    html+=`<div style="margin-bottom:2px;"><div class="smhdr"><span class="smname">${MFR[mo]} ${y}</span><span class="smcnt">${mTotal} séance${mTotal>1?'s':''}</span></div><div class="swks">`;
    let wS=monOf(first),wN=1;
    while(wS<=last){
      const mk=dK(wS),done=(wkMap[mk]||[]).length,isFut=wS>now;
      const dots=[];for(let i=0;i<SPORT_TARGET;i++){const cls=isFut?'fu':i<done?'dn':'mi';dots.push(`<div class="sdot ${cls}">${cls==='dn'?'✓':cls==='mi'?'✕':''}</div>`);}
      html+=`<div class="swrow"><span class="swlbl">S${wN}</span><div class="sdots">${dots.join('')}</div></div>`;
      wS=addD(wS,7);wN++;
    }
    html+='</div></div>';
  });
  const thisMk=dK(monOf(now)),thisDone=Math.min(SPORT_TARGET,(wkMap[thisMk]||[]).length);
  const wc=thisDone>=SPORT_TARGET?'var(--green)':thisDone>0?'var(--accent)':'var(--chalk)';
  html+=`<div class="sstats"><div class="sstat"><div class="ssv" style="color:${wc}">${thisDone}/${SPORT_TARGET}</div><div class="ssl">Cette sem.</div></div><div class="sstat"><div class="ssv">${sessions.length}</div><div class="ssl">Total</div></div></div>`;
  $('spbody').innerHTML=html;
}
$('wbtn-weigh').addEventListener('click',()=>{$('wval').value='';$('wdat').value=dK(new Date());$('ov-weigh').classList.add('op');});
$('wcancel').addEventListener('click',()=>$('ov-weigh').classList.remove('op'));
$('wsave').addEventListener('click',()=>{const val=parseFloat($('wval').value),date=$('wdat').value;if(!val||isNaN(val)||!date){alert('Poids invalide.');return;}spData.weights=spData.weights.filter(w=>w.d!==date);spData.weights.push({d:date,w:Math.round(val*10)/10});spData.weights.sort((a,b)=>a.d.localeCompare(b.d));if(spDoc)spDoc.set(spData).catch(()=>{});$('ov-weigh').classList.remove('op');renderSport();});

/* ── TASKS ── */
function saveTasks(){if(!tDoc)return;clearTimeout(tT);tT=setTimeout(()=>tDoc.set(tData).catch(()=>{}),600);}
function switchTab(tab){tTab=tab;['todo','done','cats'].forEach(t=>{$('tab-'+t).classList.toggle('hi',t!==tab);});document.querySelectorAll('.ttab').forEach(b=>b.classList.toggle('on',b.id==='ttab-'+tab));renderTasks();}
['todo','done','cats'].forEach(t=>$('ttab-'+t).addEventListener('click',()=>switchTab(t)));
function renderTasks(){renderTCatFilt();renderTCatSel();if(tTab==='todo')renderTodo();else if(tTab==='done')renderDone();else renderCats();}
function renderTCatFilt(){const c=$('tcatfilt');c.innerHTML=`<div class="tcpill${tFilt===''?' on':''}" data-f="">Tout</div>`+(tData.cats||[]).map(cat=>`<div class="tcpill${tFilt===cat?' on':''}" data-f="${esc(cat)}">${esc(cat)}</div>`).join('');}
function renderTCatSel(){const s=$('tcatsel');s.innerHTML='<option value="">Aucune catégorie</option>'+(tData.cats||[]).map(cat=>`<option value="${esc(cat)}">${esc(cat)}</option>`).join('');}
function renderTodo(){const list=$('tlist');const tasks=(tData.tasks||[]).filter(t=>!t.done&&(tFilt===''||t.cat===tFilt));const sorted=[...tasks].sort((a,b)=>({'🔴':0,'🟡':1,'🟢':2}[a.prio]||1)-({'🔴':0,'🟡':1,'🟢':2}[b.prio]||1));if(!sorted.length){list.innerHTML='<div class="empty">Aucune tâche 🎉</div>';return;}list.innerHTML='';sorted.forEach(task=>{const el=document.createElement('div');el.className='titem';el.dataset.id=task.id;el.innerHTML=`<div class="tck" data-ck="${task.id}"></div><div class="tpr" data-cp="${task.id}">${task.prio||'🟡'}</div><div class="ttxt">${esc(task.text)}</div>${task.cat?`<div class="tbadge">${esc(task.cat)}</div>`:''}<div class="tdl" data-dl="${task.id}">✕</div>`;list.appendChild(el);});}
function renderDone(){const list=$('tdlist');const tasks=(tData.tasks||[]).filter(t=>t.done&&(tFilt===''||t.cat===tFilt));if(!tasks.length){list.innerHTML='<div class="empty">Aucune effectuée.</div>';return;}list.innerHTML='';tasks.forEach(task=>{const el=document.createElement('div');el.className='titem done-item';el.innerHTML=`<div class="tck on" data-ck="${task.id}"></div><div class="tpr">${task.prio||'🟡'}</div><div class="ttxt sk">${esc(task.text)}</div>${task.cat?`<div class="tbadge">${esc(task.cat)}</div>`:''}<div class="tdl" data-dl="${task.id}">✕</div>`;list.appendChild(el);});}
function renderCats(){const list=$('tclist');const cats=tData.cats||[];if(!cats.length){list.innerHTML='<div class="empty">Aucune catégorie.</div>';return;}list.innerHTML='';cats.forEach((cat,i)=>{const el=document.createElement('div');el.className='titem';el.innerHTML=`<div class="ttxt">${esc(cat)}</div><div class="tdl" data-dcat="${i}">✕</div>`;list.appendChild(el);});}
function addTask(){const inp=$('tinp'),text=inp.value.trim();if(!text)return;const cat=$('tcatsel').value;tData.tasks.push({id:'t'+Date.now(),text,prio:tPrio,cat,done:false,createdAt:new Date().toISOString()});inp.value='';saveTasks();renderTasks();}
$('tadd-btn').addEventListener('click',addTask);
$('tinp').addEventListener('keydown',e=>{if(e.key==='Enter')addTask();});
$('catadd').addEventListener('click',()=>{const inp=$('catinp'),v=inp.value.trim();if(!v)return;if(!tData.cats)tData.cats=[];if(!tData.cats.includes(v)){tData.cats.push(v);inp.value='';saveTasks();renderTasks();}});
$('catinp').addEventListener('keydown',e=>{if(e.key==='Enter')$('catadd').click();});
$('tlist').addEventListener('click',e=>{const ck=e.target.closest('[data-ck]');if(ck){const t=tData.tasks.find(t=>t.id===ck.dataset.ck);if(t){t.done=!t.done;t.doneAt=t.done?new Date().toISOString():null;saveTasks();renderTasks();}return;}const cp=e.target.closest('[data-cp]');if(cp){const t=tData.tasks.find(t=>t.id===cp.dataset.cp);if(t){const cy={'🔴':'🟡','🟡':'🟢','🟢':'🔴'};t.prio=cy[t.prio]||'🟡';saveTasks();renderTasks();}return;}const dl=e.target.closest('[data-dl]');if(dl){tData.tasks=tData.tasks.filter(t=>t.id!==dl.dataset.dl);saveTasks();renderTasks();}});
$('tdlist').addEventListener('click',e=>{const ck=e.target.closest('[data-ck]');if(ck){const t=tData.tasks.find(t=>t.id===ck.dataset.ck);if(t){t.done=false;t.doneAt=null;saveTasks();renderTasks();}return;}const dl=e.target.closest('[data-dl]');if(dl){tData.tasks=tData.tasks.filter(t=>t.id!==dl.dataset.dl);saveTasks();renderTasks();}});
$('tclist').addEventListener('click',e=>{const dc=e.target.closest('[data-dcat]');if(dc){tData.cats.splice(Number(dc.dataset.dcat),1);saveTasks();renderTasks();}});
$('tcatfilt').addEventListener('click',e=>{const p=e.target.closest('[data-f]');if(!p)return;tFilt=p.dataset.f;renderTasks();});
$('topt').addEventListener('click',e=>{const b=e.target.closest('.tpbtn[data-p]');if(!b)return;tPrio=b.dataset.p;document.querySelectorAll('.tpbtn').forEach(x=>x.classList.toggle('on',x.dataset.p===tPrio));});

/* ── THEMES ── */
function applyTheme(id){const t=THEMES.find(x=>x.id===id)||THEMES[0];const r=document.documentElement.style;r.setProperty('--bg',t.bg);r.setProperty('--bg2',t.bg2);r.setProperty('--bg3',t.bg3);r.setProperty('--accent',t.ac);r.setProperty('--teal',t.tl);r.setProperty('--tl',t.tl+'22');r.setProperty('--green',t.gr);r.setProperty('--gl',t.gr+'22');r.setProperty('--red',t.rd);r.setProperty('--rl',t.rd+'22');r.setProperty('--blue',t.bl);r.setProperty('--chalk',t.ch);r.setProperty('--dim',t.ch+'99');r.setProperty('--line',t.ch+'17');r.setProperty('--line2',t.ch+'2e');curTheme=id;try{localStorage.setItem('mlt',id);}catch(e){}}
function buildThemeGrid(){const g=$('tgrid');g.innerHTML='';THEMES.forEach(t=>{const b=document.createElement('button');b.className='tbtn';b.style.cssText=`background:${t.bg2};border-color:${curTheme===t.id?t.ac:'transparent'};`;b.innerHTML=`<div class="tdots"><div class="tdot" style="background:${t.ac}"></div><div class="tdot" style="background:${t.tl}"></div><div class="tdot" style="background:${t.gr}"></div></div><div style="font-size:.82rem;font-weight:700;color:${t.ch}">${t.n}</div>${curTheme===t.id?`<div style="margin-left:auto;color:${t.ac};font-size:.8rem;">✓</div>`:''}`;b.addEventListener('click',()=>{applyTheme(t.id);if(layDoc)layDoc.set(Object.assign({},wLayout,{theme:t.id})).catch(()=>{});buildThemeGrid();});g.appendChild(b);});}
$('btn-theme').addEventListener('click',()=>{buildThemeGrid();$('ov-theme').classList.add('op');});
$('thclose').addEventListener('click',()=>$('ov-theme').classList.remove('op'));
(()=>{try{const s=localStorage.getItem('mlt');if(s)applyTheme(s);}catch(e){}})();
</script>
</body>
</html>
