<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arabe — Médine Tome 1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Scheherazade+New:wght@400;500;600;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0f1117; --surface:#1a1d27; --surface2:#22263a; --border:#2e3248; --border2:#3d4260;
  --text:#e8eaf6; --text2:#9198c0; --text3:#5a6090;
  --green:#4ade80; --green-l:rgba(74,222,128,.1);
  --amber:#fbbf24; --amber-l:rgba(251,191,36,.1);
  --red:#f87171; --red-l:rgba(248,113,113,.1);
  --teal:#2dd4bf; --teal-l:rgba(45,212,191,.12); --teal-d:#0f766e; --teal-g:linear-gradient(135deg,#2dd4bf,#0ea5e9);
  --radius:14px; --radius-sm:8px;
  --ar-font:'Scheherazade New','Amiri',serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ARABIC TEXT */
.ar{font-family:var(--ar-font);font-size:28px;direction:rtl;line-height:2.2;color:var(--text)}
.ar-sm{font-family:var(--ar-font);font-size:22px;direction:rtl;line-height:2}
.ar-lg{font-family:var(--ar-font);font-size:34px;direction:rtl;line-height:2.4}
.ar-xl{font-family:var(--ar-font);font-size:42px;direction:rtl;line-height:2.6}

/* HEADER */
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 2rem;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header-left{display:flex;align-items:center;gap:12px}
.btn-back{background:none;border:1px solid var(--border2);border-radius:var(--radius-sm);padding:5px 12px;font-size:13px;color:var(--text2);cursor:pointer;display:none}
.btn-back:hover{background:var(--surface2)}
.hdr-title{font-size:16px;font-weight:600}
.hdr-sub{font-size:12px;color:var(--text3)}
.api-row{display:flex;align-items:center;gap:10px}
.api-dot{width:7px;height:7px;border-radius:50%;background:var(--border2)}
.api-dot.ok{background:var(--green);box-shadow:0 0 6px var(--green)}
.api-lbl{font-size:12px;color:var(--text3)}
.api-btn{background:var(--teal-l);border:1px solid var(--teal);border-radius:var(--radius-sm);color:var(--teal);font-size:12px;padding:4px 12px;cursor:pointer}

/* MYLIFE / SYNC */
.btn-mylife{
  background:none;border:1px solid var(--border2);border-radius:var(--radius-sm);
  color:var(--text2);font-size:15px;padding:5px 10px;cursor:pointer;text-decoration:none;
  display:inline-flex;align-items:center;
}
.btn-mylife:hover{background:var(--surface2)}
.sync-status{font-size:1rem;opacity:.6;display:inline-flex;align-items:center;padding:0 2px;transition:.2s}
.sync-status.saving{opacity:1;animation:pulse 1s infinite}
.sync-status.error{opacity:1;color:var(--red)}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}

/* LOADING SCREEN */
.loading-screen{position:fixed;inset:0;background:var(--bg);z-index:500;display:flex;align-items:center;justify-content:center}
.loading-screen.hidden{display:none}
.loading-box{text-align:center;color:var(--text2)}
.loading-box p{margin-top:14px;font-size:.9rem}
.spinner{width:34px;height:34px;border-radius:50%;border:3px solid var(--border2);border-top-color:var(--teal);margin:0 auto;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* SCREENS */
.screen{display:none}.screen.active{display:block}

/* SETUP */
.setup-wrap{max-width:460px;margin:6rem auto;padding:0 1.5rem}
.setup-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:2rem}
.setup-card h2{font-size:20px;font-weight:600;margin-bottom:.5rem}
.setup-card p{font-size:14px;color:var(--text2);line-height:1.7;margin-bottom:1rem}
.setup-card a{color:var(--teal)}
.key-row{display:flex;gap:8px;margin-bottom:.75rem}
.key-row input{flex:1;background:var(--bg);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:9px 14px;font-size:14px;color:var(--text);outline:none}
.key-row input:focus{border-color:var(--teal)}
.key-note{font-size:12px;color:var(--text3)}
.key-err{background:var(--red-l);border:1px solid var(--red);border-radius:var(--radius-sm);padding:10px;font-size:13px;color:var(--red);margin-top:.75rem;display:none}

/* BUTTONS */
.btn-primary{background:var(--teal-g);border:none;border-radius:var(--radius-sm);color:white;font-size:14px;font-weight:500;padding:9px 20px;cursor:pointer}
.btn-outline{background:none;border:1px solid var(--border2);border-radius:var(--radius-sm);padding:7px 16px;font-size:13px;color:var(--text2);cursor:pointer}
.btn-outline:hover{background:var(--surface2)}
.btn-gen{background:var(--teal-g);border:none;border-radius:var(--radius);color:white;font-size:14px;font-weight:600;padding:12px 26px;cursor:pointer;display:inline-flex;align-items:center;gap:8px}
.btn-gen:hover{opacity:.9}
.btn-gen:disabled{opacity:.45;cursor:not-allowed}

/* HOME */
.home-wrap{max-width:900px;margin:0 auto;padding:2rem 1.5rem}
.home-hero{text-align:center;padding:2.5rem 0 2rem}
.home-hero h1{font-size:30px;font-weight:700;background:var(--teal-g);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.home-hero .ar-hero{font-family:var(--ar-font);font-size:48px;direction:rtl;color:var(--teal);opacity:.8;line-height:1.8;margin-top:.5rem;display:block}
.home-hero p{font-size:15px;color:var(--text2);margin-top:.5rem}

/* CHAPTERS GRID */
.ch-wrap{max-width:900px;margin:0 auto;padding:2rem 1.5rem}
.ch-level-hdr{display:flex;align-items:center;gap:14px;margin-bottom:.5rem}
.ch-level-hdr h2{font-size:22px;font-weight:700}
.ch-prog-lbl{font-size:13px;color:var(--text3)}
.prog-track{height:4px;background:var(--border);border-radius:2px;margin-bottom:2rem;overflow:hidden}
.prog-bar{height:100%;background:var(--teal-g);border-radius:2px;transition:width .5s}
.tiles{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:14px}
.tile{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem 1rem;cursor:pointer;transition:all .18s;display:flex;flex-direction:column;min-height:155px;position:relative}
.tile:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.35)}
.tile-num{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.5rem}
.tile-ico{font-size:26px;margin-bottom:.5rem}
.tile-ar{font-family:var(--ar-font);font-size:20px;direction:rtl;color:var(--teal);margin-bottom:.25rem;line-height:1.6}
.tile-name{font-size:13px;font-weight:600;color:var(--text);line-height:1.35;margin-bottom:.3rem}
.tile-sub{font-size:11px;color:var(--text3);line-height:1.4;flex:1}
.tile-bbar{width:100%;height:3px;background:var(--border);border-radius:2px}
.tile-bbar-fill{height:100%;border-radius:2px}

/* LESSON */
.lesson-wrap{max-width:800px;margin:0 auto;padding:1.5rem}
.lesson-hdr{display:flex;align-items:flex-start;gap:16px;margin-bottom:1.5rem}
.lesson-ico{width:52px;height:52px;background:var(--teal-l);border:1px solid rgba(45,212,191,.3);border-radius:var(--radius);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
.lesson-title{font-size:22px;font-weight:700;margin-bottom:.2rem}
.lesson-sub{font-size:13px;color:var(--text3)}
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:1.5rem;overflow-x:auto}
.tab{padding:11px 18px;font-size:14px;cursor:pointer;color:var(--text3);border-bottom:2px solid transparent;margin-bottom:-1px;background:none;border-top:none;border-left:none;border-right:none;white-space:nowrap;transition:all .15s}
.tab:hover{color:var(--text2)}
.tab.active{color:var(--teal);border-bottom-color:var(--teal);font-weight:500}
.tab-pane{display:none}.tab-pane.active{display:block}

/* COURS */
.notion{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem 1.5rem;margin-bottom:1rem}
.notion h3{font-size:15px;font-weight:600;color:var(--text);margin-bottom:.75rem;display:flex;align-items:center;gap:8px}
.notion h3::before{content:'';width:3px;height:16px;background:var(--teal-g);border-radius:2px;flex-shrink:0}
.notion-body{font-size:14px;color:var(--text2);line-height:1.85}
.formula{background:var(--bg);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:10px 16px;margin:8px 0;font-family:'Courier New',monospace;font-size:15px;color:var(--teal);display:block}
.ar-block{background:var(--bg);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:14px 18px;margin:10px 0;direction:rtl;text-align:right}
.ex-box{background:var(--green-l);border-left:3px solid var(--green);border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:10px 14px;margin:8px 0;font-size:13px;color:var(--text2);line-height:1.7}
.piege-box{background:var(--red-l);border-left:3px solid var(--red);border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:10px 14px;margin:8px 0;font-size:13px;color:var(--text2);line-height:1.7}
.regle-box{background:var(--teal-l);border-left:3px solid var(--teal);border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:10px 14px;margin:8px 0;font-size:14px;color:var(--text2);line-height:1.8}

/* VOCAB TABLE */
.vtable{width:100%;border-collapse:collapse;font-size:14px}
.vtable th{padding:9px 14px;font-weight:500;color:var(--text2);font-size:12px;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.05em}
.vtable td{padding:12px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
.vtable tr:last-child td{border-bottom:none}
.vtable .ar-cell{direction:rtl;text-align:right;font-family:var(--ar-font);font-size:26px;line-height:2}
.type-badge{font-size:11px;padding:2px 8px;border-radius:99px;background:var(--surface2);color:var(--text3)}

/* EXERCICES */
.ex-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem 1.5rem;margin-bottom:1rem}
.ex-top{display:flex;align-items:center;gap:10px;margin-bottom:.75rem}
.ex-n{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase}
.diff{font-size:10px;padding:2px 9px;border-radius:99px;font-weight:600;text-transform:uppercase}
.diff-f{background:var(--green-l);color:var(--green)}
.diff-m{background:var(--amber-l);color:var(--amber)}
.diff-d{background:var(--red-l);color:var(--red)}
.enonce{font-size:14px;color:var(--text);line-height:1.75;margin-bottom:.75rem}
.ans-area{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:10px 14px;font-size:14px;color:var(--text);font-family:inherit;resize:vertical;min-height:72px;outline:none;margin-bottom:8px}
.ans-area:focus{border-color:var(--teal)}
.ans-area.ar-input{font-family:var(--ar-font);font-size:24px;direction:rtl;line-height:2.2}
.btn-corr{background:none;border:1px solid var(--border2);border-radius:var(--radius-sm);padding:7px 16px;font-size:13px;color:var(--text3);cursor:pointer}
.btn-corr:hover{background:var(--surface2);color:var(--text2);border-color:var(--teal)}
.corr{display:none;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:1rem;margin-top:.75rem;font-size:14px;color:var(--text2);line-height:1.8}
.corr.show{display:block}
.corr-res{margin-top:.75rem;padding:.75rem 1rem;background:var(--green-l);border-radius:var(--radius-sm);font-weight:600;color:var(--green);font-size:14px}
.corr-res.ar{font-family:var(--ar-font);font-size:26px;direction:rtl;text-align:right;line-height:2}

/* QCM */
.qcm-scorebar{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.5rem;margin-bottom:1rem;display:flex;align-items:center;justify-content:space-between}
.q-score{font-size:24px;font-weight:700;color:var(--teal)}
.q-score-lbl{font-size:12px;color:var(--text3)}
.qcm-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem 1.5rem;margin-bottom:1rem}
.q-txt{font-size:15px;font-weight:500;color:var(--text);margin-bottom:1rem;line-height:1.5}
.q-opts{display:flex;flex-direction:column;gap:8px}
.qopt{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 16px;font-size:14px;cursor:pointer;transition:all .12s;color:var(--text2);text-align:center;line-height:1.4}
.qopt:hover{border-color:var(--border2);color:var(--text)}
.qopt.ar-opt{font-family:var(--ar-font);font-size:22px;direction:rtl;line-height:2}
.qopt.ok{border-color:var(--green);background:var(--green-l);color:var(--green);font-weight:500}
.qopt.ko{border-color:var(--red);background:var(--red-l);color:var(--red)}
.q-expl{display:none;margin-top:.75rem;padding:.75rem 1rem;background:var(--surface2);border-radius:var(--radius-sm);font-size:13px;color:var(--text2);line-height:1.7}
.q-expl.show{display:block}

/* GUIDED */
.guided-progress{display:flex;align-items:center;gap:14px;margin-bottom:1.5rem}
.guided-step-info{font-size:13px;color:var(--text3)}
.guided-prog-wrap{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.guided-prog-fill{height:100%;border-radius:3px;background:var(--teal-g);transition:width .4s}
.guided-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;margin-bottom:1rem}
.guided-notion-tag{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--teal);margin-bottom:.75rem;display:flex;align-items:center;gap:6px}
.guided-notion-tag::before{content:'';width:20px;height:2px;background:var(--teal-g);border-radius:1px}
.guided-q-tag{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--amber);margin-bottom:.75rem;display:flex;align-items:center;gap:6px}
.guided-q-tag::before{content:'';width:20px;height:2px;background:linear-gradient(135deg,#fbbf24,#f59e0b);border-radius:1px}
.guided-title{font-size:17px;font-weight:700;color:var(--text);margin-bottom:.75rem}
.guided-body{font-size:14px;color:var(--text2);line-height:1.85}
.guided-mini-q{font-size:15px;font-weight:500;color:var(--text);margin-bottom:1rem;line-height:1.5}
.guided-opts{display:flex;flex-direction:column;gap:8px;margin-bottom:1rem}
.guided-opt{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:13px 18px;font-size:14px;cursor:pointer;transition:all .15s;color:var(--text2);text-align:left;display:flex;align-items:center;gap:12px}
.guided-opt:hover{border-color:var(--border2);color:var(--text)}
.guided-opt::before{content:attr(data-letter);width:26px;height:26px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;color:var(--text3)}
.guided-opt.ar-gopt{direction:rtl;font-family:var(--ar-font);font-size:22px;line-height:2;text-align:right;flex-direction:row-reverse}
.guided-opt.ok{border-color:var(--green);background:var(--green-l);color:var(--green)}
.guided-opt.ok::before{background:var(--green);color:white}
.guided-opt.ko{border-color:var(--red);background:var(--red-l);color:var(--red)}
.guided-opt.ko::before{background:var(--red);color:white}
.guided-feedback{border-radius:var(--radius-sm);padding:12px 16px;font-size:14px;line-height:1.7;margin-bottom:1rem}
.guided-feedback.ok{background:var(--green-l);border:1px solid rgba(74,222,128,.3);color:var(--green)}
.guided-feedback.ko{background:var(--red-l);border:1px solid rgba(248,113,113,.3);color:var(--red)}
.guided-next-btn{width:100%;background:var(--teal-g);border:none;border-radius:var(--radius-sm);color:white;font-size:15px;font-weight:600;padding:13px;cursor:pointer}
.guided-next-btn:hover{opacity:.9}
.exam-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;margin-bottom:1rem}
.exam-tag{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--teal);margin-bottom:.75rem;display:flex;align-items:center;gap:6px}
.exam-tag::before{content:'';width:20px;height:2px;background:var(--teal-g);border-radius:1px}
.exam-result{background:var(--surface);border:2px solid var(--teal);border-radius:var(--radius);padding:2rem;text-align:center;margin-top:1rem}
.exam-score-big{font-size:64px;font-weight:800;background:var(--teal-g);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
.exam-grade{font-size:28px;font-weight:700;color:var(--text);margin:.5rem 0}
.exam-stars{font-size:32px;letter-spacing:4px;margin:.5rem 0}

/* VALIDATE */
.btn-validate-ch{background:linear-gradient(135deg,#f59e0b,#d97706);border:none;border-radius:var(--radius);color:white;font-size:14px;font-weight:600;padding:12px 26px;cursor:pointer;display:inline-flex;align-items:center;gap:8px}
.btn-validate-ch:hover{opacity:.9}
.cta-next{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:1.5rem}

/* IA */
.ia-intro{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;margin-bottom:1.25rem;display:flex;align-items:center;gap:16px}
.ia-badge{background:var(--teal-l);border:1px solid rgba(45,212,191,.4);border-radius:var(--radius-sm);padding:8px 14px;font-size:13px;color:var(--teal);font-weight:500;white-space:nowrap}
.ia-desc{font-size:14px;color:var(--text2);line-height:1.6}
.ia-btns{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:1.5rem}

/* LOADING / ERR */
.loading{text-align:center;padding:2.5rem 1rem}
.dots{display:flex;justify-content:center;gap:6px;margin-bottom:.75rem}
.dot{width:8px;height:8px;border-radius:50%;background:var(--border2);animation:pulse 1.4s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,80%,100%{opacity:.2}40%{opacity:1}}
.load-txt{font-size:13px;color:var(--text3)}
.err-box{background:var(--red-l);border:1px solid var(--red);border-radius:var(--radius-sm);padding:10px 14px;font-size:13px;color:var(--red);margin:1rem 0}
.err-box button{color:var(--teal);background:none;border:none;cursor:pointer;font-size:13px;margin-left:6px}
.section-sep{display:flex;align-items:center;gap:12px;margin:1.5rem 0;color:var(--text3);font-size:12px;text-transform:uppercase;letter-spacing:.06em}
.section-sep::before,.section-sep::after{content:'';flex:1;height:1px;background:var(--border)}
@keyframes fadeOut{0%{opacity:1}100%{opacity:0}}

/* ── FLASHCARDS SRS ─────────────────── */
.srs-wrap{display:flex;flex-direction:column;align-items:center;gap:1rem;padding:.5rem 0}
.srs-hdr{width:100%;display:flex;justify-content:space-between;align-items:center;font-size:13px;color:var(--text3)}
.fc{width:100%;max-width:540px;height:220px;perspective:1200px;cursor:pointer}
.fc-inner{position:relative;width:100%;height:100%;transition:transform .5s;transform-style:preserve-3d}
.fc.flipped .fc-inner{transform:rotateY(180deg)}
.fc-front,.fc-back{position:absolute;inset:0;backface-visibility:hidden;border-radius:var(--radius);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem;text-align:center;background:var(--surface);border:1px solid var(--border)}
.fc-back{transform:rotateY(180deg);background:var(--surface2)}
.fc-word{font-size:22px;font-weight:600;color:var(--text);margin-bottom:.5rem;line-height:1.4}
.fc-word.ar-fc{font-family:var(--ar-font);font-size:38px;line-height:1.8;direction:rtl}
.fc-hint{font-size:13px;color:var(--text3)}
.srs-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.srs-btn{border:none;border-radius:var(--radius-sm);padding:10px 22px;font-size:14px;font-weight:600;cursor:pointer;min-width:90px}
.srs-easy{background:var(--green-l);color:var(--green);border:1px solid rgba(74,222,128,.3)}
.srs-hard{background:var(--amber-l);color:var(--amber);border:1px solid rgba(251,191,36,.3)}
.srs-again{background:var(--red-l);color:var(--red);border:1px solid rgba(248,113,113,.3)}
.srs-nav{display:flex;gap:10px;align-items:center;justify-content:center}
.srs-nav button{background:none;border:1px solid var(--border2);border-radius:var(--radius-sm);padding:6px 16px;font-size:13px;cursor:pointer;color:var(--text2)}
.srs-done{text-align:center;padding:2rem 1rem}
.srs-done-score{font-size:48px;font-weight:800;color:var(--teal);line-height:1;margin:.5rem 0}

/* ── À TROUS ─────────────────────────── */
.trous-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem 1.5rem;margin-bottom:1rem}
.trous-phrase{font-family:var(--ar-font);font-size:30px;direction:rtl;text-align:right;line-height:2.4;color:var(--text);margin-bottom:.75rem}
.trous-hint{font-size:13px;color:var(--text3);margin-bottom:.75rem}
.trous-choices{display:flex;gap:8px;flex-wrap:wrap;direction:rtl;justify-content:flex-end}
.trous-choice{font-family:var(--ar-font);font-size:22px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 16px;cursor:pointer;color:var(--text2);transition:all .15s;direction:rtl;line-height:1.8}
.trous-choice:hover{border-color:var(--teal);color:var(--text)}
.trous-choice.ok{border-color:var(--green);background:var(--green-l);color:var(--green);font-weight:700;pointer-events:none}
.trous-choice.ko{border-color:var(--red);background:var(--red-l);color:var(--red);pointer-events:none}
.trous-fb{font-size:13px;padding:8px 12px;border-radius:var(--radius-sm);margin-top:.5rem;min-height:20px}
.trous-fb.ok{background:var(--green-l);color:var(--green)}
.trous-fb.ko{background:var(--red-l);color:var(--red)}

/* ── TRADUCTION ───────────────────────── */
.trad-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem 1.5rem;margin-bottom:1rem}
.trad-dir{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--teal);margin-bottom:.5rem}
.trad-prompt{font-size:16px;font-weight:500;padding:10px 14px;background:var(--bg);border-radius:var(--radius-sm);margin-bottom:.75rem;line-height:1.6}
.trad-prompt.ar-prompt{font-family:var(--ar-font);font-size:26px;direction:rtl;text-align:right;line-height:2.2}
.trad-input{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:10px 14px;font-size:14px;color:var(--text);font-family:inherit;resize:none;min-height:68px;outline:none;margin-bottom:8px}
.trad-input:focus{border-color:var(--teal)}
.trad-input.ar-in{font-family:var(--ar-font);font-size:24px;direction:rtl;line-height:2.2}
.trad-corr{display:none;padding:10px 14px;background:var(--surface2);border-radius:var(--radius-sm);font-size:14px;color:var(--text2);line-height:1.8}
.trad-corr.show{display:block}
.trad-corr-ar{font-family:var(--ar-font);font-size:24px;direction:rtl;display:block;margin-top:6px;line-height:2;color:var(--teal)}

/* ── CONJUGAISON ───────────────────────── */
.conj-header{background:var(--surface);border:1px solid var(--teal);border-radius:var(--radius);padding:1.25rem 1.5rem;margin-bottom:1rem;position:relative;overflow:hidden}
.conj-header::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--teal-g)}
.conj-titre{font-family:var(--ar-font);font-size:26px;direction:rtl;text-align:right;color:var(--teal);margin-bottom:.25rem}
.conj-intro{font-size:14px;color:var(--text2);line-height:1.7}
.conj-table{width:100%;border-collapse:collapse;margin-top:1rem}
.conj-table th{padding:9px 14px;background:var(--surface2);font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border);text-align:left}
.conj-table th:last-child{text-align:right}
.conj-table td{padding:11px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
.conj-table tr:last-child td{border-bottom:none}
.conj-personne{font-size:14px;color:var(--text2)}
.conj-input{font-family:var(--ar-font);font-size:22px;direction:rtl;text-align:right;background:var(--bg);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:6px 12px;color:var(--text);width:160px;outline:none;line-height:1.8}
.conj-input:focus{border-color:var(--teal)}
.conj-input.ok{border-color:var(--green);background:var(--green-l);color:var(--green)}
.conj-input.ko{border-color:var(--red);background:var(--red-l);color:var(--red)}
.conj-ans{font-family:var(--ar-font);font-size:22px;direction:rtl;color:var(--green);padding:4px 10px;display:none;line-height:1.8}
.conj-ans.show{display:inline-block}
.conj-check{background:var(--teal-g);border:none;border-radius:var(--radius-sm);color:white;font-size:14px;font-weight:600;padding:10px 24px;cursor:pointer;margin-top:1rem;width:100%}

/* ── REMISE EN ORDRE ──────────────────── */
.ordre-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem 1.5rem;margin-bottom:1rem}
.ordre-trad{font-size:14px;color:var(--text3);margin-bottom:.75rem}
.ordre-zone{min-height:56px;border:2px dashed var(--border2);border-radius:var(--radius-sm);padding:8px 12px;margin-bottom:.75rem;display:flex;flex-wrap:wrap;gap:8px;direction:rtl;justify-content:flex-end;align-items:center;transition:border-color .15s;cursor:pointer}
.ordre-zone.ok{border-color:var(--green);background:var(--green-l)}
.ordre-zone.ko{border-color:var(--red);background:var(--red-l)}
.ordre-chips{display:flex;flex-wrap:wrap;gap:8px;direction:rtl;justify-content:flex-end;margin-bottom:.75rem}
.ordre-chip{font-family:var(--ar-font);font-size:22px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:7px 14px;cursor:pointer;color:var(--text);transition:all .15s;user-select:none;line-height:1.8}
.ordre-chip:hover{border-color:var(--teal);color:var(--teal);background:var(--teal-l)}
.ordre-chip.used{opacity:.25;pointer-events:none}
.ordre-placed{font-family:var(--ar-font);font-size:22px;background:var(--teal-l);border:1px solid rgba(45,212,191,.4);border-radius:var(--radius-sm);padding:7px 14px;cursor:pointer;color:var(--teal);line-height:1.8}
.ordre-placed:hover{background:var(--red-l);border-color:var(--red);color:var(--red)}
.ordre-fb{font-size:13px;padding:8px 12px;border-radius:var(--radius-sm);margin-top:.5rem;min-height:20px}
.ordre-fb.ok{background:var(--green-l);color:var(--green)}
.ordre-fb.ko{background:var(--red-l);color:var(--red)}
.ordre-btns{display:flex;gap:8px;margin-top:.5rem}
.btn-check-o{background:var(--teal-g);border:none;border-radius:var(--radius-sm);color:white;font-size:13px;font-weight:600;padding:8px 18px;cursor:pointer}
.btn-reset-o{background:none;border:1px solid var(--border2);border-radius:var(--radius-sm);font-size:13px;padding:8px 14px;cursor:pointer;color:var(--text2)}
/* ── VOCAB GLOBAL ─────────────────────── */
.vocab-table{width:100%;border-collapse:collapse}
.vocab-table th{padding:9px 14px;font-weight:600;font-size:12px;color:var(--text2);border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.05em;background:var(--surface2)}
.vocab-table td{padding:11px 14px;border-bottom:1px solid var(--border);vertical-align:middle;font-size:14px}
.vocab-table tr:hover td{background:var(--surface2)}
.vocab-table .ar-cell{direction:rtl;text-align:right;font-family:var(--ar-font);font-size:26px;line-height:2;color:var(--teal)}
.vocab-lec-badge{font-size:10px;padding:2px 7px;border-radius:99px;background:var(--surface2);color:var(--text3);white-space:nowrap}
.vocab-type-badge{font-size:11px;padding:2px 8px;border-radius:99px;background:var(--teal-l);color:var(--teal)}
.vocab-score{font-size:13px;color:var(--text3);margin:.5rem 0}
.vocab-write-input{font-family:var(--ar-font);font-size:26px;direction:rtl;text-align:right;background:var(--bg);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:10px 14px;color:var(--text);width:100%;outline:none;line-height:2}
.vocab-write-input:focus{border-color:var(--teal)}
.vocab-write-input.ok{border-color:var(--green);background:var(--green-l)}
.vocab-write-input.ko{border-color:var(--red);background:var(--red-l)}

@media(max-width:600px){
  .tiles{grid-template-columns:repeat(2,1fr)}
  .lesson-wrap,.ch-wrap,.home-wrap{padding:1rem}
  .guided-opts{gap:6px}
}

/* IBN AJROUM CHANNEL */
var iacSeries = [];
var iacTimer = null;

function iacSaveData() {
  try { localStorage.setItem('mylife_iac_v2', JSON.stringify(iacSeries)); } catch(e) {}
  clearTimeout(iacTimer);
  iacTimer = setTimeout(function() {
    if (typeof db !== 'undefined' && typeof currentUser !== 'undefined' && currentUser) {
      db.collection('users').doc(currentUser.uid).collection('modules').doc('iac-v2')
        .set({ series: iacSeries }).catch(function(){});
    }
  }, 800);
}

function iacRender() {
  var cont = document.getElementById('iac-sections');
  var empty = document.getElementById('iac-empty');
  if (!cont) return;
  if (!iacSeries.length) { cont.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  cont.innerHTML = iacSeries.map(function(s) {
    var done = s.done ? s.done.length : 0;
    var pct = s.count ? Math.round(done / s.count * 100) : 0;
    var dots = '';
    for (var i = 1; i <= s.count; i++) {
      var ok = s.done && s.done.indexOf(i) >= 0;
      dots += '<div class="iac-dot' + (ok ? ' done' : '') + '" data-sid="' + s.id + '" data-n="' + i + '">' + (ok ? '✓' : i) + '</div>';
    }
    return '<div class="iac-section">' +
      '<div class="iac-sec-header">' +
        '<div class="iac-sec-title">' + s.title + '</div>' +
        '<div class="iac-sec-prog"><strong>' + done + '</strong> / ' + s.count + ' — ' + pct + '%</div>' +
        '<div class="iac-pbar"><div class="iac-pfill" style="width:' + pct + '%"></div></div>' +
        '<button class="iac-sec-del" data-del="' + s.id + '">🗑️</button>' +
      '</div>' +
      '<div class="iac-dots">' + dots + '</div>' +
    '</div>';
  }).join('');

  cont.querySelectorAll('.iac-dot').forEach(function(d) {
    d.addEventListener('click', function() {
      var s = iacSeries.find(function(x) { return x.id === d.dataset.sid; });
      if (!s) return;
      if (!s.done) s.done = [];
      var n = parseInt(d.dataset.n);
      var idx = s.done.indexOf(n);
      if (idx >= 0) s.done.splice(idx, 1); else s.done.push(n);
      iacSaveData(); iacRender();
    });
  });
  cont.querySelectorAll('[data-del]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      if (!confirm('Supprimer cette série ?')) return;
      iacSeries = iacSeries.filter(function(x) { return x.id !== btn.dataset.del; });
      iacSaveData(); iacRender();
    });
  });
}

function iacOpenModal() {
  document.getElementById('iac-inp-title').value = '';
  document.getElementById('iac-inp-count').value = '26';
  document.getElementById('iac-modal').style.display = 'flex';
  setTimeout(function() { document.getElementById('iac-inp-title').focus(); }, 50);
}
function iacSaveModal() {
  var title = document.getElementById('iac-inp-title').value.trim();
  var count = parseInt(document.getElementById('iac-inp-count').value) || 0;
  if (!title || count < 1) return;
  iacSeries.push({ id: 'iac_' + Date.now(), title: title, count: count, done: [] });
  document.getElementById('iac-modal').style.display = 'none';
  iacSaveData(); iacRender();
}
document.getElementById('iac-inp-title').addEventListener('keydown', function(e) { if (e.key === 'Enter') iacSaveModal(); });

// Init
try { var d = localStorage.getItem('mylife_iac_v2'); if (d) iacSeries = JSON.parse(d); } catch(e) {}
if (typeof db !== 'undefined') {
  document.addEventListener('iac-user-ready', function() {
    db.collection('users').doc(currentUser.uid).collection('modules').doc('iac-v2').get().then(function(snap) {
      if (snap.exists && snap.data().series) { iacSeries = snap.data().series; iacRender(); }
    }).catch(function(){});
  });
}

</script>

      <button class="iac-btn" onclick="document.getElementById('iac-modal').style.display='none'">Annuler</button>

    </div>
  </div>
</div>
