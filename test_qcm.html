<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Test 3 widgets</title>
<style>
:root{--bg:#16261e;--bg2:#1f3a2c;--bg3:#274a37;--line:rgba(238,241,234,.09);--line2:rgba(238,241,234,.18);--chalk:#f1efe4;--dim:#aebcb1;--accent:#f2c14e;--green:#4ade80;--gl:rgba(74,222,128,.13);--red:#f87171;--r:12px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Work Sans',sans-serif;background:var(--bg);color:var(--chalk);padding:12px;}
h1{font-family:Georgia,serif;color:var(--accent);margin-bottom:12px;font-size:1.2rem;}
#status{background:var(--bg2);border:1px solid var(--line2);border-radius:8px;padding:8px 12px;margin-bottom:10px;font-size:.82rem;min-height:32px;}
.btn{background:var(--bg3);border:1px solid var(--line);color:var(--chalk);padding:6px 12px;border-radius:8px;font-size:.82rem;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:5px;}
.btn:hover{border-color:var(--accent);}
.btn.prim{background:var(--accent);color:#21321f;border-color:var(--accent);}
.btn.sm{padding:4px 8px;font-size:.72rem;}
.btn.act{background:var(--accent);color:#21321f;}

/* GRID — exact copy from grid_test.html */
.grid-wrap{position:relative;margin-top:12px;}
.ghost-layer{display:none;position:absolute;top:0;left:0;right:0;bottom:0;grid-template-columns:repeat(4,1fr);grid-auto-rows:200px;gap:10px;z-index:100;pointer-events:none;}
.ghost-layer.active{display:grid;pointer-events:all;}
.gcell{border-radius:var(--r);border:2px solid rgba(242,193,78,.5);background:rgba(242,193,78,.15);cursor:crosshair;transition:.1s;}
.gcell:hover{background:rgba(242,193,78,.45);border-color:var(--accent);}
.wgrid{display:grid;grid-template-columns:repeat(4,1fr);grid-auto-rows:200px;gap:10px;}
.wcell{position:relative;z-index:1;}
.wcell.picked{outline:3px solid var(--accent);outline-offset:3px;z-index:2;}
.wh-move,.wh-size{display:none;background:rgba(242,193,78,.2);border:1px solid rgba(242,193,78,.5);border-radius:5px;padding:3px 7px;cursor:pointer;font-size:.7rem;color:var(--accent);font-weight:700;user-select:none;}
body.gedit .wh-move, body.gedit .wh-size{display:inline-flex;align-items:center;}

/* WIDGET */
.widget{background:var(--bg2);border:1px solid var(--line2);border-radius:var(--r);display:flex;flex-direction:column;height:100%;overflow:hidden;}
.whdr{padding:9px 12px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:7px;flex-shrink:0;}
.whdr h2{font-size:.88rem;flex:1;font-family:Georgia,serif;}
.wbody{padding:10px 12px;overflow-y:auto;flex:1;}

/* TASKS content */
.tadd{display:flex;gap:6px;margin-bottom:7px;}
.tadd input{flex:1;background:var(--bg);border:1px solid var(--line);color:var(--chalk);border-radius:6px;padding:6px 9px;font-size:.8rem;}
.tlist{display:flex;flex-direction:column;gap:4px;max-height:120px;overflow-y:auto;}
.titem{display:flex;align-items:center;gap:7px;padding:6px 9px;background:var(--bg3);border:1px solid var(--line);border-radius:7px;}
.tck{width:16px;height:16px;border-radius:4px;border:2px solid var(--line);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:transparent;}
.tck.on{background:var(--green);border-color:var(--green);}
.tck.on::after{content:'✓';font-size:.65rem;color:#0f1117;font-weight:700;}
.ttxt{flex:1;font-size:.78rem;}
.tdl{font-size:.68rem;color:var(--dim);cursor:pointer;opacity:0;padding:2px 4px;border-radius:4px;border:1px solid transparent;}
.titem:hover .tdl{opacity:1;}
.tdl:hover{border-color:var(--red);color:var(--red);}
.empty{text-align:center;padding:12px;color:var(--dim);font-size:.78rem;}

/* SIZE MODAL */
.ov{position:fixed;inset:0;background:rgba(10,16,12,.7);display:none;align-items:center;justify-content:center;z-index:300;padding:14px;}
.ov.op{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--line2);border-radius:var(--r);padding:18px;width:100%;max-width:300px;}
.modal h3{color:var(--accent);margin-bottom:10px;}
.modal-act{display:flex;justify-content:flex-end;margin-top:10px;}
.pills{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;}
.pill{background:var(--bg3);border:1px solid var(--line);color:var(--dim);border-radius:6px;padding:4px 10px;font-size:.75rem;font-weight:700;cursor:pointer;transition:.15s;}
.pill.on{background:var(--accent);color:#21321f;border-color:var(--accent);}
.clbl{font-size:.7rem;color:var(--dim);margin-bottom:4px;font-weight:600;}
.qopts{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:6px;}
.qopt{background:var(--bg3);border:2px solid var(--line);border-radius:7px;padding:7px 5px;text-align:center;cursor:pointer;transition:.15s;font-size:.85rem;line-height:1.4;}
.qopt:hover:not(.lk){border-color:var(--accent);}
.qopt.ok{border-color:var(--green);background:var(--gl);}
.qopt.ko{border-color:#f87171;background:rgba(248,113,113,.13);}
.qopt.lk{cursor:default;}
.qcard{background:var(--bg3);border:1px solid var(--line);border-radius:8px;padding:10px;text-align:center;margin-bottom:7px;}
.qmain{font-size:1.3rem;color:var(--accent);}
.gaugebar{height:6px;border-radius:3px;overflow:hidden;background:var(--line);display:flex;margin:4px 0 8px;}
</style>
</head>
<body>
<h1>Test — Widget QCM Arabe</h1>
<div id="status">Clique sur ✏️ Disposition pour activer le mode, puis ✥ pour déplacer, ⊞ pour redimensionner.</div>
<button class="btn" id="btn-edit">✏️ Disposition</button>

<div class="grid-wrap">
  <div class="ghost-layer" id="ghost-layer"></div>
  <div class="wgrid" id="wgrid">

    <div class="wcell" id="wc-t1" style="grid-column:1/span 2;grid-row:1/span 2;">
      <div class="widget">
        <div class="whdr">
          <span>🧠</span><h2>QCM Arabe</h2>
          <button class="wh-move" id="wmv-t1">✥</button>
          <button class="wh-size" id="wsz-t1">⊞</button>
        </div>
        <div class="wbody">
          <div id="qcm-home">
            <div style="display:flex;justify-content:space-between;font-size:.65rem;margin-bottom:3px;">
              <span style="color:var(--green)" id="q-lg">0 ✅</span>
              <span style="color:#60a5fa" id="q-lb">0 🔵</span>
              <span style="color:var(--dim)">463</span>
              <span style="color:#f87171" id="q-lr">0 ❌</span>
            </div>
            <div class="gaugebar"><div id="q-bar-g" style="height:100%;width:0%;background:var(--green);"></div><div id="q-bar-b" style="height:100%;width:0%;background:#60a5fa;"></div><div id="q-bar-r" style="height:100%;width:0%;background:#f87171;"></div></div>

            <div class="clbl">Questions</div>
            <div class="pills" id="q-cnt-pills">
              <button class="pill" data-cnt="10">10</button>
              <button class="pill on" data-cnt="15">15</button>
              <button class="pill" data-cnt="20">20</button>
            </div>
            <div class="clbl">Mode</div>
            <div class="pills" id="q-mode-pills">
              <button class="pill on" data-mode="all">🎲 Tout</button>

            <div class="pills" id="q-dir-pills">
              <button class="pill on" data-dir="ar2fr">AR→FR</button>
              <button class="pill" data-dir="fr2ar">FR→AR</button>

            </div>

            <div id="q-info" style="font-size:.68rem;color:var(--dim);margin-bottom:6px;"></div>
            <button class="btn prim" id="q-start" style="width:100%;justify-content:center;margin-bottom:4px;">▶ Lancer</button>

            <button class="btn" id="q-show-err" style="width:100%;justify-content:center;">❌ Erreurs (<span id="q-ec">0</span>)</button>

            <div id="q-master-panel" style="display:none;margin-top:7px;">
              <div style="display:flex;justify-content:space-between;margin-bottom:3px;"><span style="font-size:.75rem;color:var(--green);font-weight:700;">⭐ Maîtrisés</span><button class="btn" style="padding:2px 6px;font-size:.65rem;" id="q-master-close">✕</button></div>
              <div id="q-master-list" style="max-height:120px;overflow-y:auto;"></div>
            </div>

            <div class="qopts" id="q-opts"></div>
            <div id="q-fb" style="display:none;border-radius:6px;padding:6px 8px;font-size:.72rem;margin-bottom:6px;"></div>
            <div style="display:flex;gap:5px;margin-bottom:6px;">
              <button class="btn" id="q-review-btn" style="display:none;background:rgba(96,165,250,.15);border-color:#60a5fa;color:#60a5fa;">🔵 À revoir</button>
              <button class="btn prim" id="q-next" style="display:none;flex:1;justify-content:center;">Suivant →</button>
            </div>
            <button class="btn" id="q-stop" style="width:100%;justify-content:center;">✕ Arrêter</button>
          </div>

          <div id="qcm-results" style="display:none;">
            <div class="qcard"><div id="q-res-score" style="font-size:1.1rem;font-family:Georgia,serif;"></div></div>
            <div style="display:flex;gap:5px;flex-wrap:wrap;"><button class="btn prim" id="q-replay">🔁</button><button class="btn" id="q-revise">🔵 Réviser</button><button class="btn" id="q-home">🏠</button></div>
          </div>
        </div>
      </div>
    </div>

    <div class="wcell" id="wc-t2" style="grid-column:3/span 2;grid-row:1/span 2;">
      <div class="widget">
        <div class="whdr">
          <span>✅</span><h2>Tâches 2</h2>
          <button class="wh-move" id="wmv-t2">✥</button>
          <button class="wh-size" id="wsz-t2">⊞</button>
        </div>
        <div class="wbody">
          <div class="tadd"><input type="text" id="inp-t2" placeholder="Ajouter…"><button class="btn prim" id="add-t2">+</button></div>
          <div class="tlist" id="list-t2"></div>
        </div>
      </div>
    </div>

    <div class="wcell" id="wc-t3" style="grid-column:1/span 2;grid-row:3/span 2;">
      <div class="widget">
        <div class="whdr">
          <span>✅</span><h2>Tâches 3</h2>
          <button class="wh-move" id="wmv-t3">✥</button>
          <button class="wh-size" id="wsz-t3">⊞</button>
        </div>
        <div class="wbody">
          <div class="tadd"><input type="text" id="inp-t3" placeholder="Ajouter…"><button class="btn prim" id="add-t3">+</button></div>
          <div class="tlist" id="list-t3"></div>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- SIZE MODAL -->
<div class="ov" id="ov-size">
  <div class="modal">
    <h3>⊞ Taille</h3>
    <div class="clbl">Largeur</div>
    <div class="pills" id="sw"><button class="pill" data-w="1">1</button><button class="pill" data-w="2">2</button><button class="pill" data-w="3">3</button><button class="pill" data-w="4">4</button></div>
    <div class="clbl">Hauteur</div>
    <div class="pills" id="sh"><button class="pill" data-h="1">Petite</button><button class="pill" data-h="2">Moyenne</button><button class="pill" data-h="3">Grande</button></div>
    <div class="modal-act"><button class="btn prim" id="szdone">Fermer</button></div>
  </div>
</div>

<script>
const log = m => document.getElementById('status').textContent = m;
const $ = id => document.getElementById(id);

const WIDGETS = ['t1','t2','t3'];
const layout = {t1:{c:1,r:1,w:2,h:2}, t2:{c:3,r:1,w:2,h:2}, t3:{c:1,r:3,w:2,h:2}};
const tasks = {t1:[], t2:[], t3:[]};
let gedit = false, selW = null, sizingId = null;

/* ── TASKS ── */
WIDGETS.forEach(id => {
  const addBtn = $('add-'+id), inp = $('inp-'+id), list = $('list-'+id);
  if(!addBtn || !inp || !list) return; // skip t1 — it's now the QCM widget
  addBtn.onclick = () => {
    const text = inp.value.trim();
    if(!text) return;
    tasks[id].push({id:'i'+Date.now(), text, done:false});
    inp.value = '';
    renderList(id);
  };
  inp.addEventListener('keydown', e => { if(e.key==='Enter') addBtn.click(); });
  list.addEventListener('click', e => {
    const ck = e.target.closest('[data-ck]');
    if(ck){ const t=tasks[id].find(x=>x.id===ck.dataset.ck); if(t){t.done=!t.done;renderList(id);} return; }
    const dl = e.target.closest('[data-dl]');
    if(dl){ tasks[id]=tasks[id].filter(x=>x.id!==dl.dataset.dl); renderList(id); }
  });
  renderList(id);
});

function renderList(id){
  const list = $('list-'+id);
  if(!list) return; // t1 has no task list anymore (it's QCM)
  if(!tasks[id].length){ list.innerHTML='<div class="empty">Vide</div>'; return; }
  list.innerHTML = tasks[id].map(t =>
    `<div class="titem"><div class="tck${t.done?' on':''}" data-ck="${t.id}"></div><div class="ttxt${t.done?' sk':''}">${t.text}</div><div class="tdl" data-dl="${t.id}">✕</div></div>`
  ).join('');
}

/* ── GRID ── */
function applyLayout(){
  const maxR = Math.max(...WIDGETS.map(id=>layout[id].r+layout[id].h-1), 4);
  $('wgrid').style.gridTemplateRows = `repeat(${maxR},200px)`;
  WIDGETS.forEach(id => {
    const p = layout[id];
    const cell = $('wc-'+id);
    cell.style.gridColumn = `${p.c}/span ${p.w}`;
    cell.style.gridRow = `${p.r}/span ${p.h}`;
  });
}

function buildGhosts(){
  const layer = $('ghost-layer');
  layer.innerHTML = '';
  const maxR = Math.max(...WIDGETS.map(id=>layout[id].r+layout[id].h-1), 4);
  layer.style.gridTemplateRows = `repeat(${maxR},200px)`;
  layer.style.height = (maxR*200+(maxR-1)*10)+'px';
  for(let r=1;r<=maxR;r++) for(let c=1;c<=4;c++){
    const gc = document.createElement('div');
    gc.className = 'gcell';
    gc.style.gridColumn = c;
    gc.style.gridRow = r;
    gc.addEventListener('click', () => {
      if(!selW) return;
      layout[selW].c = c; layout[selW].r = r;
      hideGhosts(); selW = null;
      WIDGETS.forEach(i=>$('wc-'+i).classList.remove('picked'));
      applyLayout();
      log(`✅ Déplacé vers col=${c} row=${r}`);
    });
    layer.appendChild(gc);
  }
}
function showGhosts(){ buildGhosts(); $('ghost-layer').classList.add('active'); }
function hideGhosts(){ $('ghost-layer').classList.remove('active'); }

/* ── EDIT MODE ── */
$('btn-edit').addEventListener('click', () => {
  gedit = !gedit;
  $('btn-edit').classList.toggle('act', gedit);
  document.body.classList.toggle('gedit', gedit);
  if(!gedit){ selW=null; hideGhosts(); WIDGETS.forEach(i=>$('wc-'+i).classList.remove('picked')); }
  log(gedit ? '✏️ Mode disposition actif — clique ✥ pour sélectionner' : 'Mode normal');
});

/* ── WIRE HANDLES — called once after page load ── */
function wireHandles(){
  WIDGETS.forEach(id => {
    const mv = $('wmv-'+id), sz = $('wsz-'+id);
    mv.onclick = e => {
      e.stopPropagation();
      if(selW===id){ selW=null; hideGhosts(); WIDGETS.forEach(i=>$('wc-'+i).classList.remove('picked')); log('Désélectionné'); }
      else { selW=id; WIDGETS.forEach(i=>$('wc-'+i).classList.remove('picked')); $('wc-'+id).classList.add('picked'); showGhosts(); log('✥ '+id+' sélectionné — clique une case jaune'); }
    };
    sz.onclick = e => {
      e.stopPropagation();
      sizingId = id;
      const p = layout[id];
      document.querySelectorAll('#sw .pill').forEach(b=>b.classList.toggle('on',Number(b.dataset.w)===p.w));
      document.querySelectorAll('#sh .pill').forEach(b=>b.classList.toggle('on',Number(b.dataset.h)===p.h));
      $('ov-size').classList.add('op');
      log('⊞ Taille de '+id);
    };
  });
  log('Prêt — clique ✏️ Disposition pour commencer');
}

$('sw').addEventListener('click', e => {
  const b = e.target.closest('.pill[data-w]'); if(!b||!sizingId) return;
  layout[sizingId].w = Number(b.dataset.w);
  document.querySelectorAll('#sw .pill').forEach(x=>x.classList.toggle('on',x===b));
  applyLayout(); log('Largeur '+sizingId+' → '+layout[sizingId].w);
});
$('sh').addEventListener('click', e => {
  const b = e.target.closest('.pill[data-h]'); if(!b||!sizingId) return;
  layout[sizingId].h = Number(b.dataset.h);
  document.querySelectorAll('#sh .pill').forEach(x=>x.classList.toggle('on',x===b));
  applyLayout(); log('Hauteur '+sizingId+' → '+layout[sizingId].h);
});
$('szdone').addEventListener('click', () => $('ov-size').classList.remove('op'));

document.addEventListener('click', e => {
  if(!selW) return;
  if(e.target.closest('.wcell')||e.target.closest('#ghost-layer')||e.target.closest('.ov')) return;
  selW=null; hideGhosts(); WIDGETS.forEach(i=>$('wc-'+i).classList.remove('picked'));
});

// Init

onTitle": "Connecteurs de discours"}, {"ar": "مِنَ الْجَدِيرِ بِالذِّكْرِ", "fr": "Il convient de mentionner", "type": "connecteur", "lesson": "ar22", "lessonTitle": "Connecteurs de discours"}, {"ar": "يَجِبُ أَنْ", "fr": "Il faut que / On doit", "type": "expression", "lesson": "ar22", "lessonTitle": "Connecteurs de discours"}, {"ar": "يَنْبَغِي أَنْ", "fr": "Il convient de", "type": "expression", "lesson": "ar22", "lessonTitle": "Connecteurs de discours"}, {"ar": "مِنَ الضَّرُورِيِّ", "fr": "Il est nécessaire", "type": "expression", "lesson": "ar22", "lessonTitle": "Connecteurs de discours"}, {"ar": "مِنَ الْمُمْكِنِ", "fr": "Il est possible", "type": "expression", "lesson": "ar22", "lessonTitle": "Connecteurs de discours"}, {"ar": "مُبْتَدَأٌ", "fr": "Sujet (terme grammatical)", "type": "grammaire", "lesson": "ar22", "lessonTitle": "Connecteurs de discours"}, {"ar": "خَبَرٌ", "fr": "Prédicat (terme grammatical)", "type": "grammaire", "lesson": "ar22", "lessonTitle": "Connecteurs de discours"}, {"ar": "فِعْلٌ", "fr": "Verbe", "type": "grammaire", "lesson": "ar22", "lessonTitle": "Connecteurs de discours"}, {"ar": "فَاعِلٌ", "fr": "Sujet verbal (agent)", "type": "grammaire", "lesson": "ar22", "lessonTitle": "Connecteurs de discours"}, {"ar": "مُجْتَهِدٌ / مُجْتَهِدَةٌ", "fr": "Studieux / Appliqué(e)", "type": "adjectif", "lesson": "ar23", "lessonTitle": "Récap — Phrase nominale"}, {"ar": "كَسُولٌ / كَسُولَةٌ", "fr": "Paresseux / Paresseuse", "type": "adjectif", "lesson": "ar23", "lessonTitle": "Récap — Phrase nominale"}, {"ar": "قَوِيٌّ / قَوِيَّةٌ", "fr": "Fort(e)", "type": "adjectif", "lesson": "ar23", "lessonTitle": "Récap — Phrase nominale"}, {"ar": "ضَعِيفٌ / ضَعِيفَةٌ", "fr": "Faible", "type": "adjectif", "lesson": "ar23", "lessonTitle": "Récap — Phrase nominale"}, {"ar": "سَعِيدٌ / سَعِيدَةٌ", "fr": "Heureux / Heureuse", "type": "adjectif", "lesson": "ar23", "lessonTitle": "Récap — Phrase nominale"}, {"ar": "حَزِينٌ / حَزِينَةٌ", "fr": "Triste", "type": "adjectif", "lesson": "ar23", "lessonTitle": "Récap — Phrase nominale"}, {"ar": "مَرِيضٌ / مَرِيضَةٌ", "fr": "Malade", "type": "adjectif", "lesson": "ar23", "lessonTitle": "Récap — Phrase nominale"}, {"ar": "صَحِيحٌ / صَحِيحَةٌ", "fr": "Correct(e) / En bonne santé", "type": "adjectif", "lesson": "ar23", "lessonTitle": "Récap — Phrase nominale"}, {"ar": "فَرِحٌ / فَرِحَةٌ", "fr": "Content(e) / Joyeux", "type": "adjectif", "lesson": "ar23", "lessonTitle": "Récap — Phrase nominale"}, {"ar": "الْجَوَابُ الصَّحِيحُ", "fr": "La bonne réponse", "type": "expression", "lesson": "ar23", "lessonTitle": "Récap — Phrase nominale"}, {"ar": "أُبَارِكُ لَكَ", "fr": "Je te félicite", "type": "expression", "lesson": "ar23", "lessonTitle": "Récap — Phrase nominale"}, {"ar": "مُرَاجَعَةٌ", "fr": "Révision", "type": "nom", "lesson": "ar23", "lessonTitle": "Récap — Phrase nominale"}, {"ar": "خُلَاصَةٌ", "fr": "Résumé / Synthèse", "type": "nom", "lesson": "ar23", "lessonTitle": "Récap — Phrase nominale"}, {"ar": "قَاعِدَةٌ", "fr": "Règle / Base", "type": "nom", "lesson": "ar23", "lessonTitle": "Récap — Phrase nominale"}, {"ar": "اسْتِثْنَاءٌ", "fr": "Exception", "type": "nom", "lesson": "ar23", "lessonTitle": "Récap — Phrase nominale"}, {"ar": "مِثَالٌ", "fr": "Exemple", "type": "nom", "lesson": "ar23", "lessonTitle": "Récap — Phrase nominale"}, {"ar": "تَدْرِيبٌ", "fr": "Entraînement / Exercice", "type": "nom", "lesson": "ar23", "lessonTitle": "Récap — Phrase nominale"}, {"ar": "إِتْقَانٌ", "fr": "Maîtrise / Perfectionnement", "type": "nom", "lesson": "ar23", "lessonTitle": "Récap — Phrase nominale"}, {"ar": "مُسْتَوَى", "fr": "Niveau", "type": "nom", "lesson": "ar23", "lessonTitle": "Récap — Phrase nominale"}, {"ar": "تَقَدُّمٌ", "fr": "Progrès", "type": "nom", "lesson": "ar23", "lessonTitle": "Récap — Phrase nominale"}, {"ar": "نَجَاحٌ", "fr": "Succès / Réussite", "type": "nom", "lesson": "ar23", "lessonTitle": "Récap — Phrase nominale"}]
;


/* QCM ARABE — version complète, données localStorage pour ce test */
let qProg = JSON.parse(localStorage.getItem('test_qcm_prog') || '{"green":{},"blue":{},"red":{}}');
function saveQProg(){ localStorage.setItem('test_qcm_prog', JSON.stringify(qProg)); }

let qCnt=15, qMode='all', qDir='ar2fr';
let qQueue=[], qIdx=0, qScore=0, qMissed=[], qBlue=[], curQ=null;

function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

function updateQStats(){
  const g=Object.keys(qProg.green).length, b=Object.keys(qProg.blue).length, r=Object.keys(qProg.red).length, t=VOCAB.length;
  $('q-lg').textContent=g+' ✅'; $('q-lb').textContent=b+' 🔵'; $('q-lr').textContent=r+' ❌';
  $('q-mc').textContent=g; $('q-ec').textContent=r;
  $('q-bar-g').style.width=(g/t*100)+'%'; $('q-bar-b').style.width=(b/t*100)+'%'; $('q-bar-r').style.width=(r/t*100)+'%';
}
function buildPool(){
  let p=[...VOCAB];
  if(qMode==='errors') p=p.filter(v=>qProg.red[v.ar]);
  else if(qMode==='review') p=p.filter(v=>qProg.blue[v.ar]);
  else if(qMode==='srs'){ const r=p.filter(v=>qProg.red[v.ar]), b=p.filter(v=>qProg.blue[v.ar]); p=[...p,...r,...r,...b]; }
  return p;
}
function updateQInfo(){
  const p=buildPool(); const n=Math.min(qCnt,p.length);
  $('q-info').textContent = n+' questions sur '+p.length+' mots'+(p.length===0?' — vide':'.');
}
updateQStats(); updateQInfo();

$('q-cnt-pills').addEventListener('click', e=>{
  const b=e.target.closest('.pill[data-cnt]'); if(!b) return;
  qCnt=Number(b.dataset.cnt);
  document.querySelectorAll('#q-cnt-pills .pill').forEach(x=>x.classList.toggle('on',x===b));
  updateQInfo();
});
$('q-mode-pills').addEventListener('click', e=>{
  const b=e.target.closest('.pill[data-mode]'); if(!b) return;
  qMode=b.dataset.mode;
  document.querySelectorAll('#q-mode-pills .pill').forEach(x=>x.classList.toggle('on',x===b));
  updateQInfo();
});
$('q-dir-pills').addEventListener('click', e=>{
  const b=e.target.closest('.pill[data-dir]'); if(!b) return;
  qDir=b.dataset.dir;
  document.querySelectorAll('#q-dir-pills .pill').forEach(x=>x.classList.toggle('on',x===b));
});

function showHome(){
  $('qcm-home').style.display='block'; $('qcm-quiz').style.display='none'; $('qcm-results').style.display='none';
  $('q-master-panel').style.display='none'; $('q-err-panel').style.display='none';
  updateQStats(); updateQInfo();
}
$('q-show-master').addEventListener('click', ()=>{
  $('q-master-panel').style.display='block'; $('q-err-panel').style.display='none';
  const g=VOCAB.filter(v=>qProg.green[v.ar]);
  $('q-master-list').innerHTML = !g.length ? '<div class="empty">Aucun encore.</div>' : g.map(v=>
    `<div class="titem" style="font-size:.72rem;"><span style="min-width:50px;color:var(--accent);">${v.ar}</span><span style="flex:1;">${v.fr}</span><button class="btn" style="padding:1px 5px;font-size:.6rem;" data-torv="${v.ar}">🔵</button></div>`
  ).join('');
});
$('q-master-list').addEventListener('click', e=>{
  const b=e.target.closest('[data-torv]'); if(!b) return;
  delete qProg.green[b.dataset.torv]; qProg.blue[b.dataset.torv]=true;
  saveQProg(); updateQStats(); $('q-show-master').click();
});
$('q-master-close').addEventListener('click', ()=>$('q-master-panel').style.display='none');
$('q-show-err').addEventListener('click', ()=>{
  $('q-err-panel').style.display='block'; $('q-master-panel').style.display='none';
  const r=VOCAB.filter(v=>qProg.red[v.ar]);
  $('q-err-list').innerHTML = !r.length ? '<div class="empty">Aucune erreur !</div>' : r.map(v=>
    `<div class="titem" style="font-size:.72rem;"><span style="min-width:50px;color:var(--accent);">${v.ar}</span><span>${v.fr}</span></div>`
  ).join('');
});
$('q-err-close').addEventListener('click', ()=>$('q-err-panel').style.display='none');

$('q-start').addEventListener('click', ()=>startQuiz());
function startQuiz(){
  let p=buildPool(); if(!p.length){ alert('Aucun mot disponible.'); return; }
  shuffle(p); qQueue=p.slice(0,Math.min(qCnt,p.length));
  qIdx=0; qScore=0; qMissed=[]; qBlue=[];
  $('qcm-home').style.display='none'; $('qcm-results').style.display='none'; $('qcm-quiz').style.display='block';
  renderQ();
}
function renderQ(){
  curQ=qQueue[qIdx]; const tot=qQueue.length;
  $('q-counter').textContent=(qIdx+1)+'/'+tot;
  $('q-fb').style.display='none'; $('q-next').style.display='none'; $('q-review-btn').style.display='none';
  const dir = qDir==='mix' ? (Math.random()<.5?'ar2fr':'fr2ar') : qDir;
  curQ._dir=dir;
  if(dir==='ar2fr'){ $('q-main').textContent=curQ.ar; $('q-main').style.fontSize='1.3rem'; $('q-label').textContent='Que signifie ce mot ?'; }
  else { $('q-main').textContent=curQ.fr; $('q-main').style.fontSize='1rem'; $('q-label').textContent='Comment dit-on en arabe ?'; }
  $('q-lesson').textContent=curQ.lessonTitle||'';
  let wrong=VOCAB.filter(v=>v.ar!==curQ.ar);
  const sameType=wrong.filter(v=>v.type===curQ.type);
  let dist=shuffle([...sameType]).slice(0,3);
  if(dist.length<3) dist=[...dist,...shuffle(wrong.filter(v=>!dist.includes(v))).slice(0,3-dist.length)];
  const opts=shuffle([curQ,...dist.slice(0,3)]);
  const oc=$('q-opts'); oc.innerHTML='';
  opts.forEach(opt=>{
    const b=document.createElement('button');
    b.className='qopt';
    b.textContent = dir==='ar2fr' ? opt.fr : opt.ar;
    b.onclick=()=>pickAns(b, opt.ar===curQ.ar);
    oc.appendChild(b);
  });
}
function pickAns(btn, ok){
  document.querySelectorAll('.qopt').forEach(b=>{ b.classList.add('lk'); b.onclick=null; if(b===btn) b.classList.add(ok?'ok':'ko'); });
  const fb=$('q-fb');
  if(ok){
    qScore++; delete qProg.red[curQ.ar]; if(!qProg.blue[curQ.ar]) qProg.green[curQ.ar]=true;
    fb.style.cssText='display:block;background:var(--gl);border:1px solid var(--green);color:var(--green);border-radius:6px;padding:6px 8px;font-size:.72rem;margin-bottom:6px;';
    fb.textContent='✅ '+curQ.ar+' = '+curQ.fr;
    $('q-review-btn').style.display='inline-flex';
  } else {
    qMissed.push(curQ); delete qProg.green[curQ.ar]; qProg.red[curQ.ar]=true;
    fb.style.cssText='display:block;background:rgba(248,113,113,.13);border:1px solid #f87171;color:#f87171;border-radius:6px;padding:6px 8px;font-size:.72rem;margin-bottom:6px;';
    fb.textContent='❌ '+curQ.ar+' = '+curQ.fr;
  }
  $('q-next').style.display='flex';
  saveQProg();
}
$('q-review-btn').addEventListener('click', ()=>{
  delete qProg.green[curQ.ar]; qProg.blue[curQ.ar]=true; qBlue.push(curQ);
  $('q-review-btn').style.display='none';
  saveQProg(); updateQStats();
});
$('q-next').addEventListener('click', ()=>{ qIdx++; if(qIdx>=qQueue.length){ showResults(); return; } renderQ(); });
$('q-stop').addEventListener('click', showHome);
function showResults(){
  const tot=qQueue.length, pct=Math.round(qScore/tot*100);
  $('q-res-score').textContent = qScore+'/'+tot+' ('+pct+'%)';
  $('qcm-quiz').style.display='none'; $('qcm-results').style.display='block';
  updateQStats();
  log('QCM terminé : '+qScore+'/'+tot);
}
$('q-replay').addEventListener('click', startQuiz);
$('q-revise').addEventListener('click', ()=>{
  qMode='review';
  document.querySelectorAll('#q-mode-pills .pill').forEach(x=>x.classList.toggle('on',x.dataset.mode==='review'));
  startQuiz();
});
$('q-home').addEventListener('click', showHome);

applyLayout();
wireHandles();
</script>
</body>
